<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneClick · 设计元素预览</title>
  <link rel="preconnect" href="https://fonts.loli.net">
  <link rel="stylesheet" href="https://fonts.loli.net/css2?family=Inter:wght@900&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f; --surface: #111118; --surface2: #1a1a26;
      --border: rgba(255,255,255,0.08); --accent: #7c3aed;
      --text: #f0f0f5; --muted: #8b8ba0; --radius: 10px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; min-height: 100vh; }

    header { padding: 40px 48px 0; border-bottom: 1px solid var(--border); padding-bottom: 28px; margin-bottom: 0; }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .server-note { display:inline-block; margin-top:10px; font-size:12px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); border-radius:6px; padding:4px 10px; color:#a78bfa; }

    nav { display:flex; gap:4px; padding: 16px 48px; border-bottom: 1px solid var(--border); position:sticky; top:0; z-index:100; background: rgba(8,8,15,0.92); backdrop-filter: blur(12px); flex-wrap:wrap; }
    nav a { font-size:12px; padding:5px 12px; border-radius:6px; color:var(--muted); text-decoration:none; transition:all 0.15s; }
    nav a:hover { background: var(--surface2); color: var(--text); }

    .gallery { padding: 40px 48px 80px; display:flex; flex-direction:column; gap:60px; }

    .section {}
    .section-header { margin-bottom: 24px; }
    .section-header h2 { font-size:18px; font-weight:700; letter-spacing:-0.02em; }
    .section-header p { font-size:13px; color:var(--muted); margin-top:5px; }

    .thumb-grid { display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start; }
    .thumb-item { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .thumb-wrap { overflow:hidden; border-radius:12px; border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,0.5); background:#000; flex-shrink:0; }
    .thumb-wrap iframe { display:block; border:none; transform-origin:top left; }
    .thumb-label { font-size:11px; color:var(--muted); text-align:center; font-weight:500; letter-spacing:0.02em; }
    .thumb-label strong { display:block; color:var(--text); font-size:12px; margin-bottom:2px; }

    .axis-group { display:flex; flex-direction:column; gap:20px; }
    .axis-row { }
    .axis-row h3 { font-size:13px; font-weight:600; color:var(--accent); letter-spacing:0.04em; text-transform:uppercase; margin-bottom:12px; }
    .axis-slides { display:flex; gap:12px; flex-wrap:wrap; }

    .deco-grid { display:flex; flex-wrap:wrap; gap:16px; }
    .deco-item { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .deco-wrap { overflow:hidden; border-radius:10px; border:1px solid var(--border); background:#0a0a16; }
    .deco-wrap iframe { display:block; border:none; transform-origin:top left; }

    .font-grid { display:flex; flex-wrap:wrap; gap:16px; }
    .font-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px 28px; width:360px; }
    .font-card .sample { font-size:48px; line-height:1.1; color: var(--text); margin-bottom:12px; }
    .font-card .meta { font-size:11px; color:var(--muted); line-height:1.6; }

    .subsection-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .subsection-desc { font-size:12px; color:var(--muted); margin-bottom:14px; }

    .qwen-grid { display:flex; flex-wrap:wrap; gap:20px; }
    .qwen-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; width:280px; display:flex; flex-direction:column; gap:14px; }
    .qwen-logo-wrap { width:100%; aspect-ratio:1; overflow:hidden; background:transparent; display:flex; align-items:center; justify-content:center; }
    .qwen-logo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .qwen-logo-placeholder { width:100%; height:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:12px; }
    .qwen-spinner { width:28px; height:28px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .qwen-card-meta { display:flex; flex-direction:column; gap:5px; }
    .qwen-card-label { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
    .qwen-card-desc { font-size:11px; color:var(--muted); line-height:1.6; }
    .qwen-regen-btn { margin-top:auto; padding:8px 0; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; text-align:center; }
    .qwen-regen-btn:hover:not(:disabled) { background:var(--accent); border-color:var(--accent); color:#fff; }
    .qwen-regen-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .qwen-error { font-size:11px; color:#f87171; text-align:center; }
    .qwen-demo-input-row { display:flex; gap:8px; align-items:center; margin-bottom:4px; }
    .qwen-demo-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:6px 10px; color:var(--text); font-size:12px; outline:none; }
    .qwen-demo-input:focus { border-color:var(--accent); }
    .qwen-regen-all-btn { padding:7px 16px; border-radius:7px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .qwen-regen-all-btn:hover:not(:disabled) { background:var(--accent); color:#fff; }
    .qwen-regen-all-btn:disabled { opacity:0.4; cursor:not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>OneClick · 设计元素预览</h1>

<script>

const THUMB_W  = Math.round(CANVAS_W * SCALE);

// ── Placeholder screenshot (generic dark app UI) ──────────────────────────────
const PLACEHOLDER_URL = 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <rect width="390" height="844" fill="#0e0e1c"/>

  <rect x="16" y="366" width="358" height="56" rx="12" fill="#ffffff06"/>

// ── Rendering functions (from preview.html) ───────────────────────────────────

function decorationSvg_REMOVED(dec, canvasW, canvasH) {
  const sizeMap = { sm: 1.30, md: 1.80, lg: 2.30, xl: 2.80 };
  const svgSize = canvasW * (sizeMap[dec.size] || 0.6);
  let posStyle = "";
  switch (dec.position) {
    case "top-right":    posStyle = `top:-${svgSize*0.3}px;right:-${svgSize*0.3}px;`; break;
    case "bottom-left":  posStyle = `bottom:-${svgSize*0.3}px;left:-${svgSize*0.3}px;`; break;
    case "top-left":     posStyle = `top:-${svgSize*0.25}px;left:-${svgSize*0.25}px;`; break;
    case "bottom-right": posStyle = `bottom:-${svgSize*0.25}px;right:-${svgSize*0.25}px;`; break;
    case "center-left":  posStyle = `top:${(canvasH-svgSize)/2}px;left:-${svgSize*0.2}px;`; break;
    case "center-right": posStyle = `top:${(canvasH-svgSize)/2}px;right:-${svgSize*0.2}px;`; break;
    default:             posStyle = `top:0;right:0;`;
  }
  const transform = `rotate(${dec.rotation}deg) scale(${dec.scale})`;

  if (dec.isRing) {
    const sizeToMaxR = { sm: 0.9, md: 1.3, lg: 1.7, xl: 2.1 };
    const maxR  = Math.round(canvasW * (sizeToMaxR[dec.size] || 1.3));
    const gap   = Math.max(20, Math.round(canvasW * 0.062));
    const swMax = Math.max(2.5, canvasW * 0.0062);
    const swMin = Math.max(0.8, canvasW * 0.002);
    const originMap = {
      'top-right':    [canvasW, 0],          'bottom-left':  [0, canvasH],
      'top-left':     [0, 0],                'bottom-right': [canvasW, canvasH],
      'center-left':  [0, canvasH * 0.5],    'center-right': [canvasW, canvasH * 0.5],
    };
    const [ocx, ocy] = originMap[dec.position] || [canvasW*0.5, canvasH*0.62];
    const ringColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,1)');
    let rings = "";
    for (let r = gap; r <= maxR; r += gap) {
      const sw  = Math.max(swMin, swMax - (swMax - swMin) * (r / maxR)).toFixed(2);
      const op  = (0.82 * Math.pow(0.88, (r / gap) - 1)).toFixed(3);
      rings += `<circle cx="${ocx}" cy="${ocy}" r="${r}" fill="none" stroke="${ringColor}" stroke-width="${sw}" opacity="${op}"/>`;
    }
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}" style="position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:0;">${rings}</svg>`;
  }
  if (dec.isDots) {
    const spacing = Math.max(20, Math.round(canvasW * 0.052));
    const dotR    = Math.max(1.5, Math.round(canvasW * 0.003));
    const uid = Math.floor(Math.random() * 0xfffff).toString(16);
    const dotColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,0.20)');
    const focusMap = { 'top-right':['68%','32%'],'bottom-left':['32%','68%'],'top-left':['32%','32%'],'bottom-right':['68%','68%'],'center-left':['30%','50%'],'center-right':['70%','50%'] };
    const [fx, fy] = focusMap[dec.position] || ['50%', '50%'];
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}" style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;">
      <defs>
        <pattern id="dp${uid}" x="0" y="0" width="${spacing}" height="${spacing}" patternUnits="userSpaceOnUse"><circle cx="${spacing/2}" cy="${spacing/2}" r="${dotR}" fill="${dotColor}"/></pattern>
        <radialGradient id="dg${uid}" cx="${fx}" cy="${fy}" r="50%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="white" stop-opacity="1"/><stop offset="55%" stop-color="white" stop-opacity="0.30"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
        <mask id="dm${uid}"><rect width="${canvasW}" height="${canvasH}" fill="url(#dg${uid})"/></mask>
      </defs>
      <rect width="${canvasW}" height="${canvasH}" fill="url(#dp${uid})" mask="url(#dm${uid})"/>
    </svg>`;
  }
  if (dec.isCrossLines) {
    const spacing = Math.max(20, Math.round(canvasW * 0.026));
    const strokeW = Math.max(0.4, (canvasW * 0.0026)).toFixed(2);
    const uid = Math.floor(Math.random() * 0xfffff).toString(16);
    const lineColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,0.18)');
    const focusMap = { 'top-right':['68%','32%'],'bottom-left':['32%','68%'],'top-left':['32%','32%'],'bottom-right':['68%','68%'],'center-left':['30%','50%'],'center-right':['70%','50%'] };
    const [fx, fy] = focusMap[dec.position] || ['50%', '50%'];
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}" style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;">
      <defs>
        <pattern id="gp${uid}" x="0" y="0" width="${spacing}" height="${spacing}" patternUnits="userSpaceOnUse">
          <line x1="${spacing}" y1="0" x2="${spacing}" y2="${spacing}" stroke="${lineColor}" stroke-width="${strokeW}"/>
          <line x1="0" y1="${spacing}" x2="${spacing}" y2="${spacing}" stroke="${lineColor}" stroke-width="${strokeW}"/>
        </pattern>
        <radialGradient id="gg${uid}" cx="${fx}" cy="${fy}" r="50%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="white" stop-opacity="1"/><stop offset="55%" stop-color="white" stop-opacity="0.30"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
        <mask id="gm${uid}"><rect width="${canvasW}" height="${canvasH}" fill="url(#gg${uid})"/></mask>
      </defs>
      <rect width="${canvasW}" height="${canvasH}" fill="url(#gp${uid})" mask="url(#gm${uid})"/>
    </svg>`;
  }
  if (dec.isDiagonalLines) {
    const spacing = Math.max(20, Math.round(canvasW * 0.026));
    const strokeW = Math.max(0.4, canvasW * 0.0026).toFixed(2);
    const uid = Math.floor(Math.random() * 0xfffff).toString(16);
    const lineColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,0.15)');
    const focusMap = { 'top-right':['68%','32%'],'bottom-left':['32%','68%'],'top-left':['32%','32%'],'bottom-right':['68%','68%'],'center-left':['30%','50%'],'center-right':['70%','50%'] };
    const [fx, fy] = focusMap[dec.position] || ['50%', '50%'];
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}" style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;">
      <defs>
        <pattern id="dlp${uid}" x="0" y="0" width="${spacing}" height="${spacing}" patternUnits="userSpaceOnUse" patternTransform="rotate(45 ${canvasW/2} ${canvasH/2})">
          <line x1="0" y1="0" x2="0" y2="${spacing * 2}" stroke="${lineColor}" stroke-width="${strokeW}"/>
        </pattern>
        <radialGradient id="dlg${uid}" cx="${fx}" cy="${fy}" r="55%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="white" stop-opacity="1"/><stop offset="52%" stop-color="white" stop-opacity="0.25"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
        <mask id="dlm${uid}"><rect width="${canvasW}" height="${canvasH}" fill="url(#dlg${uid})"/></mask>
      </defs>
      <rect width="${canvasW}" height="${canvasH}" fill="url(#dlp${uid})" mask="url(#dlm${uid})"/>
    </svg>`;
  }
  if (dec.isStreetLines) {
    const sx = canvasW / 390, sy = canvasH / 844;
    const cxMap = { 'top-right':270,'bottom-left':120,'top-left':130,'bottom-right':260,'center-left':145,'center-right':245 };
    const cxBase = cxMap[dec.position] || 195;
    const cx = cxBase * sx, a = 88 * sx;
    const getRgb = (c) => { const m = c.match(/rgba\((\d+),\s*(\d+),\s*(\d+)/); return m ? [m[1],m[2],m[3]] : ['255','255','255']; };
    const [r,g,b] = getRgb(dec.color);
    const lines = [{ dx:0,op:0.16,w:1.0 },{ dx:30*sx,op:0.09,w:0.7 },{ dx:-30*sx,op:0.08,w:0.7 },{ dx:58*sx,op:0.05,w:0.5 },{ dx:-58*sx,op:0.04,w:0.5 }];
    const paths = lines.map(({ dx, op, w }) => {
      const x = cx + dx;
      const d = ['M',(x-a*0.45).toFixed(1),canvasH.toFixed(1),'C',(x+a*1.1).toFixed(1),(0.758*canvasH).toFixed(1),(x-a*1.1).toFixed(1),(0.509*canvasH).toFixed(1),x.toFixed(1),(0.5*canvasH).toFixed(1),'S',(x+a*1.1).toFixed(1),(0.225*canvasH).toFixed(1),(x+a*0.45).toFixed(1),'0'].join(' ');
      return `<path d="${d}" stroke="rgba(${r},${g},${b},${op})" stroke-width="${(w*sx).toFixed(2)}" fill="none"/>`;
    }).join('');
    const chevrons = [{ icx:44*sx,icy:82*sy },{ icx:350*sx,icy:410*sy },{ icx:36*sx,icy:760*sy }].map(({ icx, icy }) => {
      const s = 22*sx, tx=icx.toFixed(1), ty=(icy-s*0.38).toFixed(1), lx=(icx-s*0.42).toFixed(1), ly=(icy+s*0.28).toFixed(1), rx=(icx+s*0.42).toFixed(1);
      return `<path d="M ${lx},${ly} L ${tx},${ty} L ${rx},${ly}" stroke="rgba(${r},${g},${b},0.22)" stroke-width="${(2.8*sx).toFixed(2)}" fill="none"/>`;
    }).join('');
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}" style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;"><g fill="none" stroke-linecap="round" stroke-linejoin="round">${paths}${chevrons}</g></svg>`;
  }
  const glowSize = Math.round(svgSize * 0.90);
  const glowColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*([\d.]+)\)/, (_, r, g, b, a) => `rgba(${r},${g},${b},${Math.min(0.52, parseFloat(a) * 1.6).toFixed(2)})`);
  return `<div style="position:absolute;${posStyle}width:${glowSize}px;height:${glowSize}px;border-radius:50%;background:radial-gradient(circle,${glowColor} 0%,transparent 70%);transform:${transform};pointer-events:none;z-index:0;"></div>`;
}

function phoneSvg_REMOVED(canvasW, screenshotUrl, accentHex, showReflection = false) {
  const phoneW = Math.round(canvasW * 0.72);
  const mockupSrc = `${SERVER}/assets/iphone-mockup.png`;
  const ah = (accentHex || '#6c63ff').replace('#', '');
  const ar = parseInt(ah.slice(0, 2), 16);
  const ag = parseInt(ah.slice(2, 4), 16);
  const ab = parseInt(ah.slice(4, 6), 16);
  const phoneInner = `
    <div style="position:absolute;inset:9% 7% 3%;border-radius:26%;background:radial-gradient(circle at 50% 18%,rgba(${ar},${ag},${ab},0.16) 0%,transparent 40%),radial-gradient(circle at 52% 68%,rgba(6,10,18,0.24) 0%,transparent 72%);filter:blur(28px);opacity:0.9;transform:scale(1.02);pointer-events:none;z-index:0;"></div>

function ghostFrameHtml_REMOVED(canvasW, canvasH, recipe) {
  if (!recipe.ghostFrames) return '';
  const p = recipe.palette;
  const phoneW = Math.round(canvasW * 0.58);
  const getRgb = (hex) => { const h = (hex||'#6c63ff').replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; };
  const [r1,g1,b1] = getRgb(p.accent);
  const [r2,g2,b2] = getRgb(p.accent2);
  const bw = Math.max(1, Math.round(canvasW * 0.002));
  const glowPx = Math.round(canvasW * 0.04);
  const left  = `<div style="position:absolute;left:-14%;bottom:4%;width:${phoneW}px;aspect-ratio:${MK_W}/${MK_H};border-radius:11.5%/5.8%;border:${bw}px solid rgba(${r1},${g1},${b1},0.32);background:linear-gradient(160deg,rgba(${r1},${g1},${b1},0.05),transparent);box-shadow:0 0 ${glowPx}px rgba(${r1},${g1},${b1},0.15);transform:rotate(-9deg);opacity:0.75;pointer-events:none;z-index:1;"></div>`;
  const right = `<div style="position:absolute;right:-14%;bottom:4%;width:${phoneW}px;aspect-ratio:${MK_W}/${MK_H};border-radius:11.5%/5.8%;border:${bw}px solid rgba(${r2},${g2},${b2},0.28);background:linear-gradient(160deg,rgba(${r2},${g2},${b2},0.05),transparent);box-shadow:0 0 ${glowPx}px rgba(${r2},${g2},${b2},0.14);transform:rotate(8deg);opacity:0.65;pointer-events:none;z-index:1;"></div>`;
  return left + right;
}

function makeThumb(recipe, layout) {
  const copy = { ...SAMPLE_COPY, layout };
  const html = buildSlideHtml(recipe, copy, PLACEHOLDER_URL, CANVAS_W, CANVAS_H);
  const srcdoc = `<html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}body{overflow:hidden;}</style></head><body>${html}</body></html>`;
  const wrap = document.createElement('div');
  wrap.className = 'thumb-wrap';
  wrap.style.width  = THUMB_W + 'px';
  wrap.style.height = THUMB_H + 'px';
  const iframe = document.createElement('iframe');
  iframe.scrolling = 'no';
  iframe.style.cssText = `width:${CANVAS_W}px;height:${CANVAS_H}px;transform:scale(${SCALE});transform-origin:top left;`;
  iframe.srcdoc = srcdoc;
  wrap.appendChild(iframe);
  return wrap;
}

function makeDecoThumb(dec) {
  const CW = 900, CH = 700;
  const decObj = { ...dec, position:'top-right', scale:1.2, rotation:0, size:'lg' };
  const decHtml = decorationSvg(decObj, CW, CH);
  const bg = dec.bgStyle || 'linear-gradient(135deg,#f0eeff,#ddd5ff)';
  const html = `<div style="width:${CW}px;height:${CH}px;background:${bg};position:relative;overflow:hidden;">${decHtml}</div>`;
  const S = 0.20;
  const wrap = document.createElement('div');
  wrap.className = 'deco-wrap';
  wrap.style.cssText = `width:${Math.round(CW*S)}px;height:${Math.round(CH*S)}px;`;
  const iframe = document.createElement('iframe');
  iframe.scrolling = 'no';
  iframe.style.cssText = `width:${CW}px;height:${CH}px;transform:scale(${S});transform-origin:top left;border:none;`;
  iframe.srcdoc = `<html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;}body{overflow:hidden;}</style></head><body>${html}</body></html>`;
  wrap.appendChild(iframe);
  return wrap;
}

function addSection(id, title, desc, buildFn) {
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.id = id;
  sec.innerHTML = `<div class="section-header"><h2>${title}</h2><p>${desc}</p></div>`;
  const content = document.createElement('div');
  buildFn(content);
  sec.appendChild(content);
  document.getElementById('gallery').appendChild(sec);
}

addSection('colors', `色彩模式 (${COLOR_MODES.length}种)`, '所有色彩模式使用 hero 布局，体现各自的色调和特效触发条件', (el) => {
  const grid = document.createElement('div');
  grid.className = 'thumb-grid';
  COLOR_MODES.forEach(cm => {
    const recipe = { palette: cm.palette, typography: BASE_TYPO, decorations:[], ghostFrames: !!cm.ghostFrames, glassReflection: !cm.ghostFrames && cm.name !== 'dark' && cm.name !== 'earthy' };
    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.appendChild(makeThumb(recipe, 'hero'));
    item.innerHTML += `<div class="thumb-label"><strong>${cm.name}</strong>${cm.label}<br><span style="color:#6b7280;font-size:10px;">${cm.effect}</span></div>`;
    grid.appendChild(item);
  });
  el.appendChild(grid);
});

// Section 3: Axis Families
addSection('axes', '轴线家族 (4轴)', '每条轴线显示前4张幻灯片，体现内部视觉节奏的一致性', (el) => {
  const container = document.createElement('div');
  container.className = 'axis-group';
  AXES.forEach(axis => {
    const row = document.createElement('div');
    row.className = 'axis-row';
    row.innerHTML = `<h3 style="color:${axis.color}">${axis.label}</h3><p class="subsection-desc">${axis.desc}</p>`;
    const slides = document.createElement('div');
    slides.className = 'axis-slides';
    const recipe = { palette: COLOR_MODES[0].palette, typography: BASE_TYPO, decorations:[], ghostFrames:false, glassReflection:false };
    axis.slides.slice(0, 4).forEach((layout, i) => {
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.appendChild(makeThumb(recipe, layout));
      item.innerHTML += `<div class="thumb-label">${i+1}. ${layout}</div>`;
      slides.appendChild(item);
    });
    row.appendChild(slides);
    container.appendChild(row);
  });
  el.appendChild(container);
});

// Section 4: Decorations
addSection('decorations', `装饰元素 (${DECORATION_TYPES.length}种)`, '均置于右上角 top-right 位置、lg 尺寸展示。Blob/Geometric 系列以径向渐变光晕呈现；新增 4 种深色系装饰以深色背景展示', (el) => {
  const grid = document.createElement('div');
  grid.className = 'deco-grid';
  DECORATION_TYPES.forEach(dec => {
    const item = document.createElement('div');
    item.className = 'deco-item';
    item.appendChild(makeDecoThumb(dec));
    item.innerHTML += `<div class="thumb-label" style="max-width:180px;text-align:center;">${dec.label}</div>`;
    grid.appendChild(item);
  });
  el.appendChild(grid);
});

// Section 5: Qwen Logo Styles
addSection('qwen-styles', 'Qwen 风格对比 (6种)', '对同一个 App 名称，逐一测试6套风格 prompt 的真实出图效果，点击「重新生成」可反复查看', (el) => {
  const STYLES = [
    { index: 0, label: '皮革3D', desc: '高档皮革材质3D立体logo，双色对比，极简' },
    { index: 1, label: '流光渐变', desc: '流光渐变+液态流体，流星动态效果，扁平化极简，设计大师级质感' },
    { index: 2, label: '毛玻璃', desc: '毛玻璃磨砂质感，正负形设计手法，半透明叠层，现代iOS风格' },
    { index: 3, label: '复古美式', desc: '精致插画风，复古美式3色搭配，粗体复古质感，怀旧品牌氛围感' },
    { index: 4, label: '霓虹发光', desc: '霓虹发光效果，深色背景，柔和外发光，赛博朋克与苹果设计结合，最多3色' },
    { index: 5, label: '极简几何', desc: '现代极简扁平风格，白色线条轮廓主体，深蓝色背景，强对比辨识度，最多3色' },
  ];

  // URL input + regen all — same logic as production
  const controlRow = document.createElement('div');
  controlRow.className = 'qwen-demo-input-row';
  const input = document.createElement('input');
  input.className = 'qwen-demo-input';
  input.placeholder = 'App URL（与正式生成保持相同逻辑）';
  input.value = 'https://justyn.spailab.com/ev-calc.html';
  const regenAllBtn = document.createElement('button');
  regenAllBtn.className = 'qwen-regen-all-btn';
  regenAllBtn.textContent = '全部重新生成';
  const clearCacheBtn = document.createElement('button');
  clearCacheBtn.className = 'qwen-regen-all-btn';
  clearCacheBtn.style.cssText = 'border-color:rgba(255,255,255,0.15);color:var(--muted);';
  clearCacheBtn.textContent = '清除缓存';
  controlRow.appendChild(input);
  controlRow.appendChild(regenAllBtn);
  controlRow.appendChild(clearCacheBtn);
  el.appendChild(controlRow);

  const grid = document.createElement('div');
  grid.className = 'qwen-grid';

  const CACHE_KEY_PREFIX = 'qwen_style_logo_';

  function cacheKey(styleIndex) {
    const url = input.value.trim() || 'https://justyn.spailab.com/ev-calc.html';
    return CACHE_KEY_PREFIX + styleIndex + '_' + url;
  }

  function showCachedOrEmpty(logoWrap, styleIndex) {
    const cached = localStorage.getItem(cacheKey(styleIndex));
    if (cached) {
      const img = document.createElement('img');
      img.src = cached;
      logoWrap.innerHTML = '';
      logoWrap.appendChild(img);
    } else {
      logoWrap.innerHTML = `<div class="qwen-logo-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M12 8v8"/></svg><span>点击生成</span></div>`;
    }
  }

  const cards = STYLES.map(style => {
    const card = document.createElement('div');
    card.className = 'qwen-card';

    const logoWrap = document.createElement('div');
    logoWrap.className = 'qwen-logo-wrap';
    showCachedOrEmpty(logoWrap, style.index);

    const meta = document.createElement('div');
    meta.className = 'qwen-card-meta';
    meta.innerHTML = `<div class="qwen-card-label">${style.label}</div><div class="qwen-card-desc">${style.desc}</div>`;

    const btn = document.createElement('button');
    btn.className = 'qwen-regen-btn';
    btn.textContent = localStorage.getItem(cacheKey(style.index)) ? '重新生成' : '生成';

    card.appendChild(logoWrap);
    card.appendChild(meta);
    card.appendChild(btn);
    grid.appendChild(card);

    async function generate() {
      const url = input.value.trim() || 'https://justyn.spailab.com/ev-calc.html';
      btn.disabled = true;
      btn.textContent = '生成中…';
      // 生成前先清掉旧缓存，确保失败时显示空状态而非旧结果
      localStorage.removeItem(cacheKey(style.index));
      logoWrap.innerHTML = `<div class="qwen-logo-placeholder"><div class="qwen-spinner"></div><span>生成中</span></div>`;
      try {
        const res = await fetch(`/api/suggest-app-logo-qwen?url=${encodeURIComponent(url)}&styleIndex=${style.index}`);
        const data = await res.json();
        if (data && data.imageDataUrl) {
          try { localStorage.setItem(cacheKey(style.index), data.imageDataUrl); } catch (_) {}
          const img = document.createElement('img');
          img.src = data.imageDataUrl;
          logoWrap.innerHTML = '';
          logoWrap.appendChild(img);
        } else {
          logoWrap.innerHTML = `<div class="qwen-logo-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M12 8v8"/></svg><span class="qwen-error">生成失败，请重试</span></div>`;
        }
      } catch (e) {
        console.error('[qwen-logo] generate error:', e);
        logoWrap.innerHTML = `<div class="qwen-logo-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M12 8v8"/></svg><span class="qwen-error">生成失败，请重试</span></div>`;
      }
      btn.disabled = false;
      btn.textContent = '重新生成';
    }

    btn.addEventListener('click', generate);
    return { generate, btn };
  });

  regenAllBtn.addEventListener('click', async () => {
    regenAllBtn.disabled = true;
    regenAllBtn.textContent = '生成中…';
    // 完全串行，避免触发 Qwen API 的 RPM 限制
    for (const c of cards) {
      await c.generate();
    }
    regenAllBtn.disabled = false;
    regenAllBtn.textContent = '全部重新生成';
  });

  clearCacheBtn.addEventListener('click', () => {
    STYLES.forEach(s => {
      // clear all cache keys for this style (any URL)
      Object.keys(localStorage).filter(k => k.startsWith(CACHE_KEY_PREFIX + s.index + '_')).forEach(k => localStorage.removeItem(k));
    });
    cards.forEach(({ btn }, i) => {
      showCachedOrEmpty(cards[i]?.logoWrap || document.createElement('div'), STYLES[i].index);
      btn.textContent = '生成';
    });
    // re-render all logo wraps to empty state
    document.querySelectorAll('.qwen-logo-wrap').forEach((wrap, i) => {
      wrap.innerHTML = `<div class="qwen-logo-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M12 8v8"/></svg><span>点击生成</span></div>`;
    });
    document.querySelectorAll('.qwen-regen-btn').forEach(b => { b.textContent = '生成'; });
  });

  el.appendChild(grid);
});

// Section 6: Fonts
addSection('fonts', '字体精选 (2种)', '中文 PingFang SC · 英文 Inter，系统内置无需加载', (el) => {
  const SAMPLES = {
    zh: { headline: '一目了然<br>效率倍增', subtitle: '专注真正重要的事' },
    en: { headline: 'See Everything<br>At a Glance', subtitle: 'Focus on what matters' },
  };

  const buildCards = () => {
    el.innerHTML = '';
    ['zh', 'en'].forEach(lang => {
      const fonts = FONT_PAIRINGS.filter(fp => fp.lang === lang);
      const heading = document.createElement('div');
      heading.className = 'subsection-title';
      heading.textContent = lang === 'zh' ? '中文字体' : 'English Fonts';
      el.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'font-grid';
      fonts.forEach(fp => {
        const { headline, subtitle } = SAMPLES[lang];
        const card = document.createElement('div');
        card.className = 'font-card';
        card.innerHTML = `
          <div class="sample" style="font-family:${fp.font};font-weight:${fp.weight};letter-spacing:${fp.tracking};">${headline}</div>
          <div class="meta">${fp.label}<br><span style="opacity:0.6;">weight ${fp.weight} · tracking ${fp.tracking}</span></div>`;
        grid.appendChild(card);
      });
      el.appendChild(grid);
    });
  };

  // 先显示 loading 占位
  const loading = document.createElement('div');
  loading.style.cssText = 'padding:20px;color:var(--muted);font-size:13px;';
  loading.textContent = '字体加载中…';
  el.appendChild(loading);

  // 等所有字体加载完毕后再渲染，确保字形正确显示
  const fontLoads = FONT_PAIRINGS.map(fp => {
    const family = fp.font.split(',')[0].replace(/"/g, '').trim();
    return document.fonts.load(`${fp.weight} 48px "${family}"`);
  });
  Promise.all(fontLoads).then(buildCards).catch(buildCards);
});

</script>
