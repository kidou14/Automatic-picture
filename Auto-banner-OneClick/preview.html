<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store Screenshots — OneClick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #34d399;
      --text: #f0f0f5;
      --muted: #6b7280;
      --radius: 12px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 52px;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
    }
    .nav-title { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .nav-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
      border-radius: 999px; color: var(--accent2); letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .nav-spacer { flex: 1; }
    .nav-hint { font-size: 11px; color: var(--muted); }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      gap: 18px;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 32px 60px;
      align-items: start;
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      flex: 0 0 300px;
      width: 300px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
      position: sticky;
      top: 70px;
    }

    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; letter-spacing: 0.7px;
      text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 7px;
    }
    .panel-header-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    .form {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .form-label .req { color: var(--accent2); }
    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 11px;
      color: var(--text);
      font-size: 13px; font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
      resize: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); font-size: 12px; }

    .btn-generate {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: white; font-size: 13px; font-weight: 700;
      border: none; cursor: pointer;
      letter-spacing: 0.1px;
      transition: opacity 0.18s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-generate:active { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── STATUS SECTION (left panel bottom) ── */
    .status-section {
      padding: 0 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-row {
      display: flex; align-items: center; gap: 8px;
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 999px;
      border: 1px solid var(--border);
    }
    .status-pill.running  { border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.08); color: #fbbf24; }
    .status-pill.completed{ border-color: rgba(52,211,153,0.35); background: rgba(52,211,153,0.08); color: var(--green); }
    .status-pill.failed   { border-color: rgba(251,113,133,0.35); background: rgba(251,113,133,0.08); color: #fb7185; }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .status-dot.pulse { animation: pulse 1.1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .mood-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; color: var(--muted);
    }
    .color-swatches { display: flex; gap: 3px; }
    .color-swatch {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .progress-wrap {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .event-log {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px; line-height: 1.75; color: var(--muted);
      font-family: "SF Mono", "Fira Code", monospace;
      max-height: 120px;
      overflow-y: auto;
    }
    .event-log .ev { display: flex; gap: 5px; }
    .event-log .ok  .dot { color: var(--green); }
    .event-log .run .dot { color: var(--accent2); }
    .event-log .error .dot { color: #fb7185; }
    .event-log .dim .dot { color: #2a2d38; }
    .event-log .dot { font-size: 8px; padding-top: 3px; flex-shrink: 0; }

    /* ── RIGHT PANEL ── */
    .panel-right {
      flex: 1 1 auto;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      overflow: hidden;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .toolbar-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .toolbar-select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px;
      color: var(--text); font-size: 12px; font-family: inherit;
      outline: none; cursor: pointer;
    }
    .toolbar-select:focus { border-color: var(--accent); }
    .toolbar-select option { background: #1a1a22; }
    .toolbar-sep { width: 1px; height: 18px; background: var(--border); }
    .toolbar-spacer { flex: 1; }
    .lang-checkboxes { display: flex; align-items: center; gap: 8px; }
    .lang-check {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--text); cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface2);
      transition: border-color 0.15s;
    }
    .lang-check:has(input:checked) { border-color: var(--accent); color: var(--accent2); }
    .lang-check input { accent-color: var(--accent); cursor: pointer; margin: 0; }

    .btn-regenerate {
      padding: 5px 14px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-regenerate:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-regenerate:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-export-all {
      padding: 5px 14px; border-radius: 6px;
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: white; font-size: 12px; font-weight: 700;
      border: none; cursor: pointer;
      transition: opacity 0.18s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-export-all:hover { opacity: 0.85; }
    .btn-export-all:disabled { opacity: 0.35; cursor: not-allowed; }

    .toolbar-mood {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .toolbar-mood-swatches { display: flex; gap: 3px; }
    .toolbar-mood-swatch {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 72px 32px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      color: var(--muted);
    }
    .empty-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: rgba(240,240,245,0.5); }
    .empty-state p  { font-size: 13px; line-height: 1.6; max-width: 300px; }

    /* ── SLIDE GRID ── */
    .slides-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }
    .slides-batch-divider {
      grid-column: 1 / -1;
      height: 0;
    }
    .slides-size-header {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 4px 0 2px;
      border-bottom: 1px solid rgba(124,58,237,0.25);
    }

    /* ── SLIDE CARD ── */
    .slide-card {
      display: flex; flex-direction: column; gap: 7px;
      cursor: pointer;
    }
    .slide-frame-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #111;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .slide-card:hover .slide-frame-wrap {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(108,99,255,0.25);
    }
    .slide-frame-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      border: none;
      pointer-events: none;
      transform-origin: top left;
    }
    .slide-hover-overlay {
      position: absolute; inset: 0;
      background: rgba(108,99,255,0.72);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.18s; z-index: 10;
      font-size: 11px; font-weight: 700; color: white;
      letter-spacing: 0.5px; flex-direction: column; gap: 5px;
    }
    .slide-card:hover .slide-hover-overlay { opacity: 1; }
    .slide-meta {
      display: flex; align-items: center; justify-content: space-between;
    }
    .slide-num   { font-size: 10px; font-weight: 700; color: var(--muted); }
    .slide-title { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .slide-lang-badge {
      position: absolute; top: 7px; right: 7px; z-index: 2;
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(0,0,0,0.55); color: #fff;
    }
    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: #1e1e2e; border: 1px solid var(--border);
      color: #e8e8f0; font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap; z-index: 9999;
    }
    #toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="toast"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-dot"></div>
  <span class="nav-title">App Store Screenshots</span>
  <span class="nav-badge">OneClick</span>
  <div class="nav-spacer"></div>
  <span class="nav-hint" id="nav-hint">Enter your app URL to get started</span>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="form">
      <div class="form-group">
        <label class="form-label">App URL <span class="req">*</span></label>
        <input class="form-input" type="url" id="app-url"
          value="https://justyn.spailab.com/ev-calc.html"
          placeholder="http://localhost:3000" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label">App Name <span id="app-name-ai-badge" style="font-size:10px;color:var(--accent2);font-weight:600;opacity:0;transition:opacity 0.3s;">✦ AI 自动取名</span></label>
        <input class="form-input" type="text" id="app-name"
          placeholder="点击 Generate 自动生成" autocomplete="off" />
      </div>
      <button class="btn-generate" id="btn-generate" onclick="startGenerate()">
        ✦ &nbsp;Generate
      </button>
    </div>

    <!-- STATUS -->
    <div class="status-section" id="status-section" style="display:none">
      <div class="status-row">
        <div class="status-pill running" id="status-pill">
          <div class="status-dot pulse" id="status-dot"></div>
          <span id="status-text">Generating…</span>
        </div>
      </div>
      <div class="mood-row" id="mood-row" style="display:none">
        <span id="mood-name-left"></span>
        <div class="color-swatches" id="color-swatches-left"></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill" id="progress-bar"></div>
      </div>
      <div class="event-log" id="event-log"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <span class="toolbar-label">Size</span>
      <div class="lang-checkboxes">
        <label class="lang-check"><input type="checkbox" name="size" value="1080x1920" checked> 1080*1920</label>
        <label class="lang-check"><input type="checkbox" name="size" value="1320x2868"> 6.9"</label>
        <label class="lang-check"><input type="checkbox" name="size" value="1284x2778"> 6.5"</label>
        <label class="lang-check"><input type="checkbox" name="size" value="1206x2622"> 6.3"</label>
        <label class="lang-check"><input type="checkbox" name="size" value="1125x2436"> 6.1"</label>
      </div>
      <div class="toolbar-sep"></div>
      <span class="toolbar-label">Lang</span>
      <div class="lang-checkboxes">
        <label class="lang-check"><input type="checkbox" id="lang-zh" value="zh" checked> 中文</label>
        <label class="lang-check"><input type="checkbox" id="lang-en" value="en"> EN</label>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-mood" id="toolbar-mood" style="display:none">
        <span id="toolbar-mood-name"></span>
        <div class="toolbar-mood-swatches" id="toolbar-mood-swatches"></div>
        <div class="toolbar-sep"></div>
      </div>
      <div class="toolbar-spacer"></div>
      <button class="btn-regenerate" id="btn-regenerate" onclick="regenerate()" disabled>
        ↺ New Style
      </button>
      <button class="btn-export-all" id="btn-export-all" onclick="exportAll()" disabled>
        ↓ Export All
      </button>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <h3>No screenshots yet</h3>
      <p>Fill in your app details on the left and click Generate — a unique visual style is created automatically every time.</p>
    </div>

    <!-- SLIDES GRID -->
    <div class="slides-grid" id="slides-grid" style="display:none"></div>

  </div>
</div>

<script src="/render-engine.js"></script>
<script>
// ─── Constants ───────────────────────────────────────────────────────────────
// SERVER, MK_W/MK_H, SC_*, decorationSvg, phoneSvg, ghostFrameHtml, buildSlideHtml
// are now in render-engine.js — edit there to update both preview and design-gallery.
const EXPORT_SIZES = {
  "1320x2868": { w: 1320, h: 2868 },
  "1284x2778": { w: 1284, h: 2778 },
  "1206x2622": { w: 1206, h: 2622 },
  "1125x2436": { w: 1125, h: 2436 },
  "1080x1920": { w: 1080, h: 1920 },
};
const SIZE_LABELS = {
  "1320x2868": "6.9",
  "1284x2778": "6.5",
  "1206x2622": "6.3",
  "1125x2436": "6.1",
  "1080x1920": "1080*1920",
};

let currentJob = null;
let pollTimer = null;
let currentSlides = [];
let lastInputs = null;

// ─── UI helpers ───────────────────────────────────────────────────────────────

function setStatusPill(state, text) {
  const pill = document.getElementById("status-pill");
  const dot  = document.getElementById("status-dot");
  const txt  = document.getElementById("status-text");
  pill.className = "status-pill " + state;
  dot.className  = "status-dot" + (state === "running" ? " pulse" : "");
  txt.textContent = text;
}

function setProgress(pct) {
  document.getElementById("progress-bar").style.width = pct + "%";
}

function appendEvents(events, seen) {
  const log = document.getElementById("event-log");
  let added = false;
  for (const ev of events) {
    const key = ev.ts + ev.message;
    if (seen.has(key)) continue;
    seen.add(key);
    const div = document.createElement("div");
    div.className = `ev ${ev.type}`;
    div.innerHTML = `<span class="dot">●</span><span>${ev.message}</span>`;
    log.appendChild(div);
    added = true;
  }
  if (added) log.scrollTop = log.scrollHeight;
}

function showMoodInfo(recipe) {
  // Left panel mood row
  document.getElementById("mood-name-left").textContent = recipe.mood;
  const swL = document.getElementById("color-swatches-left");
  swL.innerHTML = "";
  [recipe.palette.bg, recipe.palette.accent, recipe.palette.accent2, recipe.palette.text].forEach((c) => {
    const dot = document.createElement("div");
    dot.className = "color-swatch";
    dot.style.background = c;
    swL.appendChild(dot);
  });
  document.getElementById("mood-row").style.display = "flex";

  // Toolbar mood
  document.getElementById("toolbar-mood-name").textContent = recipe.mood;
  const swT = document.getElementById("toolbar-mood-swatches");
  swT.innerHTML = "";
  [recipe.palette.bg, recipe.palette.accent, recipe.palette.accent2, recipe.palette.text].forEach((c) => {
    const dot = document.createElement("div");
    dot.className = "toolbar-mood-swatch";
    dot.style.background = c;
    swT.appendChild(dot);
  });
  document.getElementById("toolbar-mood").style.display = "flex";
  document.getElementById("nav-hint").textContent = recipe.mood + " · " + recipe.harmony;
}

// ─── Slide rendering (functions are in render-engine.js) ─────────────────────

function decorationSvg_REMOVED_SEE_RENDER_ENGINE() {
  const sizeMap = { sm: 1.30, md: 1.80, lg: 2.30, xl: 2.80 };
  const svgSize = canvasW * (sizeMap[dec.size] || 0.6);
  let posStyle = "";
  switch (dec.position) {
    case "top-right":    posStyle = `top:-${svgSize*0.3}px;right:-${svgSize*0.3}px;`; break;
    case "bottom-left":  posStyle = `bottom:-${svgSize*0.3}px;left:-${svgSize*0.3}px;`; break;
    case "top-left":     posStyle = `top:-${svgSize*0.25}px;left:-${svgSize*0.25}px;`; break;
    case "bottom-right": posStyle = `bottom:-${svgSize*0.25}px;right:-${svgSize*0.25}px;`; break;
    case "center-left":  posStyle = `top:${(canvasH-svgSize)/2}px;left:-${svgSize*0.2}px;`; break;
    case "center-right": posStyle = `top:${(canvasH-svgSize)/2}px;right:-${svgSize*0.2}px;`; break;
    default:             posStyle = `top:0;right:0;`;
  }
  const transform = `rotate(${dec.rotation}deg) scale(${dec.scale})`;

  if (dec.isRing) {
    // Mono-luxe concentric rings — all values canvas-relative to match old project's visual scale
    // Old project used absolute px (gap=24, sw=2.5) in a ~390px CSS space; here we scale by canvasW/390
    const sizeToMaxR = { sm: 0.9, md: 1.3, lg: 1.7, xl: 2.1 };
    const maxR  = Math.round(canvasW * (sizeToMaxR[dec.size] || 1.3));
    const gap   = Math.max(20, Math.round(canvasW * 0.062));   // 24px@390 → ~82px@1320
    const swMax = Math.max(2.5, canvasW * 0.0062);             // 2.5px@390 → ~8.2px@1320
    const swMin = Math.max(0.8, canvasW * 0.002);              // 0.8px@390 → ~2.6px@1320
    const originMap = {
      'top-right':    [canvasW, 0],
      'bottom-left':  [0,       canvasH],
      'top-left':     [0,       0],
      'bottom-right': [canvasW, canvasH],
      'center-left':  [0,       canvasH * 0.5],
      'center-right': [canvasW, canvasH * 0.5],
    };
    const [ocx, ocy] = originMap[dec.position] || [canvasW * 0.5, canvasH * 0.62];
    const ringColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,1)');
    let rings = "";
    for (let r = gap; r <= maxR; r += gap) {
      const sw = Math.max(swMin, swMax - (swMax - swMin) * (r / maxR)).toFixed(2);
      const op = (0.82 * Math.pow(0.88, (r / gap) - 1)).toFixed(3);
      rings += `<circle cx="${ocx}" cy="${ocy}" r="${r}" fill="none" stroke="${ringColor}" stroke-width="${sw}" opacity="${op}"/>`;
    }
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}"
      style="position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:0;">${rings}</svg>`;
  }
  if (dec.isDots) {
    // Electric-neon style: subtle dot tile across full canvas with radial ellipse mask
    // Exact replication of CSS: background-image radial-gradient 1.5px dot / 20px grid
    // + mask-image radial-gradient ellipse (black 0%, 0.30 at 55%, transparent 100%)
    // spacing and dotR canvas-relative: old project used 20px/1.5px in ~390px CSS space
    // at 1320px physical canvas that's 3.4× larger → scale accordingly
    const spacing = Math.max(20, Math.round(canvasW * 0.052));  // 20px@390 → ~69px@1320
    const dotR    = Math.max(1.5, Math.round(canvasW * 0.003)); // 1.5px@390 → ~4px@1320
    const uid = Math.floor(Math.random() * 0xfffff).toString(16);
    // 0.20 base opacity per dot — matches electric-neon rgba(..., 0.20) exactly
    const dotColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,0.20)');
    // Shift mask focus with dec.position — mirrors how --pattern-x/y varies per slide in old project
    const focusMap = {
      'top-right':    ['68%', '32%'], 'bottom-left':  ['32%', '68%'],
      'top-left':     ['32%', '32%'], 'bottom-right': ['68%', '68%'],
      'center-left':  ['30%', '50%'], 'center-right': ['70%', '50%'],
    };
    const [fx, fy] = focusMap[dec.position] || ['50%', '50%'];
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}"
      style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;">
      <defs>
        <pattern id="dp${uid}" x="0" y="0" width="${spacing}" height="${spacing}" patternUnits="userSpaceOnUse">
          <circle cx="${spacing/2}" cy="${spacing/2}" r="${dotR}" fill="${dotColor}"/>
        </pattern>
        <radialGradient id="dg${uid}" cx="${fx}" cy="${fy}" r="50%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="white" stop-opacity="1"/>
          <stop offset="55%"  stop-color="white" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <mask id="dm${uid}">
          <rect width="${canvasW}" height="${canvasH}" fill="url(#dg${uid})"/>
        </mask>
      </defs>
      <rect width="${canvasW}" height="${canvasH}" fill="url(#dp${uid})" mask="url(#dm${uid})"/>
    </svg>`;
  }
  if (dec.isCrossLines) {
    // Refined subtle grid: same pattern+mask system as dots — full canvas, radial ellipse fade
    // 0.4px hairline stroke, 24px spacing, 0.18 base opacity, centered radial fade to transparent
    // spacing and strokeW canvas-relative: old project used 10px/1px in ~390px CSS space
    const spacing = Math.max(20, Math.round(canvasW * 0.026));           // 10px@390 → ~34px@1320
    const strokeW = Math.max(0.4, (canvasW * 0.0026)).toFixed(2);        // 1px@390  → ~3.4px@1320
    const uid = Math.floor(Math.random() * 0xfffff).toString(16);
    // 0.18 base opacity — slightly lower than dots (0.20) for even more delicate feel
    const lineColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,0.18)');
    // Same focus-shift logic as dots
    const focusMap = {
      'top-right':    ['68%', '32%'], 'bottom-left':  ['32%', '68%'],
      'top-left':     ['32%', '32%'], 'bottom-right': ['68%', '68%'],
      'center-left':  ['30%', '50%'], 'center-right': ['70%', '50%'],
    };
    const [fx, fy] = focusMap[dec.position] || ['50%', '50%'];
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}"
      style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;">
      <defs>
        <pattern id="gp${uid}" x="0" y="0" width="${spacing}" height="${spacing}" patternUnits="userSpaceOnUse">
          <line x1="${spacing}" y1="0" x2="${spacing}" y2="${spacing}" stroke="${lineColor}" stroke-width="${strokeW}"/>
          <line x1="0" y1="${spacing}" x2="${spacing}" y2="${spacing}" stroke="${lineColor}" stroke-width="${strokeW}"/>
        </pattern>
        <radialGradient id="gg${uid}" cx="${fx}" cy="${fy}" r="50%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="white" stop-opacity="1"/>
          <stop offset="55%"  stop-color="white" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <mask id="gm${uid}">
          <rect width="${canvasW}" height="${canvasH}" fill="url(#gg${uid})"/>
        </mask>
      </defs>
      <rect width="${canvasW}" height="${canvasH}" fill="url(#gp${uid})" mask="url(#gm${uid})"/>
    </svg>`;
  }
  if (dec.isDiagonalLines) {
    // Dark-bold style: 45-degree diagonal stripes with radial ellipse mask
    const spacing = Math.max(20, Math.round(canvasW * 0.026));
    const strokeW = Math.max(0.4, canvasW * 0.0026).toFixed(2);
    const uid = Math.floor(Math.random() * 0xfffff).toString(16);
    const lineColor = dec.color.replace(/rgba\((\d+),\s*(\d+),\s*(\d+),\s*[\d.]+\)/, 'rgba($1,$2,$3,0.15)');
    const focusMap = {
      'top-right':    ['68%','32%'], 'bottom-left':  ['32%','68%'],
      'top-left':     ['32%','32%'], 'bottom-right': ['68%','68%'],
      'center-left':  ['30%','50%'], 'center-right': ['70%','50%'],
    };
    const [fx, fy] = focusMap[dec.position] || ['50%','50%'];
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}"
      style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;">
      <defs>
        <pattern id="dlp${uid}" x="0" y="0" width="${spacing}" height="${spacing}" patternUnits="userSpaceOnUse" patternTransform="rotate(45 ${canvasW/2} ${canvasH/2})">
          <line x1="0" y1="0" x2="0" y2="${spacing * 2}" stroke="${lineColor}" stroke-width="${strokeW}"/>
        </pattern>
        <radialGradient id="dlg${uid}" cx="${fx}" cy="${fy}" r="55%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="white" stop-opacity="1"/>
          <stop offset="52%"  stop-color="white" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <mask id="dlm${uid}">
          <rect width="${canvasW}" height="${canvasH}" fill="url(#dlg${uid})"/>
        </mask>
      </defs>
      <rect width="${canvasW}" height="${canvasH}" fill="url(#dlp${uid})" mask="url(#dlm${uid})"/>
    </svg>`;
  }
  if (dec.isStreetLines) {
    // Street-drop style: S-curve lines with accent chevron icons
    const sx = canvasW / 390, sy = canvasH / 844;
    const cxMap = {
      'top-right': 270, 'bottom-left': 120, 'top-left': 130,
      'bottom-right': 260, 'center-left': 145, 'center-right': 245,
    };
    const cxBase = cxMap[dec.position] || 195;
    const cx = cxBase * sx;
    const a  = 88 * sx;
    const getRgb = (c) => { const m = c.match(/rgba\((\d+),\s*(\d+),\s*(\d+)/); return m ? [m[1],m[2],m[3]] : ['255','255','255']; };
    const [r,g,b] = getRgb(dec.color);
    const lines = [
      { dx: 0,       op: 0.16, w: 1.0 },
      { dx: 30*sx,   op: 0.09, w: 0.7 },
      { dx: -30*sx,  op: 0.08, w: 0.7 },
      { dx: 58*sx,   op: 0.05, w: 0.5 },
      { dx: -58*sx,  op: 0.04, w: 0.5 },
    ];
    const paths = lines.map(({ dx, op, w }) => {
      const x = cx + dx;
      const d = [
        'M', (x - a*0.45).toFixed(1), canvasH.toFixed(1),
        'C', (x + a*1.1).toFixed(1),  (0.758*canvasH).toFixed(1),
             (x - a*1.1).toFixed(1),  (0.509*canvasH).toFixed(1),
             x.toFixed(1),             (0.5*canvasH).toFixed(1),
        'S', (x + a*1.1).toFixed(1),  (0.225*canvasH).toFixed(1),
             (x + a*0.45).toFixed(1), '0',
      ].join(' ');
      return `<path d="${d}" stroke="rgba(${r},${g},${b},${op})" stroke-width="${(w*sx).toFixed(2)}" fill="none"/>`;
    }).join('');
    const chevronPositions = [
      { icx: 44*sx, icy: 82*sy }, { icx: 350*sx, icy: 410*sy }, { icx: 36*sx, icy: 760*sy },
    ];
    const chevrons = chevronPositions.map(({ icx, icy }) => {
      const s = 22 * sx;
      const tx = icx.toFixed(1), ty = (icy - s*0.38).toFixed(1);
      const lx = (icx - s*0.42).toFixed(1), ly = (icy + s*0.28).toFixed(1), rx = (icx + s*0.42).toFixed(1);
      return `<path d="M ${lx},${ly} L ${tx},${ty} L ${rx},${ly}" stroke="rgba(${r},${g},${b},0.22)" stroke-width="${(2.8*sx).toFixed(2)}" fill="none"/>`;
    }).join('');
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}"
      style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;">
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">${paths}${chevrons}</g>
    </svg>`;
  }
  // Glow: pure CSS radial-gradient div — matches old project's natural breathing feel
  // No SVG filter blur; the gradient fades smoothly to transparent on its own,
  // identical to the .render-slide::before/::after approach in appstore-auto-screenshots.
  const glowSize = Math.round(svgSize * 0.90);
  // Boost alpha to match old project's luminosity (old: rgba(accent, 0.48) * opacity 0.7 ≈ 0.34 center)
  const glowColor = dec.color.replace(
    /rgba\((\d+),\s*(\d+),\s*(\d+),\s*([\d.]+)\)/,
    (_, r, g, b, a) => `rgba(${r},${g},${b},${Math.min(0.52, parseFloat(a) * 1.6).toFixed(2)})`
  );
  return `<div style="position:absolute;${posStyle}width:${glowSize}px;height:${glowSize}px;border-radius:50%;background:radial-gradient(circle,${glowColor} 0%,transparent 70%);transform:${transform};pointer-events:none;z-index:0;"></div>`;
}

function ghostFrameHtml_REMOVED_SEE_RENDER_ENGINE(canvasW, canvasH, recipe) {
  if (!recipe.ghostFrames) return '';
  const p = recipe.palette;
  const phoneW = Math.round(canvasW * 0.58);
  const getRgb = (hex) => {
    const h = (hex||'#6c63ff').replace('#','');
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  };
  const [r1,g1,b1] = getRgb(p.accent);
  const [r2,g2,b2] = getRgb(p.accent2);
  const bw = Math.max(1, Math.round(canvasW * 0.002));
  const glowPx = Math.round(canvasW * 0.04);
  const left  = `<div style="position:absolute;left:-14%;bottom:4%;width:${phoneW}px;aspect-ratio:${MK_W}/${MK_H};border-radius:11.5%/5.8%;border:${bw}px solid rgba(${r1},${g1},${b1},0.32);background:linear-gradient(160deg,rgba(${r1},${g1},${b1},0.05),transparent);box-shadow:0 0 ${glowPx}px rgba(${r1},${g1},${b1},0.15);transform:rotate(-9deg);opacity:0.75;pointer-events:none;z-index:1;"></div>`;
  const right = `<div style="position:absolute;right:-14%;bottom:4%;width:${phoneW}px;aspect-ratio:${MK_W}/${MK_H};border-radius:11.5%/5.8%;border:${bw}px solid rgba(${r2},${g2},${b2},0.28);background:linear-gradient(160deg,rgba(${r2},${g2},${b2},0.05),transparent);box-shadow:0 0 ${glowPx}px rgba(${r2},${g2},${b2},0.14);transform:rotate(8deg);opacity:0.65;pointer-events:none;z-index:1;"></div>`;

      <div style="position:absolute;bottom:${Math.round(canvasH*0.08)}px;left:${Math.round(canvasW*0.08)}px;z-index:10;max-width:${Math.round(canvasW*0.58)}px;">
        <div style="font-size:${headlineSize}px;font-weight:${t.headlineWeight};letter-spacing:${t.headlineTracking};line-height:1.1;color:${p.text};overflow-wrap:break-word;word-break:keep-all;">${headline}</div>
        <div style="font-size:${subtitleSize}px;color:${p.muted};margin-top:${Math.round(canvasH*0.02)}px;line-height:1.5;overflow-wrap:break-word;word-break:keep-all;">${subtitle}</div>
      </div>
      <div style="position:absolute;top:0;right:-4%;z-index:5;">${phoneWide}</div>`;
  } else if (layout === "bottom-left") {
    innerHtml = `
      <div style="position:absolute;bottom:${Math.round(canvasH*0.08)}px;right:${Math.round(canvasW*0.08)}px;z-index:10;max-width:${Math.round(canvasW*0.58)}px;text-align:right;">
        <div style="font-size:${headlineSize}px;font-weight:${t.headlineWeight};letter-spacing:${t.headlineTracking};line-height:1.1;color:${p.text};overflow-wrap:break-word;word-break:keep-all;">${headline}</div>
        <div style="font-size:${subtitleSize}px;color:${p.muted};margin-top:${Math.round(canvasH*0.02)}px;line-height:1.5;overflow-wrap:break-word;word-break:keep-all;">${subtitle}</div>
      </div>
      <div style="position:absolute;top:0;left:-4%;z-index:5;">${phoneWide}</div>`;
  } else {
    innerHtml = `
      <div style="position:absolute;bottom:${Math.round(canvasH*0.06)}px;left:0;right:0;text-align:center;z-index:10;padding:0 ${Math.round(canvasW*0.08)}px;">
        <div style="font-size:${headlineSize}px;font-weight:${t.headlineWeight};letter-spacing:${t.headlineTracking};line-height:1.1;color:${p.text};overflow-wrap:break-word;word-break:keep-all;">${headline}</div>
        <div style="font-size:${subtitleSize}px;color:${p.muted};margin-top:${Math.round(canvasH*0.015)}px;line-height:1.5;overflow-wrap:break-word;word-break:keep-all;">${subtitle}</div>
      </div>
      <div style="position:absolute;top:${Math.round(canvasH*0.04)}px;left:50%;transform:translateX(-50%);z-index:5;">${phoneMid}</div>`;
  }

  return `<div data-export-root style="width:${canvasW}px;height:${canvasH}px;background:linear-gradient(160deg,${p.bg} 0%,${p.bgEnd} 100%);font-family:${t.font};position:relative;overflow:hidden;flex-shrink:0;">${decorHtml}${ghosts}${innerHtml}</div>`;
}

// ─── Render slides ────────────────────────────────────────────────────────────

function renderSlides(job) {
  const grid = document.getElementById("slides-grid");
  grid.innerHTML = "";
  currentSlides = [];

  const recipe = job.recipe;
  const copies = recipe.copies || { en: recipe.copy || [] };
  const shots  = job.screenshots;
  const langNames = { zh: "中文", en: "EN" };
  const sizeKeys = getSelectedSizes();
  let globalIdx = 0;

  for (let sizeIdx = 0; sizeIdx < sizeKeys.length; sizeIdx++) {
    const sizeKey = sizeKeys[sizeIdx];
    const { w: CANVAS_W, h: CANVAS_H } = EXPORT_SIZES[sizeKey];

    if (sizeIdx > 0) {
      const divider = document.createElement("div");
      divider.className = "slides-batch-divider";
      grid.appendChild(divider);
    }

    if (sizeKeys.length > 1) {
      const sizeHeader = document.createElement("div");
      sizeHeader.className = "slides-size-header";
      sizeHeader.textContent = `${SIZE_LABELS[sizeKey] ? SIZE_LABELS[sizeKey] + '"' : sizeKey}  ·  ${CANVAS_W}×${CANVAS_H}`;
      grid.appendChild(sizeHeader);
    }

    const langs = Object.keys(copies);
    for (let langIdx = 0; langIdx < langs.length; langIdx++) {
      const lang  = langs[langIdx];
      if (langIdx > 0) {
        const divider = document.createElement("div");
        divider.className = "slides-batch-divider";
        grid.appendChild(divider);
      }
      const copy  = copies[lang] || [];
      const count = Math.min(copy.length, shots.length, 5);

      for (let i = 0; i < count; i++) {
        const copySlide    = copy[i];
        const screenshotUrl = shots[i]?.imageDataUrl || "";
        const html          = buildSlideHtml(recipe, copySlide, screenshotUrl, CANVAS_W, CANVAS_H);
        const slideIdx      = globalIdx;
        currentSlides.push({ index: slideIdx, html, copySlide, lang, sizeKey, shotIdx: i });

        const card = document.createElement("div");
        card.className = "slide-card";
        card.style.position = "relative";

        const frameWrap = document.createElement("div");
        frameWrap.className = "slide-frame-wrap";
        frameWrap.style.aspectRatio = `${CANVAS_W}/${CANVAS_H}`;
        frameWrap.setAttribute("data-slide-index", slideIdx);
        frameWrap.setAttribute("data-canvas-w", CANVAS_W);

        const iframeId = `slide-iframe-${slideIdx}`;
        const iframe = document.createElement("iframe");
        iframe.id = iframeId;
        iframe.scrolling = "no";
        iframe.style.cssText = `width:${CANVAS_W}px;height:${CANVAS_H}px;border:none;transform-origin:top left;transform:scale(1);`;
        iframe.srcdoc = html;

        const langBadge = document.createElement("div");
        langBadge.className = "slide-lang-badge";
        langBadge.textContent = langNames[lang] || lang;

        const hoverOverlay = document.createElement("div");
        hoverOverlay.className = "slide-hover-overlay";
        hoverOverlay.textContent = "↓ Export";

        frameWrap.appendChild(iframe);
        frameWrap.appendChild(langBadge);
        frameWrap.appendChild(hoverOverlay);

        frameWrap.addEventListener("click", () => exportSingleSlide(slideIdx));

        const meta = document.createElement("div");
        meta.className = "slide-meta";
        meta.innerHTML = `<span class="slide-num">${String(slideIdx + 1).padStart(2,"0")}</span><span class="slide-title">${(copySlide.layout||"").toUpperCase()}</span>`;

        card.appendChild(frameWrap);
        card.appendChild(meta);
        grid.appendChild(card);
        globalIdx++;
      }
    }
  }

  // Scale iframes to fit their containers
  requestAnimationFrame(() => scaleIframes(globalIdx));

  document.getElementById("empty-state").style.display = "none";
  grid.style.display = "grid";
  document.getElementById("btn-regenerate").disabled = false;
  document.getElementById("btn-export-all").disabled = false;
}

function scaleIframes(count) {
  const grid = document.getElementById("slides-grid");
  for (let i = 0; i < count; i++) {
    const wrap   = grid.querySelector(`[data-slide-index="${i}"]`);
    const iframe = document.getElementById(`slide-iframe-${i}`);
    if (!wrap || !iframe) continue;
    const canvasW = parseInt(wrap.getAttribute("data-canvas-w") || "1320", 10);
    const wrapW = wrap.getBoundingClientRect().width;
    if (wrapW > 0) iframe.style.transform = `scale(${wrapW / canvasW})`;
  }
}

function escapeAttr(str) {
  return str.replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// ─── Export ───────────────────────────────────────────────────────────────────

let _toastTimer = null;
function showToast(msg, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.borderColor = isError ? "rgba(255,80,80,0.4)" : "var(--border)";
  el.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove("show"), isError ? 4000 : 2500);
}

async function exportSingleSlide(slideIndex) {
  const slide = currentSlides[slideIndex];
  if (!slide) return;
  const sizeKey = slide.sizeKey || getSelectedSizes()[0];
  const { w, h } = EXPORT_SIZES[sizeKey];
  const shots     = currentJob.screenshots;
  const shotUrl   = shots[slide.shotIdx ?? slideIndex]?.imageDataUrl || "";
  const slideHtml = buildSlideHtml(recipe, slide.copySlide, shotUrl, w, h);
  const appSlug   = (currentJob.appNameHint || "app").replace(/\s+/g,"-").toLowerCase();
  const langTag   = slide.lang ? `-${slide.lang}` : "";

  try {
    const res = await fetch(`${SERVER}/api/render-exports`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ folderName: `${appSlug}-${SIZE_LABELS[sizeKey]||sizeKey}in-${w}x${h}`, files: [{
        filename: `${String(slideIndex+1).padStart(2,"0")}${langTag}-${slide.copySlide.layout||"slide"}-${SIZE_LABELS[sizeKey]||sizeKey}in-${w}x${h}.png`,
        width: w, height: h, markup: slideHtml, styles: "",
      }] }),
    });
    if (!res.ok) { const e = await res.json(); showToast("导出失败：" + e.error, true); return; }
    const data = await res.json();
    showToast("✅ 已保存至 " + (data.files[0]?.path || data.directory));
  } catch (err) { showToast("导出出错：" + err.message, true); }
}

async function exportAll() {
  const btn = document.getElementById("btn-export-all");
  btn.disabled = true; btn.textContent = "Exporting…";
  const sizeKeys = getSelectedSizes();
  const recipe  = currentJob.recipe;
  const shots   = currentJob.screenshots;
  const appSlug = (currentJob.appNameHint || "app").replace(/\s+/g,"-").toLowerCase();

  const rawFiles = [];
  let totalSaved = 0;
  let lastDir = "";
  for (const sizeKey of sizeKeys) {
    const { w, h } = EXPORT_SIZES[sizeKey];
    const inchLabel = SIZE_LABELS[sizeKey] || sizeKey;
    const files = currentSlides.filter(s => s.sizeKey === sizeKey).map((slide, i) => {
      const shotUrl = shots[slide.shotIdx ?? i]?.imageDataUrl || "";
      const langTag = slide.lang ? `-${slide.lang}` : "";
      return {
        filename: `${String(i+1).padStart(2,"0")}${langTag}-${slide.copySlide.layout||"slide"}-${inchLabel}in-${w}x${h}.png`,
        width: w, height: h, markup: buildSlideHtml(recipe, slide.copySlide, shotUrl, w, h), styles: "",
      };
    });
    try {
      const res = await fetch(`${SERVER}/api/render-exports`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ folderName: `${appSlug}-${inchLabel}in-${w}x${h}`, files, rawFiles }),
      });
      if (!res.ok) { const e = await res.json(); showToast("导出失败：" + e.error, true); break; }
      const d = await res.json();
      totalSaved += d.count || 0;
      lastDir = d.directory || lastDir;
    } catch (err) { showToast("导出出错：" + err.message, true); break; }
  }
  if (totalSaved > 0) showToast(`✅ ${totalSaved} 张已保存至 ${lastDir}`);
  btn.disabled = false;
  btn.innerHTML = "↓ Export All";
}

// ─── Generate pipeline ────────────────────────────────────────────────────────

function getSelectedSizes() {
  const checked = [...document.querySelectorAll('input[name="size"]:checked')];
  return checked.length ? checked.map(el => el.value) : ["1320x2868"];
}

function getSelectedLanguages() {
  const langs = [];
  if (document.getElementById("lang-zh").checked) langs.push("zh");
  if (document.getElementById("lang-en").checked) langs.push("en");
  return langs.length ? langs : ["zh"];
}

async function startGenerate() {
  const url = document.getElementById("app-url").value.trim();
  if (!url) { document.getElementById("app-url").focus(); return; }

  document.getElementById("btn-generate").disabled = true;

  // Step 1: Generate App Name
  await suggestAppNameFromUrl(url);

  // Step 2: Run screenshot pipeline
  const appName = document.getElementById("app-name").value.trim();
  const languages = getSelectedLanguages();
  lastInputs = { url, appName, desc: "", languages };
  runCapture(url, appName, "", languages);
}

function regenerate() {
  if (!lastInputs) return;
  runCapture(lastInputs.url, lastInputs.appName, lastInputs.desc, lastInputs.languages || ["en"]);
}

async function runCapture(url, appName, desc, languages = ["en"]) {
  document.getElementById("btn-generate").disabled   = true;
  document.getElementById("btn-regenerate").disabled = true;
  document.getElementById("btn-export-all").disabled = true;
  document.getElementById("event-log").innerHTML     = "";
  document.getElementById("mood-row").style.display  = "none";
  document.getElementById("toolbar-mood").style.display = "none";
  document.getElementById("status-section").style.display = "flex";
  document.getElementById("progress-bar").style.width = "0%";
  setStatusPill("running", "Generating…");
  document.getElementById("nav-hint").textContent = "Capturing screenshots…";

  let jobId;
  try {
    const res = await fetch(`${SERVER}/api/oneclick-capture`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, appName, description: desc, languages }),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || "Server error"); }
    jobId = (await res.json()).jobId;
  } catch (err) {
    setStatusPill("failed", "Failed: " + err.message);
    document.getElementById("btn-generate").disabled = false;
    return;
  }

  const seenEvents = new Set();
  pollTimer = setInterval(async () => {
    try {
      const job = await fetch(`${SERVER}/api/capture-jobs/${jobId}`).then(r => r.json());
      appendEvents(job.events || [], seenEvents);
      if (job.total > 0) setProgress(5 + (job.completed / job.total) * 60);
      if (job.recipe) { showMoodInfo(job.recipe); setProgress(85); }

      if (job.status === "completed") {
        clearInterval(pollTimer);
        setProgress(100);
        setStatusPill("completed", "Done · " + (job.recipe?.mood || ""));
        currentJob = job;
        renderSlides(job);
        document.getElementById("btn-generate").disabled = false;
      } else if (job.status === "failed") {
        clearInterval(pollTimer);
        setStatusPill("failed", "Failed: " + (job.error || "unknown"));
        document.getElementById("btn-generate").disabled   = false;
        document.getElementById("btn-regenerate").disabled = false;
      }
    } catch (e) { console.warn("poll:", e); }
  }, 800);
}

// Rescale iframes on window resize
window.addEventListener("resize", () => {
  if (!currentSlides.length) return;
  scaleIframes(currentSlides.length, 1320);
});

// ─── AI App Name Auto-suggest ─────────────────────────────────────────────────

let _nameSuggestController = null;

async function suggestAppNameFromUrl(url) {
  const nameInput = document.getElementById("app-name");
  const badge = document.getElementById("app-name-ai-badge");

  // Don't overwrite if user has already typed something manually
  if (nameInput.value.trim() && !nameInput.dataset.aiGenerated) return;

  // Cancel any in-flight request
  if (_nameSuggestController) _nameSuggestController.abort();
  _nameSuggestController = new AbortController();

  nameInput.disabled = true;
  nameInput.placeholder = "AI 分析中…";
  badge.style.opacity = "0";

  try {
    const res = await fetch(`${SERVER}/api/suggest-app-name?url=${encodeURIComponent(url)}`, {
      signal: _nameSuggestController.signal,
    });
    if (!res.ok) throw new Error("suggest failed");
    const data = await res.json();
    if (data.name) {
      nameInput.value = data.name;
      nameInput.dataset.aiGenerated = "1";
      badge.style.opacity = "1";
    } else {
      nameInput.placeholder = "输入 URL 后 AI 自动生成";
    }
  } catch (e) {
    if (e.name !== "AbortError") {
      nameInput.placeholder = "输入 URL 后 AI 自动生成";
    }
  } finally {
    nameInput.disabled = false;
  }
}

// Clear the AI-generated flag when user manually edits the name
document.getElementById("app-name").addEventListener("input", () => {
  delete document.getElementById("app-name").dataset.aiGenerated;
  document.getElementById("app-name-ai-badge").style.opacity = "0";
});
