<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Logo · OneClick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.08);
      --accent: #00d4b4;
      --accent-dim: rgba(0,212,180,0.15);
      --accent-border: rgba(0,212,180,0.35);
      --text: #f0f0f5;
      --muted: #8b8ba0;
      --radius: 12px;
      --danger: #f87171;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
      min-height: 100vh;
    }

    .page {
      max-width: 1040px;
      margin: 0 auto;
      padding: 56px 32px 80px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* ── Header ── */
    header { display: flex; flex-direction: column; gap: 8px; }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #00d4b4 0%, #4f8ef7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* ── Input card ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-row { display: flex; gap: 10px; align-items: center; }

    .url-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .generate-btn {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #00d4b4 0%, #4f8ef7 100%);
      color: #08080f;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }
    .generate-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

    .model-row { display: flex; gap: 8px; }
    .model-btn, .rule-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .model-btn.active, .rule-btn.active {
      border-color: var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .model-btn:hover:not(.active), .rule-btn:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .prompt-hint {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: 7px;
      border-left: 2px solid var(--accent-border);
      flex: 1;
    }

    /* ── Results grid ── */
    .result-area { display: flex; flex-direction: column; gap: 20px; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .regen-btn {
      padding: 7px 16px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .regen-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .regen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    /* ── Logo card ── */
    .logo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-index {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* card: loading */
    .card-loading {
      aspect-ratio: 1;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; color: var(--muted); }

    /* card: image */
    .card-img-wrap {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
      box-shadow: 0 0 24px rgba(0,212,180,0.08), 0 8px 24px rgba(0,0,0,0.5);
    }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* card: error */
    .card-error {
      aspect-ratio: 1;
      border-radius: 10px;
      background: rgba(248,113,113,0.06);
      border: 1px solid rgba(248,113,113,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-size: 11px;
      color: var(--danger);
      text-align: center;
      line-height: 1.5;
    }

    .card-footer { display: flex; justify-content: center; }
    .download-btn {
      width: 100%;
      padding: 8px 0;
      border-radius: 7px;
      border: 1px solid var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .download-btn:hover { background: var(--accent); color: #08080f; border-color: var(--accent); }
    .download-btn.disabled { opacity: 0.3; pointer-events: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="page">

  <header>
    <h1>Auto Logo</h1>
    <p>输入 App URL，一键并行生成 6 个方案</p>
  </header>

  <div class="input-card">
    <div class="input-row">
      <input
        id="urlInput"
        class="url-input"
        type="text"
        placeholder="https://your-app.com"
        value="https://justyn.spailab.com/ev-calc.html"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="generateBtn" class="generate-btn">Generate</button>
    </div>
    <div class="bottom-row">
      <div class="model-row">
        <button class="model-btn active" data-model="gemini">Gemini 3.1</button>
        <button class="model-btn" data-model="gemini3pro">Gemini 3 Pro</button>
        <button class="model-btn" data-model="gpt5">GPT-5</button>
        <button class="model-btn" data-model="gpt5mini">GPT-5 Mini</button>
      </div>
<div class="prompt-hint">风格：<span id="promptHint">加载中…</span></div>
    </div>
  </div>

  <!-- Results -->
  <div id="resultArea" class="result-area hidden">
    <div class="result-header">
      <div class="result-label">生成结果</div>
      <button id="regenBtn" class="regen-btn">Regenerate</button>
    </div>
    <div class="logo-grid" id="logoGrid">
      <!-- 6 cards injected by JS -->
    </div>
  </div>

</div>

<script>
  const BASE = "http://127.0.0.1:4319";
  const COUNT = 4;

  const urlInput    = document.getElementById("urlInput");
  const generateBtn = document.getElementById("generateBtn");
  const regenBtn    = document.getElementById("regenBtn");
  const resultArea  = document.getElementById("resultArea");
  const logoGrid    = document.getElementById("logoGrid");

  // Model selector
  let selectedModel = "gemini";
  document.querySelectorAll(".model-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedModel = btn.dataset.model;
      document.querySelectorAll(".model-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });

  const selectedRule = "new";
  function loadHint() {
    fetch(`${BASE}/api/prompt-hint?rule=${selectedRule}`)
      .then(r => r.json())
      .then(d => { document.getElementById("promptHint").textContent = d.hint || ""; })
      .catch(() => { document.getElementById("promptHint").textContent = ""; });
  }

  // Build card DOM, return { setLoading, setResult, setError }
  function createCard(index) {
    const card = document.createElement("div");
    card.className = "logo-card";
    card.innerHTML = `
      <div class="card-index">方案 ${index + 1}</div>
      <div class="card-loading">
        <div class="spinner"></div>
        <div class="loading-text">生成中…</div>
      </div>
      <div class="card-footer">
        <a class="download-btn disabled">Download PNG</a>
      </div>
    `;
    logoGrid.appendChild(card);

    const loading  = card.querySelector(".card-loading");
    const footer   = card.querySelector(".card-footer");
    const dlBtn    = card.querySelector(".download-btn");

    return {
      setResult(appName, dataUrl) {
        loading.outerHTML = `<div class="card-img-wrap"><img src="${dataUrl}" alt="Logo ${index+1}" /></div>`;
        const filename = `${appName.replace(/[^a-z0-9]/gi, "-").toLowerCase()}-logo-${index+1}.png`;
        // Resize to 512×512 via canvas before download (API may return 1024×1024)
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = 512; canvas.height = 512;
          canvas.getContext("2d").drawImage(img, 0, 0, 512, 512);
          dlBtn.href = canvas.toDataURL("image/png");
          dlBtn.download = filename;
          dlBtn.classList.remove("disabled");
        };
        img.src = dataUrl;
      },
      setError(msg) {
        loading.outerHTML = `<div class="card-error">${msg}</div>`;
      },
    };
  }

  async function fetchOne(url, card) {
    try {
      const res = await fetch(`${BASE}/api/generate-logo?url=${encodeURIComponent(url)}&model=${selectedModel}&rule=${selectedRule}`);
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
      if (!data.imageDataUrl) throw new Error("未收到图片");
      card.setResult(data.appName || url, data.imageDataUrl);
    } catch (err) {
      card.setError("生成失败：" + err.message);
    }
  }

  async function generate() {
    const raw = urlInput.value.trim();
    if (!raw) { urlInput.focus(); return; }
    let url = raw;
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;

    generateBtn.disabled = true;
    regenBtn.disabled = true;
    resultArea.classList.remove("hidden");
    logoGrid.innerHTML = "";

    const cards = Array.from({ length: COUNT }, (_, i) => createCard(i));
    await Promise.all(cards.map((card, i) => fetchOne(url, card)));

    generateBtn.disabled = false;
    regenBtn.disabled = false;
  }

  generateBtn.addEventListener("click", generate);
  regenBtn.addEventListener("click", generate);
  urlInput.addEventListener("keydown", e => { if (e.key === "Enter") generate(); });

  loadHint();
</script>

</body>
</html>
