<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>App Store Screenshot Auto-Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #34d399;
    --text: #f0f0f5;
    --muted: #6b7280;
    --radius: 12px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP NAV ── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .nav-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
    border-radius: 999px; color: var(--accent2); letter-spacing: 0.5px;
  }

  /* ── HERO SECTION ── */
  .hero {
    padding: 72px 32px 56px;
    max-width: 860px; margin: 0 auto; text-align: center;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent2); margin-bottom: 24px;
  }
  .hero-tag::before { content: ''; width: 18px; height: 1px; background: var(--accent2); }
  .hero-tag::after  { content: ''; width: 18px; height: 1px; background: var(--accent2); }
  .hero h1 {
    font-size: clamp(32px, 5vw, 52px); font-weight: 800; line-height: 1.1;
    letter-spacing: -1.5px; margin-bottom: 20px;
  }
  .hero h1 span { background: linear-gradient(135deg, #6c63ff, #a78bfa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { font-size: 17px; color: var(--muted); line-height: 1.7; max-width: 560px; margin: 0 auto; }

  /* ── PHASE STEPS ── */
  .steps-section { padding: 0 32px 64px; max-width: 900px; margin: 0 auto; }
  .steps-title { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
  .steps { display: flex; gap: 0; overflow-x: auto; padding-bottom: 4px; }
  .step {
    flex: 1; min-width: 130px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 16px;
    position: relative;
    cursor: default;
    transition: border-color 0.2s, background 0.2s;
  }
  .step:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .step:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
  .step:not(:last-child) { border-right: none; }
  .step.active { background: rgba(108,99,255,0.08); border-color: rgba(108,99,255,0.4); }
  .step.done { background: rgba(52,211,153,0.05); border-color: rgba(52,211,153,0.25); }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    background: var(--surface2); color: var(--muted); margin-bottom: 10px;
  }
  .step.active .step-num { background: var(--accent); color: white; }
  .step.done .step-num { background: var(--green); color: white; }
  .step-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .step-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .step-arrow {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--muted); z-index: 2;
  }
  .step:last-child .step-arrow { display: none; }

  /* ── MAIN PANELS LAYOUT ── */
  .main {
    display: flex;
    flex-direction: row;
    gap: 18px;
    max-width: 1600px;
    margin: 0 auto;
    padding: 18px 32px 40px;
    align-items: start;
  }

  /* ── TOP PANEL: Input Form ── */
  .panel-left {
    flex: 0 0 320px;
    width: 320px;
    max-width: 320px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    overflow: hidden;
    position: sticky;
    top: 74px;
    align-self: start;
  }
  .panel-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-header-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .form {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.span-2 { grid-column: span 2; }
  .form-group.span-4 { grid-column: 1 / -1; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .form-label .required { color: #ffffff; }
  .form-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input.filled { border-color: rgba(52,211,153,0.4); color: var(--text); }
  .form-hint { font-size: 11px; color: var(--muted); line-height: 1.4; }

  .style-preset-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }
  .style-preset {
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.18s, transform 0.18s, background 0.18s, box-shadow 0.18s;
    text-align: left;
  }
  .style-preset:hover {
    border-color: rgba(108,99,255,0.38);
    transform: translateY(-1px);
    background: rgba(255,255,255,0.035);
  }
  .style-preset.selected {
    border-color: var(--accent);
    background: rgba(108,99,255,0.12);
    box-shadow: 0 10px 24px rgba(108,99,255,0.14);
  }
  .style-preset-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .style-preset-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .style-preset-swatches {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .style-preset-swatches span {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    flex: 0 0 auto;
  }
  .style-preset-desc {
    font-size: 11px;
    line-height: 1.45;
    color: var(--muted);
    min-height: 32px;
  }
  .btn-primary {
    width: 100%; padding: 11px; border-radius: 8px;
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    color: white; font-size: 13px; font-weight: 700;
    border: none; cursor: pointer; letter-spacing: 0.2px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .capture-status {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    font-size: 12px; line-height: 1.7; color: var(--muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .capture-status .ok { color: var(--green); }
  .capture-status .run { color: var(--accent2); }
  .capture-status .dim { color: #3d4451; }
  .capture-status .error { color: #fb7185; }

  /* ── PREVIEW PANEL ── */
  .panel-right {
    flex: 1 1 auto;
    width: calc(100% - 338px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    overflow: hidden;
    min-width: 0;
  }
  .panel-toolbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .toolbar-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .toolbar-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px;
    color: var(--text); font-size: 12px; font-family: inherit;
    outline: none; cursor: pointer;
  }
  .toolbar-sep { width: 1px; height: 20px; background: var(--border); }
  .btn-export {
    padding: 6px 16px; border-radius: 6px;
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    color: white; font-size: 12px; font-weight: 700;
    border: none; cursor: pointer; transition: opacity 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-export:hover { opacity: 0.85; }
  .btn-export-all {
    padding: 6px 14px; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-export-all:hover { border-color: var(--accent); color: var(--accent2); }
  .toolbar-spacer { flex: 1; }
  .size-badge {
    font-size: 11px; font-weight: 600; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px;
    font-family: 'SF Mono', monospace;
  }

  /* ── SLIDE GRID ── */
  .slide-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 18px;
  }

  /* ── SLIDE CARD ── */
  .slide-card {
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
  }
  .slide-frame-wrap {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    aspect-ratio: 1320/2868;
    background: #111;
  }
  .slide-card:hover .slide-frame-wrap {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(108,99,255,0.25);
  }
  .slide-hover-overlay {
    position: absolute; inset: 0;
    background: rgba(108,99,255,0.7);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s; z-index: 10;
    font-size: 11px; font-weight: 700; color: white; letter-spacing: 0.5px;
    flex-direction: column; gap: 6px;
  }
  .slide-hover-overlay svg { width: 20px; height: 20px; }
  .slide-card:hover .slide-hover-overlay { opacity: 1; }
  .slide-meta { display: flex; align-items: center; justify-content: space-between; }
  .slide-num { font-size: 11px; font-weight: 700; color: var(--muted); }
  .slide-title { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── IPHONE CANVAS (inside slide card) ── */
  .iphone-canvas {
    width: 100%; height: 100%;
    position: relative;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Slide 1: Hero — dark gradient */
  .s1 { background: linear-gradient(160deg, #0d0d1a 0%, #1a1040 50%, #0d1a2e 100%); }
  .s1 .phone-wrap { position: absolute; bottom: -4%; left: 50%; transform: translateX(-50%); width: 72%; }
  .s1 .caption { position: absolute; top: 10%; left: 0; right: 0; text-align: center; }
  .s1 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: rgba(167,139,250,0.7); font-weight: 600; margin-bottom: 5px; }
  .s1 .caption .hed { font-size: 16px; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; color: #fff; }
  .s1 .caption .hed em { color: #a78bfa; font-style: normal; }
  .s1 .glow { position: absolute; width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle, rgba(108,99,255,0.25) 0%, transparent 70%); top: 20%; left: 50%; transform: translateX(-50%); pointer-events: none; }

  /* Slide 2: Feature — warm light */
  .s2 { background: linear-gradient(160deg, #fdf6ef 0%, #f5e6d3 100%); }
  .s2 .phone-wrap { position: absolute; bottom: -4%; right: -5%; width: 75%; }
  .s2 .caption { position: absolute; top: 10%; left: 5%; width: 55%; }
  .s2 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: #d97706; font-weight: 600; margin-bottom: 5px; }
  .s2 .caption .hed { font-size: 14px; font-weight: 800; line-height: 1.15; letter-spacing: -0.3px; color: #1c0f00; }

  /* Slide 3: Feature — teal dark */
  .s3 { background: linear-gradient(160deg, #051520 0%, #0a2a3a 50%, #0d2030 100%); }
  .s3 .phone-back { position: absolute; bottom: -4%; left: -5%; width: 60%; opacity: 0.5; transform: rotate(-3deg); }
  .s3 .phone-front { position: absolute; bottom: -4%; right: -4%; width: 72%; }
  .s3 .caption { position: absolute; top: 10%; left: 0; right: 0; text-align: center; }
  .s3 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: rgba(52,211,153,0.7); font-weight: 600; margin-bottom: 5px; }
  .s3 .caption .hed { font-size: 15px; font-weight: 800; line-height: 1.1; color: #fff; }
  .s3 .caption .hed em { color: #34d399; font-style: normal; }

  /* Slide 4: Feature — contrast accent */
  .s4 { background: linear-gradient(160deg, #4338ca 0%, #6c63ff 50%, #7c3aed 100%); }
  .s4 .phone-wrap { position: absolute; bottom: -4%; left: 50%; transform: translateX(-50%); width: 70%; }
  .s4 .caption { position: absolute; top: 8%; left: 0; right: 0; text-align: center; }
  .s4 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 5px; }
  .s4 .caption .hed { font-size: 15px; font-weight: 800; line-height: 1.1; color: #fff; letter-spacing: -0.3px; }
  .s4 .blob { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.08); top: 30%; right: -20px; }

  /* Slide 5: Trust — minimal white */
  .s5 { background: linear-gradient(160deg, #fafafa 0%, #f0f0f8 100%); }
  .s5 .phone-wrap { position: absolute; bottom: -4%; left: 50%; transform: translateX(-50%); width: 68%; }
  .s5 .caption { position: absolute; top: 8%; left: 0; right: 0; text-align: center; }
  .s5 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: #6c63ff; font-weight: 600; margin-bottom: 5px; }
  .s5 .caption .hed { font-size: 14px; font-weight: 800; line-height: 1.15; color: #1a1a2e; }
  .s5 .stars { position: absolute; top: 35%; left: 0; right: 0; text-align: center; font-size: 10px; }

  /* Slide 6: More features — dark pills */
  .s6 { background: linear-gradient(160deg, #0d0d1a 0%, #13131e 100%); padding: 14px 10px; }
  .s6-inner { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .s6-icon { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, #6c63ff, #8b5cf6); margin-bottom: 2px; }
  .s6-hed { font-size: 10px; font-weight: 800; color: #fff; text-align: center; letter-spacing: -0.3px; }
  .s6-pills { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .s6-pill { font-size: 7px; font-weight: 600; padding: 3px 7px; border-radius: 999px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  .s6-pill.dim { color: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.05); }

  /* ── CSS PHONE MOCKUP ── */
  .css-phone {
    width: 100%; aspect-ratio: 390/844;
    border-radius: 13% / 6%;
    background: linear-gradient(160deg, #2a2a2e 0%, #1a1a1e 100%);
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.6);
    position: relative; overflow: hidden;
  }
  .css-phone-di {
    position: absolute; top: 1.8%; left: 50%; transform: translateX(-50%);
    width: 27%; height: 3%; border-radius: 999px; background: #111; z-index: 5;
  }
  .css-phone-screen {
    position: absolute; left: 3.5%; top: 2%; width: 93%; height: 96%;
    border-radius: 11% / 5%; overflow: hidden; background: #000;
  }
  /* ── APP SCREEN CONTENTS (simulated) ── */
  .app-home {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    padding: 8% 6% 4%;
    display: flex; flex-direction: column; gap: 5%;
  }
  .app-home-top { display: flex; align-items: center; justify-content: space-between; }
  .app-greeting { font-size: 20%; color: rgba(255,255,255,0.5); }
  .app-name-text { font-size: 30%; font-weight: 700; color: #fff; }
  .app-avatar { width: 12%; aspect-ratio: 1; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #a78bfa); }
  .app-balance-card {
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    border-radius: 8%; padding: 8%;
    display: flex; flex-direction: column; gap: 6%;
  }
  .app-bal-label { font-size: 18%; color: rgba(255,255,255,0.7); }
  .app-bal-num { font-size: 38%; font-weight: 800; color: #fff; }
  .app-bal-sub { font-size: 16%; color: rgba(255,255,255,0.6); }
  .app-row { display: flex; gap: 5%; }
  .app-tile {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 8%; padding: 10%;
    display: flex; flex-direction: column; gap: 8%;
  }
  .app-tile-icon { width: 25%; aspect-ratio: 1; border-radius: 6px; background: rgba(108,99,255,0.3); }
  .app-tile-label { font-size: 15%; color: rgba(255,255,255,0.6); }
  .app-tile-val { font-size: 22%; font-weight: 700; color: #fff; }
  .app-list-item {
    display: flex; align-items: center; gap: 5%;
    padding: 5% 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .app-list-dot { width: 8%; aspect-ratio: 1; border-radius: 50%; background: rgba(167,139,250,0.4); flex-shrink: 0; }
  .app-list-text { font-size: 18%; color: rgba(255,255,255,0.7); flex: 1; }
  .app-list-amt { font-size: 18%; font-weight: 700; color: #34d399; }

  .app-dashboard {
    width: 100%; height: 100%;
    background: #fff; padding: 8% 6% 4%;
    display: flex; flex-direction: column; gap: 4%;
  }
  .app-dash-header { font-size: 22%; font-weight: 700; color: #1a1a2e; }
  .app-chart {
    background: #f8f6ff; border-radius: 8%; padding: 8%;
    display: flex; flex-direction: column; gap: 6%;
  }
  .app-chart-label { font-size: 15%; color: #6b7280; }
  .app-chart-bars { display: flex; align-items: flex-end; gap: 4%; height: 30px; }
  .app-bar { flex: 1; border-radius: 3px 3px 0 0; background: rgba(108,99,255,0.15); }
  .app-bar.hi { background: #6c63ff; }
  .app-stat-row { display: flex; gap: 5%; }
  .app-stat { flex: 1; background: #f3f4f6; border-radius: 8%; padding: 8%; }
  .app-stat-lbl { font-size: 14%; color: #6b7280; }
  .app-stat-val { font-size: 26%; font-weight: 800; color: #1a1a2e; }

  .app-profile {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #0f1a2e 0%, #0a1020 100%);
    padding: 8% 6% 4%;
    display: flex; flex-direction: column; align-items: center; gap: 5%;
  }
  .app-prof-avatar { width: 22%; aspect-ratio: 1; border-radius: 50%; background: linear-gradient(135deg, #34d399, #059669); }
  .app-prof-name { font-size: 22%; font-weight: 700; color: #fff; }
  .app-prof-sub { font-size: 16%; color: rgba(255,255,255,0.5); margin-top: -4%; }
  .app-prof-stats { display: flex; gap: 6%; width: 100%; }
  .app-prof-stat { flex: 1; background: rgba(255,255,255,0.05); border-radius: 8%; padding: 8%; text-align: center; }
  .app-prof-stat-num { font-size: 22%; font-weight: 800; color: #34d399; }
  .app-prof-stat-lbl { font-size: 13%; color: rgba(255,255,255,0.4); }
  .app-list-full { width: 100%; display: flex; flex-direction: column; }

  .app-settings {
    width: 100%; height: 100%;
    background: #f2f2f7; padding: 8% 5% 0;
    display: flex; flex-direction: column; gap: 3%;
  }
  .app-set-title { font-size: 24%; font-weight: 700; color: #1c1c1e; }
  .app-set-section { background: #fff; border-radius: 6%; overflow: hidden; }
  .app-set-row {
    display: flex; align-items: center; padding: 6% 5%;
    border-bottom: 1px solid #f0f0f0; gap: 5%;
  }
  .app-set-row:last-child { border-bottom: none; }
  .app-set-icon { width: 10%; aspect-ratio: 1; border-radius: 30%; flex-shrink: 0; }
  .app-set-lbl { font-size: 16%; color: #1c1c1e; flex: 1; }
  .app-set-arr { font-size: 12%; color: #c7c7cc; }

  /* ── GENERATED SLIDES ── */
  .render-slide {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(160deg, var(--theme-bg-start), var(--theme-bg-end));
    color: var(--theme-text);
    isolation: isolate;
    container-type: inline-size;
  }
  .render-slide::before {
    content: "";
    position: absolute;
    inset: auto auto 10% -24%;
    width: 78%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--theme-accent) 48%, transparent) 0%, transparent 70%);
    pointer-events: none;
    opacity: var(--glow-strength, 0.7);
  }
  .render-slide::after {
    content: "";
    position: absolute;
    inset: 6% -18% auto auto;
    width: 62%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--theme-accent-2) 42%, transparent) 0%, transparent 72%);
    pointer-events: none;
    opacity: var(--glow-strength, 0.7);
  }
  /* Even slides: flip gradient to come from top-left / bottom-right instead */
  .glow-flip::before {
    inset: 16% auto auto -18%;
  }
  .glow-flip::after {
    inset: auto -12% 10% auto;
  }
  .render-copy {
    position: absolute;
    z-index: 3;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: none;
    overflow: hidden;
    isolation: isolate;
  }
  .render-headline,
  .render-subheadline {
    display: inline-block;
    width: auto;
    max-width: 100%;
    margin: 0 auto;
    white-space: nowrap;
  }
  .render-headline {
    font-size: var(--fit-font-size, 48px);
    line-height: 0.98;
    letter-spacing: var(--fit-letter-spacing, -1.4px);
    font-weight: 900;
    color: var(--theme-accent);
  }
  .render-subheadline {
    font-size: var(--fit-font-size, 20px);
    line-height: 1.28;
    letter-spacing: var(--fit-letter-spacing, -0.2px);
    font-weight: 400;
    color: color-mix(in srgb, var(--theme-text) 72%, transparent);
  }
  .render-device-wrap {
    position: absolute;
    z-index: 1;
    width: 72%;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%);
    transform-origin: 50% 100%;
  }
  .render-device {
    width: 100%;
    aspect-ratio: 1022 / 2082;
    padding: 0;
    border-radius: 0;
    background: transparent;
    position: relative;
    isolation: isolate;
  }
  .render-device::before {
    display: none;
  }
  .render-device-aura,
  .render-device-shadow,
  .render-device-chassis {
    position: absolute;
    pointer-events: none;
  }
  .render-device-aura {
    inset: 9% 7% 3%;
    border-radius: 26%;
    background:
      radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--theme-accent) 16%, transparent) 0%, transparent 40%),
      radial-gradient(circle at 52% 68%, rgba(6, 10, 18, 0.24) 0%, transparent 72%);
    filter: blur(28px);
    opacity: 0.9;
    transform: scale(1.02);
  }
  .render-device-shadow {
    inset: 11% 12% 1%;
    border-radius: 30%;
    background:
      radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.12) 0%, transparent 45%),
      radial-gradient(circle at 50% 76%, rgba(6, 10, 18, 0.34) 0%, transparent 68%);
    filter: blur(32px);
    opacity: 0.78;
    transform: translateY(4%);
  }
  .render-device-chassis {
    inset: 1.1% 2.8% 0.9%;
    border-radius: 11.5% / 5.8%;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02) 8%, rgba(8, 10, 14, 0.14) 100%),
      linear-gradient(120deg, rgba(245, 216, 160, 0.26), rgba(255, 255, 255, 0.06) 18%, rgba(24, 28, 36, 0.22) 52%, rgba(242, 222, 187, 0.18) 82%, rgba(255, 255, 255, 0.08));
    box-shadow:
      0 28px 56px rgba(3, 6, 14, 0.26),
      0 10px 22px rgba(3, 6, 14, 0.18);
    opacity: 0.42;
  }
  .render-screen {
    position: absolute;
    left: 5.088%;
    top: 2.209%;
    width: 89.824%;
    height: 95.581%;
    border-radius: 13.725% / 6.332%;
    overflow: hidden;
    padding: 0;
    background: #06080d;
    z-index: 3;
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.04),
      inset 0 -22px 40px rgba(0, 0, 0, 0.14),
      inset 0 22px 26px rgba(255, 255, 255, 0.03);
  }
  .render-screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 16%, transparent 78%, rgba(0, 0, 0, 0.08)),
      linear-gradient(90deg, rgba(255, 255, 255, 0.015), transparent 14%, transparent 86%, rgba(0, 0, 0, 0.04));
    z-index: 2;
    pointer-events: none;
  }
  .render-device-mockup {
    position: absolute;
    inset: 0;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  .preview-live-shell {
    width: 100%;
    height: 100%;
    min-height: 0;
    border-radius: inherit;
    overflow: hidden;
    position: relative;
    background:
      linear-gradient(180deg, rgba(14, 18, 28, 0.98), rgba(4, 7, 12, 0.98)),
      color-mix(in srgb, var(--theme-panel) 96%, #000);
  }
  .preview-live-image {
    width: 100%;
    height: 100%;
    object-fit: var(--preview-fit, cover);
    object-position: center top;
    display: block;
    background: #fff;
  }
  .preview-live-empty {
    width: 100%;
    height: 100%;
    position: relative;
    background:
      radial-gradient(circle at 50% 24%, rgba(255, 255, 255, 0.1), transparent 28%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
      linear-gradient(135deg, color-mix(in srgb, var(--theme-accent) 10%, #101522), color-mix(in srgb, var(--theme-accent-2) 8%, #0b1020));
  }
  .preview-live-empty.loading::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.12) 48%, transparent 100%);
    transform: translateX(-100%);
    animation: previewLoadingSweep 1.5s ease-in-out infinite;
  }
  .preview-loading-copy {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .preview-loading-line {
    height: 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.14);
  }
  .preview-loading-line.short { width: 34%; }
  .preview-loading-line.mid { width: 58%; }
  .preview-loading-line.long { width: 82%; }
  .render-copy-skeleton {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .render-copy-skeleton-headline {
    height: 36px;
    width: 50%;
    border-radius: 12px;
    background: color-mix(in srgb, var(--theme-text) 20%, transparent);
    animation: copySkeleton 1.4s ease-in-out infinite;
  }
  .render-copy-skeleton-subheadline {
    height: 15px;
    width: 50%;
    border-radius: 8px;
    background: color-mix(in srgb, var(--theme-text) 20%, transparent);
    animation: copySkeleton 1.4s ease-in-out infinite 0.4s;
  }
  @keyframes copySkeleton {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
  }
  .render-shot-showcase {
    width: 100%;
    height: 100%;
    border-radius: inherit;
    overflow: hidden;
    position: relative;
    background:
      linear-gradient(180deg, rgba(10, 12, 18, 0.98), rgba(4, 6, 10, 0.98)),
      rgba(8, 12, 20, 0.96);
  }
  .render-shot-image {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: var(--preview-fit, contain);
    object-position: center top;
    background: #fff;
  }
  .layout-standard .render-copy {
    top: calc(10% - 12px);
    left: 20%;
    right: 20%;
    align-items: center;
    text-align: center;
    gap: 3%;
  }
  .layout-standard .render-device-wrap {
    width: 76.38%;
    left: 50%;
    bottom: calc(8% - 20px);
    transform: translateX(-50%);
  }
  .layout-standard .render-headline {
    font-size: var(--fit-font-size, 44px);
  }
  .layout-standard .render-subheadline {
    max-width: 100%;
    margin-top: 12px;
  }

  /* ── GEOMETRIC PATTERNS ── */
  .render-pattern {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  /* mono-luxe: no pattern — decoration handled by concentric rings */
  /* electric-neon: dot matrix — mask origin shifts per slide */
  [data-style="electric-neon"] .render-pattern {
    background-image: radial-gradient(circle, rgba(56,189,248,0.20) 1.5px, transparent 1.5px);
    background-size: 20px 20px;
    -webkit-mask-image: radial-gradient(ellipse 85% 85% at var(--pattern-x, 50%) var(--pattern-y, 50%), black 0%, rgba(0,0,0,0.3) 55%, transparent 100%);
    mask-image: radial-gradient(ellipse 85% 85% at var(--pattern-x, 50%) var(--pattern-y, 50%), black 0%, rgba(0,0,0,0.3) 55%, transparent 100%);
  }
  /* dark-bold: diagonal scan lines — mask origin shifts per slide */
  [data-style="dark-bold"] .render-pattern {
    background-image: repeating-linear-gradient(
      45deg,
      rgba(139,124,255,0.12) 0, rgba(139,124,255,0.12) 1px,
      transparent 0, transparent 50%
    );
    background-size: 10px 10px;
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at var(--pattern-x, 50%) var(--pattern-y, 50%), black 0%, rgba(0,0,0,0.25) 52%, transparent 100%);
    mask-image: radial-gradient(ellipse 80% 80% at var(--pattern-x, 50%) var(--pattern-y, 50%), black 0%, rgba(0,0,0,0.25) 52%, transparent 100%);
  }
  /* warm-editorial: soft dots, bottom-left corner accent */
  [data-style="warm-editorial"] .render-pattern {
    background-image: radial-gradient(circle, rgba(217,119,6,0.30) 2px, transparent 2px);
    background-size: 22px 22px;
    -webkit-mask-image: radial-gradient(ellipse at var(--pattern-x, 0%) var(--pattern-y, 100%), black 0%, transparent 52%);
    mask-image: radial-gradient(ellipse at var(--pattern-x, 0%) var(--pattern-y, 100%), black 0%, transparent 52%);
  }
  /* soft-botanical: organic dots, top-right corner accent */
  [data-style="soft-botanical"] .render-pattern {
    background-image: radial-gradient(circle, rgba(79,122,90,0.32) 2.5px, transparent 2.5px);
    background-size: 28px 28px;
    -webkit-mask-image: radial-gradient(ellipse at var(--pattern-x, 100%) var(--pattern-y, 0%), black 0%, transparent 55%);
    mask-image: radial-gradient(ellipse at var(--pattern-x, 100%) var(--pattern-y, 0%), black 0%, transparent 55%);
  }
  /* clean-light: diagonal motion stripes fading in from bottom-right */
  [data-style="clean-light"] .render-pattern {
    inset: 0;
    border: none;
    border-radius: 0;
    background-image: repeating-linear-gradient(
      120deg,
      rgba(34,118,255,0.09) 0, rgba(34,118,255,0.09) 1px,
      transparent 0, transparent 44px
    );
    -webkit-mask-image: radial-gradient(ellipse at var(--pattern-x, 100%) var(--pattern-y, 100%), black 0%, transparent 62%);
    mask-image: radial-gradient(ellipse at var(--pattern-x, 100%) var(--pattern-y, 100%), black 0%, transparent 62%);
  }
  /* street-drop: bold diagonal racing chevrons, bottom-right corner */
  [data-style="street-drop"] .render-pattern {
    background: none;
    overflow: hidden;
  }
  [data-style="street-drop"] .render-pattern svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  /* street-drop: heavy uppercase headline */
  [data-style="street-drop"] .render-headline {
    text-transform: uppercase;
    letter-spacing: -0.03em;
    font-weight: 900;
  }
  /* street-drop: amplify the orange glow on dark bg */
  [data-style="street-drop"] .render-slide::before,
  [data-style="street-drop"] .render-slide::after {
    opacity: calc(var(--glow-strength, 0.7) * 1.35);
  }
  /* street-drop: yellow tinted subheadline */
  [data-style="street-drop"] .render-subheadline {
    color: color-mix(in srgb, var(--theme-accent-2) 45%, var(--theme-text));
  }

  /* acid-rave: dense neon green dot grid, bottom-left corner */
  [data-style="acid-rave"] .render-pattern {
    background-image: radial-gradient(circle, rgba(0, 255, 127, 0.26) 1.5px, transparent 1.5px);
    background-size: 16px 16px;
    -webkit-mask-image: radial-gradient(ellipse at var(--pattern-x, -5%) var(--pattern-y, 105%), black 0%, transparent 56%);
    mask-image: radial-gradient(ellipse at var(--pattern-x, -5%) var(--pattern-y, 105%), black 0%, transparent 56%);
  }
  /* acid-rave: electric glowing headline */
  [data-style="acid-rave"] .render-headline {
    text-shadow:
      0 0 20px color-mix(in srgb, var(--theme-accent) 70%, transparent),
      0 0 55px color-mix(in srgb, var(--theme-accent) 32%, transparent);
    text-transform: uppercase;
    letter-spacing: -0.02em;
    font-weight: 900;
  }
  /* acid-rave: hot pink subheadline tint */
  [data-style="acid-rave"] .render-subheadline {
    color: color-mix(in srgb, var(--theme-accent-2) 60%, var(--theme-text));
  }
  /* acid-rave: amplify the dual-color glow */
  [data-style="acid-rave"] .render-slide::before,
  [data-style="acid-rave"] .render-slide::after {
    opacity: calc(var(--glow-strength, 0.7) * 1.2);
  }

  /* mono-luxe: suppress glow for true minimalist luxury aesthetic */
  [data-style="mono-luxe"] .render-slide::before,
  [data-style="mono-luxe"] .render-slide::after {
    opacity: calc(var(--glow-strength, 0.7) * 0.15);
  }
  /* mono-luxe: thin headline with wide tracking — high-end brand typography */
  [data-style="mono-luxe"] .render-headline {
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  /* mono-luxe: concentric gold rings centered on device */
  .render-luxe-circle {
    display: none;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 0;
  }
  [data-style="mono-luxe"] .render-luxe-circle {
    display: block;
  }

  /* electric-neon: glowing headline text */
  [data-style="electric-neon"] .render-headline {
    text-shadow: 0 0 28px color-mix(in srgb, var(--theme-accent) 60%, transparent);
  }

  /* electric-neon: ghost phone silhouettes flanking the main mockup */
  .render-ghost-left,
  .render-ghost-right {
    display: none;
    position: absolute;
    width: 58%;
    aspect-ratio: 1022 / 2082;
    border-radius: 11.5% / 5.7%;
    pointer-events: none;
    z-index: 0;
  }
  [data-style="electric-neon"] .render-ghost-left,
  [data-style="electric-neon"] .render-ghost-right {
    display: block;
  }
  [data-style="electric-neon"] .render-ghost-left {
    left: -14%;
    bottom: calc(6% - 10px);
    border: 1.5px solid rgba(56,189,248,0.32);
    background: linear-gradient(160deg, rgba(56,189,248,0.05) 0%, rgba(9,18,39,0.08) 100%);
    box-shadow: 0 0 24px rgba(56,189,248,0.15), 0 0 48px rgba(56,189,248,0.06);
    transform: rotate(-9deg);
    opacity: 0.75;
  }
  [data-style="electric-neon"] .render-ghost-right {
    right: -14%;
    bottom: calc(6% - 10px);
    border: 1.5px solid rgba(139,92,246,0.28);
    background: linear-gradient(160deg, rgba(139,92,246,0.05) 0%, rgba(9,18,39,0.08) 100%);
    box-shadow: 0 0 24px rgba(139,92,246,0.14), 0 0 48px rgba(139,92,246,0.05);
    transform: rotate(8deg);
    opacity: 0.65;
  }
  /* ghost frames for inverted slides (device at top) */
  [data-style="electric-neon"].layout-inverted .render-ghost-left {
    bottom: auto;
    top: calc(6% - 10px);
    transform: rotate(9deg);
  }
  [data-style="electric-neon"].layout-inverted .render-ghost-right {
    bottom: auto;
    top: calc(6% - 10px);
    transform: rotate(-8deg);
  }

  /* ── FLOATING UI CARDS (electric-neon only) ── */
  .render-float-cards {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  [data-style="electric-neon"] .render-float-cards {
    display: block;
  }

  /* base card */
  .rfc {
    position: absolute;
    background: rgba(9,18,39,0.66);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 2.4cqw;
    display: flex;
    flex-direction: column;
    gap: 0.8cqw;
    padding: 2cqw 2.6cqw;
  }
  .rfc-value {
    font-family: 'Inter', sans-serif;
    font-size: 6.8cqw;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .rfc-label {
    font-family: 'Inter', sans-serif;
    font-size: 3.6cqw;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.02em;
    color: rgba(245,216,160,0.55);
  }

  /* stat card: two-line column layout */
  .rfc--stat { width: 34%; }

  /* badge card: circle shape */
  .rfc--badge {
    width: 22cqw;
    height: 22cqw;
    border-radius: 50%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2cqw;
    gap: 0;
  }
  .rfc-badge-text {
    font-family: 'Inter', sans-serif;
    font-size: 4.4cqw;
    font-weight: 600;
    color: rgba(245,216,160,0.92);
    white-space: normal;
    line-height: 1.25;
    letter-spacing: -0.01em;
    text-align: center;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  /* chart card: bars + label */
  .rfc--chart { width: 23%; gap: 1.2cqw; }
  .rfc-bars {
    display: flex;
    align-items: flex-end;
    gap: 0.7cqw;
    height: 4.8cqw;
  }
  .rfc-bar {
    flex: 1;
    height: var(--h, 50%);
    border-radius: 0.5cqw 0.5cqw 0 0;
    background: linear-gradient(to top, rgba(56,189,248,0.55), rgba(139,92,246,0.75));
  }

  /* ── GLASS REFLECTION PLATFORM (clean-light only) ── */
  .render-device-reflection {
    display: none;
    position: absolute;
    top: 100%;
    left: -6%;
    width: 112%;
    height: 56cqw;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  [data-style="clean-light"] .render-device-reflection {
    display: block;
  }
  /* contact line — soft frosted edge where phone meets surface */
  .render-device-reflection::before {
    content: "";
    position: absolute;
    top: 0;
    left: 8%;
    width: 84%;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(200, 220, 255, 0.5) 20%,
      rgba(220, 235, 255, 0.85) 50%,
      rgba(200, 220, 255, 0.5) 80%,
      transparent
    );
    z-index: 2;
  }
  /* cloned device — full content reflection with correct downward fade */
  .render-device-reflection-clone {
    position: absolute;
    top: 0;
    left: 6%;
    width: 88%;
    transform: scaleY(-1);
    transform-origin: center center;
    opacity: 0.24;
    filter: blur(0.6px) saturate(0.5) brightness(1.0);
    /* mask in pre-transform coords: bottom = phone bottom = contact line → opaque;
       top = phone top = far end → transparent */
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.55) 28%, rgba(0,0,0,0.15) 55%, transparent 78%);
    mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.55) 28%, rgba(0,0,0,0.15) 55%, transparent 78%);
    pointer-events: none;
  }
  /* aura/shadow are lighting artifacts — don't reflect them */
  .render-device-reflection-clone .render-device-aura,
  .render-device-reflection-clone .render-device-shadow {
    display: none;
  }

  /* Inverted layout: device at top, text at bottom (even-indexed slides) */
  .layout-inverted.layout-standard .render-copy {
    top: auto;
    bottom: calc(8% - 12px);
  }
  .layout-inverted.layout-standard .render-device-wrap {
    bottom: auto;
    top: calc(8% - 20px);
  }
  /* electric-neon inverted: add more breathing room at top to prevent mockup clipping */
  [data-style="electric-neon"] .layout-inverted.layout-standard .render-device-wrap {
    top: calc(8% + 4px);
  }

  .layout-pills {
    padding: 130px 80px;
  }
  .layout-pills .render-copy {
    position: static;
    align-items: center;
    text-align: center;
    gap: 26px;
  }
  .render-big-icon {
    width: 132px;
    height: 132px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2));
    box-shadow: 0 30px 60px color-mix(in srgb, var(--theme-accent) 28%, transparent);
  }
  #export-stage {
    position: fixed;
    left: -99999px;
    top: 0;
    width: 1px;
    height: 1px;
    overflow: visible;
    opacity: 0;
    pointer-events: none;
  }

  /* Toast notification */
  .toast {

    return String(value).replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
    })[char]);
  }

  function slugify(value) {
    return String(value)
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'slide';
  }

  function parseUrlParts(rawUrl) {
    const trimmed = rawUrl.trim();
    if (!trimmed) {
      return { raw: '', host: '未填写地址', origin: '', pathname: '/', display: '未填写地址' };
    }

    try {
      const normalized = /^[a-z]+:\/\//i.test(trimmed) ? trimmed : `http://${trimmed}`;
      const parsed = new URL(normalized);
      return {
        raw: trimmed,
        host: parsed.host,
        origin: parsed.origin,
        pathname: parsed.pathname || '/',
        display: parsed.href.replace(/\/$/, ''),
      };
    } catch (error) {
      return { raw: trimmed, host: trimmed, origin: trimmed, pathname: '/', display: trimmed };
    }
  }

  function isLocalHost(hostname) {
    return ['localhost', '127.0.0.1', '0.0.0.0'].includes(hostname);
  }

  function normalizePreviewUrl(rawUrl) {
    const trimmed = String(rawUrl || '').trim();
    if (!trimmed) {
      return '';
    }

    try {
      const normalized = /^[a-z]+:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
      const parsed = new URL(normalized);

      if (parsed.protocol === 'http:' && !isLocalHost(parsed.hostname)) {
        parsed.protocol = 'https:';
      }

      return parsed.href;
    } catch (error) {
      return trimmed;
    }
  }

    const pos = PATTERN_POSITIONS[typeof slideIndex === 'number' ? slideIndex % PATTERN_POSITIONS.length : 0];

    if (!route) return '/';
    return route.length > 18 ? `${route.slice(0, 15)}...` : route;

    if (!state.normalizedUrl) {
      return '';
    }

    try {
      const parsed = new URL(state.normalizedUrl);

      if (!route || route === '/') {
        return parsed.href;
      }

      if (/^[a-z]+:\/\//i.test(route)) {
        return new URL(route).href;
      }

      return new URL(route.startsWith('/') ? route : `/${route}`, parsed.origin).href;
    } catch (error) {
      return state.normalizedUrl;
    }
  }

    return `${captureMode || 'auto'}::${previewUrl}`;
