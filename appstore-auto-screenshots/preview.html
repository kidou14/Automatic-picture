<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>App Store Screenshot Auto-Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #34d399;
    --text: #f0f0f5;
    --muted: #6b7280;
    --radius: 12px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP NAV ── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .nav-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
    border-radius: 999px; color: var(--accent2); letter-spacing: 0.5px;
  }

  /* ── HERO SECTION ── */
  .hero {
    padding: 72px 32px 56px;
    max-width: 860px; margin: 0 auto; text-align: center;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent2); margin-bottom: 24px;
  }
  .hero-tag::before { content: ''; width: 18px; height: 1px; background: var(--accent2); }
  .hero-tag::after  { content: ''; width: 18px; height: 1px; background: var(--accent2); }
  .hero h1 {
    font-size: clamp(32px, 5vw, 52px); font-weight: 800; line-height: 1.1;
    letter-spacing: -1.5px; margin-bottom: 20px;
  }
  .hero h1 span { background: linear-gradient(135deg, #6c63ff, #a78bfa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { font-size: 17px; color: var(--muted); line-height: 1.7; max-width: 560px; margin: 0 auto; }

  /* ── PHASE STEPS ── */
  .steps-section { padding: 0 32px 64px; max-width: 900px; margin: 0 auto; }
  .steps-title { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
  .steps { display: flex; gap: 0; overflow-x: auto; padding-bottom: 4px; }
  .step {
    flex: 1; min-width: 130px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 16px;
    position: relative;
    cursor: default;
    transition: border-color 0.2s, background 0.2s;
  }
  .step:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .step:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
  .step:not(:last-child) { border-right: none; }
  .step.active { background: rgba(108,99,255,0.08); border-color: rgba(108,99,255,0.4); }
  .step.done { background: rgba(52,211,153,0.05); border-color: rgba(52,211,153,0.25); }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    background: var(--surface2); color: var(--muted); margin-bottom: 10px;
  }
  .step.active .step-num { background: var(--accent); color: white; }
  .step.done .step-num { background: var(--green); color: white; }
  .step-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .step-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .step-arrow {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--muted); z-index: 2;
  }
  .step:last-child .step-arrow { display: none; }

  /* ── MAIN PANELS LAYOUT ── */
  .main {
    display: flex;
    flex-direction: row;
    gap: 18px;
    max-width: 1600px;
    margin: 0 auto;
    padding: 18px 32px 40px;
    align-items: start;
  }

  /* ── TOP PANEL: Input Form ── */
  .panel-left {
    flex: 0 0 320px;
    width: 320px;
    max-width: 320px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    overflow: hidden;
    position: sticky;
    top: 74px;
    align-self: start;
  }
  .panel-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-header-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .form {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.span-2 { grid-column: span 2; }
  .form-group.span-4 { grid-column: 1 / -1; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .form-label .required { color: var(--accent2); }
  .form-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input.filled { border-color: rgba(52,211,153,0.4); color: var(--text); }
  .form-hint { font-size: 11px; color: var(--muted); line-height: 1.4; }

  .style-preset-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }
  .style-preset {
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.18s, transform 0.18s, background 0.18s, box-shadow 0.18s;
    text-align: left;
  }
  .style-preset:hover {
    border-color: rgba(108,99,255,0.38);
    transform: translateY(-1px);
    background: rgba(255,255,255,0.035);
  }
  .style-preset.selected {
    border-color: var(--accent);
    background: rgba(108,99,255,0.12);
    box-shadow: 0 10px 24px rgba(108,99,255,0.14);
  }
  .style-preset-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .style-preset-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .style-preset-swatches {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .style-preset-swatches span {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    flex: 0 0 auto;
  }
  .style-preset-desc {
    font-size: 11px;
    line-height: 1.45;
    color: var(--muted);
    min-height: 32px;
  }
  .btn-primary {
    width: 100%; padding: 11px; border-radius: 8px;
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    color: white; font-size: 13px; font-weight: 700;
    border: none; cursor: pointer; letter-spacing: 0.2px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .capture-status {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    font-size: 12px; line-height: 1.7; color: var(--muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .capture-status .ok { color: var(--green); }
  .capture-status .run { color: var(--accent2); }
  .capture-status .dim { color: #3d4451; }
  .capture-status .error { color: #fb7185; }

  /* ── PREVIEW PANEL ── */
  .panel-right {
    flex: 1 1 auto;
    width: calc(100% - 338px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    overflow: hidden;
    min-width: 0;
  }
  .panel-toolbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .toolbar-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .toolbar-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px;
    color: var(--text); font-size: 12px; font-family: inherit;
    outline: none; cursor: pointer;
  }
  .toolbar-sep { width: 1px; height: 20px; background: var(--border); }
  .btn-export {
    padding: 6px 16px; border-radius: 6px;
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    color: white; font-size: 12px; font-weight: 700;
    border: none; cursor: pointer; transition: opacity 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-export:hover { opacity: 0.85; }
  .btn-export-all {
    padding: 6px 14px; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-export-all:hover { border-color: var(--accent); color: var(--accent2); }
  .toolbar-spacer { flex: 1; }
  .size-badge {
    font-size: 11px; font-weight: 600; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px;
    font-family: 'SF Mono', monospace;
  }

  /* ── SLIDE GRID ── */
  .slide-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 18px;
  }

  /* ── SLIDE CARD ── */
  .slide-card {
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
  }
  .slide-frame-wrap {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    aspect-ratio: 1320/2868;
    background: #111;
  }
  .slide-card:hover .slide-frame-wrap {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(108,99,255,0.25);
  }
  .slide-hover-overlay {
    position: absolute; inset: 0;
    background: rgba(108,99,255,0.7);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s; z-index: 10;
    font-size: 11px; font-weight: 700; color: white; letter-spacing: 0.5px;
    flex-direction: column; gap: 6px;
  }
  .slide-hover-overlay svg { width: 20px; height: 20px; }
  .slide-card:hover .slide-hover-overlay { opacity: 1; }
  .slide-meta { display: flex; align-items: center; justify-content: space-between; }
  .slide-num { font-size: 11px; font-weight: 700; color: var(--muted); }
  .slide-title { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── IPHONE CANVAS (inside slide card) ── */
  .iphone-canvas {
    width: 100%; height: 100%;
    position: relative;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Slide 1: Hero — dark gradient */
  .s1 { background: linear-gradient(160deg, #0d0d1a 0%, #1a1040 50%, #0d1a2e 100%); }
  .s1 .phone-wrap { position: absolute; bottom: -4%; left: 50%; transform: translateX(-50%); width: 72%; }
  .s1 .caption { position: absolute; top: 10%; left: 0; right: 0; text-align: center; }
  .s1 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: rgba(167,139,250,0.7); font-weight: 600; margin-bottom: 5px; }
  .s1 .caption .hed { font-size: 16px; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; color: #fff; }
  .s1 .caption .hed em { color: #a78bfa; font-style: normal; }
  .s1 .glow { position: absolute; width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle, rgba(108,99,255,0.25) 0%, transparent 70%); top: 20%; left: 50%; transform: translateX(-50%); pointer-events: none; }

  /* Slide 2: Feature — warm light */
  .s2 { background: linear-gradient(160deg, #fdf6ef 0%, #f5e6d3 100%); }
  .s2 .phone-wrap { position: absolute; bottom: -4%; right: -5%; width: 75%; }
  .s2 .caption { position: absolute; top: 10%; left: 5%; width: 55%; }
  .s2 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: #d97706; font-weight: 600; margin-bottom: 5px; }
  .s2 .caption .hed { font-size: 14px; font-weight: 800; line-height: 1.15; letter-spacing: -0.3px; color: #1c0f00; }

  /* Slide 3: Feature — teal dark */
  .s3 { background: linear-gradient(160deg, #051520 0%, #0a2a3a 50%, #0d2030 100%); }
  .s3 .phone-back { position: absolute; bottom: -4%; left: -5%; width: 60%; opacity: 0.5; transform: rotate(-3deg); }
  .s3 .phone-front { position: absolute; bottom: -4%; right: -4%; width: 72%; }
  .s3 .caption { position: absolute; top: 10%; left: 0; right: 0; text-align: center; }
  .s3 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: rgba(52,211,153,0.7); font-weight: 600; margin-bottom: 5px; }
  .s3 .caption .hed { font-size: 15px; font-weight: 800; line-height: 1.1; color: #fff; }
  .s3 .caption .hed em { color: #34d399; font-style: normal; }

  /* Slide 4: Feature — contrast accent */
  .s4 { background: linear-gradient(160deg, #4338ca 0%, #6c63ff 50%, #7c3aed 100%); }
  .s4 .phone-wrap { position: absolute; bottom: -4%; left: 50%; transform: translateX(-50%); width: 70%; }
  .s4 .caption { position: absolute; top: 8%; left: 0; right: 0; text-align: center; }
  .s4 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 5px; }
  .s4 .caption .hed { font-size: 15px; font-weight: 800; line-height: 1.1; color: #fff; letter-spacing: -0.3px; }
  .s4 .blob { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.08); top: 30%; right: -20px; }

  /* Slide 5: Trust — minimal white */
  .s5 { background: linear-gradient(160deg, #fafafa 0%, #f0f0f8 100%); }
  .s5 .phone-wrap { position: absolute; bottom: -4%; left: 50%; transform: translateX(-50%); width: 68%; }
  .s5 .caption { position: absolute; top: 8%; left: 0; right: 0; text-align: center; }
  .s5 .caption .cat { font-size: 6px; letter-spacing: 2px; text-transform: uppercase; color: #6c63ff; font-weight: 600; margin-bottom: 5px; }
  .s5 .caption .hed { font-size: 14px; font-weight: 800; line-height: 1.15; color: #1a1a2e; }
  .s5 .stars { position: absolute; top: 35%; left: 0; right: 0; text-align: center; font-size: 10px; }

  /* Slide 6: More features — dark pills */
  .s6 { background: linear-gradient(160deg, #0d0d1a 0%, #13131e 100%); padding: 14px 10px; }
  .s6-inner { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .s6-icon { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, #6c63ff, #8b5cf6); margin-bottom: 2px; }
  .s6-hed { font-size: 10px; font-weight: 800; color: #fff; text-align: center; letter-spacing: -0.3px; }
  .s6-pills { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .s6-pill { font-size: 7px; font-weight: 600; padding: 3px 7px; border-radius: 999px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  .s6-pill.dim { color: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.05); }

  /* ── CSS PHONE MOCKUP ── */
  .css-phone {
    width: 100%; aspect-ratio: 390/844;
    border-radius: 13% / 6%;
    background: linear-gradient(160deg, #2a2a2e 0%, #1a1a1e 100%);
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.6);
    position: relative; overflow: hidden;
  }
  .css-phone-di {
    position: absolute; top: 1.8%; left: 50%; transform: translateX(-50%);
    width: 27%; height: 3%; border-radius: 999px; background: #111; z-index: 5;
  }
  .css-phone-screen {
    position: absolute; left: 3.5%; top: 2%; width: 93%; height: 96%;
    border-radius: 11% / 5%; overflow: hidden; background: #000;
  }
  /* ── APP SCREEN CONTENTS (simulated) ── */
  .app-home {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    padding: 8% 6% 4%;
    display: flex; flex-direction: column; gap: 5%;
  }
  .app-home-top { display: flex; align-items: center; justify-content: space-between; }
  .app-greeting { font-size: 20%; color: rgba(255,255,255,0.5); }
  .app-name-text { font-size: 30%; font-weight: 700; color: #fff; }
  .app-avatar { width: 12%; aspect-ratio: 1; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #a78bfa); }
  .app-balance-card {
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    border-radius: 8%; padding: 8%;
    display: flex; flex-direction: column; gap: 6%;
  }
  .app-bal-label { font-size: 18%; color: rgba(255,255,255,0.7); }
  .app-bal-num { font-size: 38%; font-weight: 800; color: #fff; }
  .app-bal-sub { font-size: 16%; color: rgba(255,255,255,0.6); }
  .app-row { display: flex; gap: 5%; }
  .app-tile {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 8%; padding: 10%;
    display: flex; flex-direction: column; gap: 8%;
  }
  .app-tile-icon { width: 25%; aspect-ratio: 1; border-radius: 6px; background: rgba(108,99,255,0.3); }
  .app-tile-label { font-size: 15%; color: rgba(255,255,255,0.6); }
  .app-tile-val { font-size: 22%; font-weight: 700; color: #fff; }
  .app-list-item {
    display: flex; align-items: center; gap: 5%;
    padding: 5% 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .app-list-dot { width: 8%; aspect-ratio: 1; border-radius: 50%; background: rgba(167,139,250,0.4); flex-shrink: 0; }
  .app-list-text { font-size: 18%; color: rgba(255,255,255,0.7); flex: 1; }
  .app-list-amt { font-size: 18%; font-weight: 700; color: #34d399; }

  .app-dashboard {
    width: 100%; height: 100%;
    background: #fff; padding: 8% 6% 4%;
    display: flex; flex-direction: column; gap: 4%;
  }
  .app-dash-header { font-size: 22%; font-weight: 700; color: #1a1a2e; }
  .app-chart {
    background: #f8f6ff; border-radius: 8%; padding: 8%;
    display: flex; flex-direction: column; gap: 6%;
  }
  .app-chart-label { font-size: 15%; color: #6b7280; }
  .app-chart-bars { display: flex; align-items: flex-end; gap: 4%; height: 30px; }
  .app-bar { flex: 1; border-radius: 3px 3px 0 0; background: rgba(108,99,255,0.15); }
  .app-bar.hi { background: #6c63ff; }
  .app-stat-row { display: flex; gap: 5%; }
  .app-stat { flex: 1; background: #f3f4f6; border-radius: 8%; padding: 8%; }
  .app-stat-lbl { font-size: 14%; color: #6b7280; }
  .app-stat-val { font-size: 26%; font-weight: 800; color: #1a1a2e; }

  .app-profile {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #0f1a2e 0%, #0a1020 100%);
    padding: 8% 6% 4%;
    display: flex; flex-direction: column; align-items: center; gap: 5%;
  }
  .app-prof-avatar { width: 22%; aspect-ratio: 1; border-radius: 50%; background: linear-gradient(135deg, #34d399, #059669); }
  .app-prof-name { font-size: 22%; font-weight: 700; color: #fff; }
  .app-prof-sub { font-size: 16%; color: rgba(255,255,255,0.5); margin-top: -4%; }
  .app-prof-stats { display: flex; gap: 6%; width: 100%; }
  .app-prof-stat { flex: 1; background: rgba(255,255,255,0.05); border-radius: 8%; padding: 8%; text-align: center; }
  .app-prof-stat-num { font-size: 22%; font-weight: 800; color: #34d399; }
  .app-prof-stat-lbl { font-size: 13%; color: rgba(255,255,255,0.4); }
  .app-list-full { width: 100%; display: flex; flex-direction: column; }

  .app-settings {
    width: 100%; height: 100%;
    background: #f2f2f7; padding: 8% 5% 0;
    display: flex; flex-direction: column; gap: 3%;
  }

      keywords: ['极简', '奢感', '高级'],
      summary: '适合时尚、美妆、摄影、高端效率与精品电商，强调 premium 与 curated 感。',
      prompt: '整体应极简、精致、有奢感，以黑白暖灰和低饱和暖金为主，留白大胆，截图像精品对象被陈列展示。',
      theme: {
        bgStart: '#f8f5f0',
        bgEnd: '#e7e0d8',
        panel: '#ffffff',
        text: '#15161c',
        accent: '#b6925e',
        accent2: '#6b7280',
      },
    },
  };

  const DEFAULT_STYLE_PRESET_ID = 'warm-editorial';
  const STANDARD_SLIDE_LAYOUT = 'layout-standard';

  let toastTimer = null;
  let renderedSlides = [];
  const DEFAULT_SLIDE_COUNT = 6;
  const SCREENSHOT_SERVICE_ORIGIN = 'http://127.0.0.1:4317';
  const PHONE_MOCKUP_URL = `${SCREENSHOT_SERVICE_ORIGIN}/assets/iphone-mockup.png`;
  let previewRefreshTimer = null;
  const screenshotCache = new Map();
  const copyPlanCache = new Map();
  const captureResultCache = new Map();
  const copyPlanUrlCache = new Map(); // style-agnostic copy cache, keyed by url+slideCount only
  let pendingGenerationState = null;
  let activeCaptureJobId = null;
  let capturePollTimer = null;

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
    })[char]);
  }

  function slugify(value) {
    return String(value)
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'slide';
  }

  function parseUrlParts(rawUrl) {
    const trimmed = rawUrl.trim();
    if (!trimmed) {
      return { raw: '', host: '未填写地址', origin: '', pathname: '/', display: '未填写地址' };
    }

    try {
      const normalized = /^[a-z]+:\/\//i.test(trimmed) ? trimmed : `http://${trimmed}`;
      const parsed = new URL(normalized);
      return {
        raw: trimmed,
        host: parsed.host,
        origin: parsed.origin,
        pathname: parsed.pathname || '/',
        display: parsed.href.replace(/\/$/, ''),
      };
    } catch (error) {
      return { raw: trimmed, host: trimmed, origin: trimmed, pathname: '/', display: trimmed };
    }
  }

  function isLocalHost(hostname) {
    return ['localhost', '127.0.0.1', '0.0.0.0'].includes(hostname);
  }

  function normalizePreviewUrl(rawUrl) {
    const trimmed = String(rawUrl || '').trim();
    if (!trimmed) {
      return '';
    }

    try {
      const normalized = /^[a-z]+:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
      const parsed = new URL(normalized);

      if (parsed.protocol === 'http:' && !isLocalHost(parsed.hostname)) {
        parsed.protocol = 'https:';
      }

      return parsed.href;
    } catch (error) {
      return trimmed;
    }
  }

  function getSelectedStylePresetId() {
    const selected = document.querySelector('.style-preset.selected');
    return selected ? selected.dataset.presetId : DEFAULT_STYLE_PRESET_ID;
  }

  function getSelectedStylePreset() {
    return STYLE_PRESETS[getSelectedStylePresetId()] || STYLE_PRESETS[DEFAULT_STYLE_PRESET_ID];
  }

  function getFormState() {
    const url = document.getElementById('url-input').value.trim();
    const captureMode = document.getElementById('capture-mode-input').value;
    const stylePreset = getSelectedStylePreset();
    const urlParts = parseUrlParts(url);

    return {
      url,
      slideCount: DEFAULT_SLIDE_COUNT,
      captureMode,
      styleId: stylePreset.id,
      styleLabel: stylePreset.label,
      stylePrompt: stylePreset.prompt,
      styleKeywords: stylePreset.keywords || [],
      theme: stylePreset.theme || STYLE_PRESETS[DEFAULT_STYLE_PRESET_ID].theme,
      urlParts,
      normalizedUrl: normalizePreviewUrl(url),
    };
  }

  function syncFilledState() {
    document.querySelectorAll('.form-input').forEach((input) => {
      if ('value' in input && String(input.value).trim()) {
        input.classList.add('filled');
      } else {
        input.classList.remove('filled');
      }
    });
  }

  function themeVars(theme) {
    return [
      `--theme-bg-start:${theme.bgStart}`,
      `--theme-bg-end:${theme.bgEnd}`,
      `--theme-panel:${theme.panel}`,
      `--theme-text:${theme.text}`,
      `--theme-accent:${theme.accent}`,
      `--theme-accent-2:${theme.accent2}`,
    ].join(';');
  }

  function routeLabel(route) {
    if (!route) return '/';
    return route.length > 18 ? `${route.slice(0, 15)}...` : route;
  }

  function buildPreviewUrl(state, route) {
    if (!state.normalizedUrl) {
      return '';
    }

    try {
      const parsed = new URL(state.normalizedUrl);

      if (!route || route === '/') {
        return parsed.href;
      }

      if (/^[a-z]+:\/\//i.test(route)) {
        return new URL(route).href;
      }

      return new URL(route.startsWith('/') ? route : `/${route}`, parsed.origin).href;
    } catch (error) {
      return state.normalizedUrl;
    }
  }

  function buildScreenshotCacheKey(previewUrl, captureMode) {
    return `${captureMode || 'auto'}::${previewUrl}`;
  }

  function getPreviewRecord(previewUrl, captureMode) {
    return previewUrl ? screenshotCache.get(buildScreenshotCacheKey(previewUrl, captureMode)) || null : null;
  }

  function isFetchablePreviewUrl(previewUrl) {
    if (!previewUrl) {
      return false;
    }

    try {
      const parsed = new URL(previewUrl);
      return parsed.protocol === 'http:' || parsed.protocol === 'https:';
    } catch (error) {
      return false;
    }
  }

  function captureModeLabel(mode) {
    if (mode === 'mobile') return '移动端';
    if (mode === 'web-fit') return 'Web 适配';
    if (mode === 'web-crop') return 'Web 裁切';
    return '自动';
  }

  async function fetchPreviewScreenshot(previewUrl, captureMode) {
    const cacheKey = buildScreenshotCacheKey(previewUrl, captureMode);
    const current = screenshotCache.get(cacheKey);
    if (current && (current.status === 'loading' || current.status === 'ready')) {
      return;
    }

    screenshotCache.set(cacheKey, { status: 'loading' });
    renderSlides({ skipPrime: true });

    try {
      const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/preview?url=${encodeURIComponent(previewUrl)}&mode=${encodeURIComponent(captureMode)}`);
      if (!response.ok) {
        throw new Error(`截图服务返回 ${response.status}`);
      }

      const payload = await response.json();
      screenshotCache.set(cacheKey, {
        status: 'ready',
        title: payload.title || '',
        finalUrl: payload.finalUrl || previewUrl,
        imageDataUrl: payload.imageDataUrl || '',
        previewImageDataUrl: payload.copyImageDataUrl || payload.imageDataUrl || '',
        captureMode: payload.captureMode || captureMode,
        fitMode: payload.fitMode || 'cover',
        viewport: payload.viewport || null,
      });
    } catch (error) {
      screenshotCache.set(cacheKey, {
        status: 'error',
        error: error.message || '截图失败',
      });
    }

    renderSlides({ skipPrime: true });
  }

  function primePreviewCache(state, slides) {
    const previewUrls = new Set();

    slides.forEach((slide) => {
      [slide.routeA, slide.routeB].forEach((route) => {
        const previewUrl = buildPreviewUrl(state, route);
        if (isFetchablePreviewUrl(previewUrl)) {
          previewUrls.add(previewUrl);
        }
      });
    });

    previewUrls.forEach((previewUrl) => {
      const cacheKey = buildScreenshotCacheKey(previewUrl, state.captureMode);
      const current = screenshotCache.get(cacheKey);
      if (!current || current.status === 'error') {
        screenshotCache.set(cacheKey, { status: 'loading' });
        fetchPreviewScreenshot(previewUrl, state.captureMode);
      }
    });
  }

  function renderPreviewDevice(state, route) {
    const mockupMarkup = `<img class="render-device-mockup" src="${escapeHtml(PHONE_MOCKUP_URL)}" alt="" draggable="false" />`;

    if (!route) {
      return `
        <div class="render-device">
          <div class="render-device-aura"></div>
          <div class="render-device-shadow"></div>
          <div class="render-device-chassis"></div>
          <div class="render-screen">
            <div class="preview-live-shell">
              <div class="preview-live-empty loading">
                <div class="preview-loading-copy">
                  <div class="preview-loading-line short"></div>
                  <div class="preview-loading-line long"></div>
                  <div class="preview-loading-line mid"></div>
                </div>
              </div>
            </div>
          </div>
          ${mockupMarkup}
        </div>
      `;
    }

    const previewUrl = buildPreviewUrl(state, route);
    const previewRecord = getPreviewRecord(previewUrl, state.captureMode);

    const previewImageDataUrl = previewRecord && (previewRecord.previewImageDataUrl || previewRecord.imageDataUrl);

    if (previewRecord && previewRecord.status === 'ready' && previewImageDataUrl) {
      return `
        <div class="render-device">
          <div class="render-device-aura"></div>
          <div class="render-device-shadow"></div>
          <div class="render-device-chassis"></div>
          <div class="render-screen">
            <div class="render-shot-showcase">
              <img class="render-shot-image" src="${escapeHtml(previewImageDataUrl)}" alt="${escapeHtml(previewRecord.title || state.urlParts.host || '页面截图')}" style="--preview-fit:${escapeHtml(previewRecord.fitMode || 'contain')}" />
            </div>
          </div>
          ${mockupMarkup}
        </div>
      `;
    }

    let liveFrame = '<div class="preview-live-shell"><div class="preview-live-empty"></div></div>';

    if (previewUrl) {
      if (previewRecord && previewRecord.status === 'loading') {
        liveFrame = '<div class="preview-live-shell"><div class="preview-live-empty"></div></div>';
      } else if (previewRecord && previewRecord.status === 'error') {
        liveFrame = '<div class="preview-live-shell"><div class="preview-live-empty"></div></div>';
      }
    }

    return `
      <div class="render-device">
        <div class="render-device-aura"></div>
        <div class="render-device-shadow"></div>
        <div class="render-device-chassis"></div>
        <div class="render-screen">
          ${liveFrame}
        </div>
        ${mockupMarkup}
      </div>
    `;
  }

  function stripEmTags(text) {
    return String(text || '').replace(/^<em>/, '').replace(/<\/em>$/, '');
  }

  function normalizeCopyLines(slide) {
    const headlineLines = Array.isArray(slide.headline)
      ? slide.headline.filter(Boolean)
      : slide.headline
        ? [slide.headline]
        : [];

    const headline = slide.headlineText
      || slide.headline
      || slide.titleLG
      || stripEmTags(headlineLines[0] || '')
      || stripEmTags(headlineLines[1] || '');
    const subheadline = slide.subheadline
      || slide.titleSM
      || slide.subtitle
      || slide.kicker
      || '';

    return { headline, subheadline };
  }

  function fitSingleLineText(element, maxSize, minSize) {
    if (!element) {
      return;
    }

    element.style.removeProperty('--fit-font-size');
    element.style.removeProperty('--fit-letter-spacing');
    let size = maxSize;
    element.style.setProperty('--fit-font-size', `${size}px`);
    const parent = element.parentElement;
    const minLetterSpacing = element.classList.contains('render-headline') ? -2.6 : -0.6;
    let letterSpacing = element.classList.contains('render-headline') ? -1.4 : -0.2;

    const getAvailableWidth = () => {
      const parentWidth = parent ? parent.getBoundingClientRect().width : 0;
      const ownWidth = element.getBoundingClientRect().width;
      return Math.max(0, Math.floor(parentWidth || ownWidth || element.clientWidth || 0));
    };

    while (size > minSize && element.scrollWidth > getAvailableWidth() + 1) {
      size -= 1;
      element.style.setProperty('--fit-font-size', `${size}px`);
    }

    while (letterSpacing > minLetterSpacing && element.scrollWidth > getAvailableWidth() + 1) {
      letterSpacing = Number((letterSpacing - 0.2).toFixed(1));
      element.style.setProperty('--fit-letter-spacing', `${letterSpacing}px`);
    }
  }

  function getSlideCanvasWidth(element, fallback = 340) {
    const slideRoot = element && element.closest('[data-export-root]');
    const width = slideRoot ? slideRoot.getBoundingClientRect().width : 0;
    return Math.max(fallback, Math.round(width || fallback));
  }

  function fitCopyText(root = document) {
    root.querySelectorAll('.render-headline').forEach((element) => {
      const slideWidth = getSlideCanvasWidth(element);
      fitSingleLineText(
        element,
        Math.round(slideWidth * 0.14),
        Math.max(16, Math.round(slideWidth * 0.045))
      );
    });
    root.querySelectorAll('.render-subheadline').forEach((element) => {
      const slideWidth = getSlideCanvasWidth(element);
      fitSingleLineText(
        element,
        Math.round(slideWidth * 0.056),
        Math.max(12, Math.round(slideWidth * 0.024))
      );
    });
  }

  function buildCopyRequestSignature(state) {
    return JSON.stringify({
      url: state.normalizedUrl || state.url,
      routes: [],
      slideCount: state.slideCount,
      styleId: state.styleId || DEFAULT_STYLE_PRESET_ID,
      styleLabel: state.styleLabel || '',
      appNameHint: '',
      descriptionHint: '',
    });
  }

  function buildCopyUrlSignature(state) {
    return JSON.stringify({
      url: state.normalizedUrl || state.url,
      slideCount: state.slideCount,
    });
  }

  function getGeneratedCopyPlan(state) {
    // Style-agnostic cache takes priority so copy survives style switches
    const urlKey = buildCopyUrlSignature(state);
    if (copyPlanUrlCache.has(urlKey)) {
      return copyPlanUrlCache.get(urlKey);
    }
    return copyPlanCache.get(buildCopyRequestSignature(state)) || null;
  }

  function getCaptureResult(state) {
    return captureResultCache.get(buildCopyRequestSignature(state)) || null;
  }

  function getPendingGenerationState(state) {
    const signature = buildCopyRequestSignature(state);
    return pendingGenerationState && pendingGenerationState.signature === signature ? pendingGenerationState : null;
  }

  function mergeCopyPlan(slides, copyPlan) {
    if (!copyPlan || !Array.isArray(copyPlan.slides) || !copyPlan.slides.length) {
      return slides;
    }

    const byKey = new Map(copyPlan.slides.filter(Boolean).map((slide, index) => [slide.key || `index-${index}`, slide]));
    return slides.map((slide, index) => {
      const generated = byKey.get(slide.key) || copyPlan.slides[index];
      if (!generated) {
        return slide;
      }

      return {
        ...slide,
        headline: generated.headline || generated.titleLG || slide.headline || slide.headlineText || stripEmTags((Array.isArray(slide.headline) ? slide.headline[0] : slide.headline) || ''),
        subheadline: generated.subheadline || generated.titleSM || slide.subheadline || slide.subtitle || generated.subtitle || generated.kicker || slide.kicker || '',
      };
    });
  }

  function buildDiscoveredSlides(state, captureResult) {
    const screenshots = Array.isArray(captureResult && captureResult.screenshots)
      ? captureResult.screenshots.slice(0, state.slideCount)
      : [];

    if (!screenshots.length) {
      return null;
    }

    const copyPlan = captureResult.copyPlan || null;
    const fallbackTitles = ['主卖点', '核心路径', '功能亮点', '真实体验', '更多场景'];

    return screenshots.map((shot, index) => {
      const generated = copyPlan && Array.isArray(copyPlan.slides) ? (copyPlan.slides[index] || null) : null;
      const routeValue = shot.requestUrl || shot.finalUrl || shot.route || state.normalizedUrl || state.url;
      const label = shot.label || `page-${index + 1}`;
      return {
        key: generated && generated.key ? generated.key : `captured-${index + 1}`,
        title: generated && generated.title ? generated.title : (fallbackTitles[index] || `页面 ${index + 1}`),
        file: label,
        layout: STANDARD_SLIDE_LAYOUT,
        headline: generated && (generated.headline || generated.titleLG) ? (generated.headline || generated.titleLG) : '',
        subheadline: generated && (generated.subheadline || generated.titleSM || generated.subtitle) ? (generated.subheadline || generated.titleSM || generated.subtitle) : '',
        copyLoading: !generated,
        routeA: routeValue,
        routeB: screenshots[index + 1]
          ? (screenshots[index + 1].requestUrl || screenshots[index + 1].finalUrl || screenshots[index + 1].route || routeValue)
          : routeValue,
      };
    });
  }

  function buildLoadingSlides(state, count) {
    return Array.from({ length: Math.max(1, count || state.slideCount || DEFAULT_SLIDE_COUNT) }, (_, index) => {
      return {
        key: `loading-${index + 1}`,
        title: `生成中 ${index + 1}`,
        file: `loading-${index + 1}`,
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        routeA: '',
        routeB: '',
        loading: true,
      };
    });
  }

  function mergeSlidesWithLoading(slides, state, pendingState) {
    if (!pendingState || pendingState.status !== 'running') {
      return slides;
    }

    const targetCount = Math.max(slides.length, pendingState.expectedCount || state.slideCount || 0);
    if (slides.length >= targetCount) {
      return slides;
    }

    return [
      ...slides,
      ...buildLoadingSlides(state, targetCount - slides.length).map((slide, index) => ({
        ...slide,
        key: `loading-tail-${slides.length + index + 1}`,
        title: `生成中 ${slides.length + index + 1}`,
      })),
    ];
  }

  function makeSlides(state) {
    const pendingState = getPendingGenerationState(state);
    const captureResult = getCaptureResult(state);
    const discoveredSlides = buildDiscoveredSlides(state, captureResult);
    if (discoveredSlides) {
      // Once real screenshots are available, render only the actual captured count.
      return discoveredSlides;
    }

    if (pendingState && pendingState.status === 'running') {
      return buildLoadingSlides(state, pendingState.expectedCount);
    }

    const baseSlides = [
      {
        key: 'hero',
        title: 'Hero / 主卖点',
        file: 'hero',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '产品亮点',
        subheadline: '真实界面更可信',
        routeA: '/',
      },
      {
        key: 'core',
        title: '核心路径',
        file: 'core-flow',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '输入重建',
        subheadline: '换地址即更新',
        routeA: '/',
      },
      {
        key: 'routes',
        title: '页面编排',
        file: 'route-story',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '自动发现',
        subheadline: '页面自动成线',
        routeA: '/',
        routeB: '/',
      },
      {
        key: 'feature',
        title: '差异化亮点',
        file: 'feature',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '聚焦价值',
        subheadline: '每张图只讲一点',
        routeA: '/',
      },
      {
        key: 'trust',
        title: '信任感',
        file: 'trust',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '建立信任',
        subheadline: '真实截图更可信',
        routeA: '/',
      },
      {
        key: 'more',
        title: '更多功能',
        file: 'more-features',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '更多能力',
        subheadline: '承接更多卖点',
        routeA: '/',
      },
    ];

    let slides = state.slideCount <= baseSlides.length
      ? baseSlides.slice(0, state.slideCount)
      : [...baseSlides, ...Array.from({ length: state.slideCount - baseSlides.length }, (_, index) => {
      const route = '/';
      return {
        key: `extra-${index + 1}`,
        title: `补充卖点 ${index + 1}`,
        file: `extra-${index + 1}`,
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '继续展开',
        subheadline: '补一个新场景',
        routeA: route,
      };
    })];

    return mergeCopyPlan(slides, getGeneratedCopyPlan(state));
  }

  function renderSlideArtwork(slide, state) {
    const style = themeVars(state.theme);
    const copy = normalizeCopyLines(slide);
    const copyMarkup = (slide.loading || slide.copyLoading)
      ? `
        <div class="render-copy">
          <div class="render-copy-skeleton">
            <div class="render-copy-skeleton-headline"></div>
            <div class="render-copy-skeleton-subheadline"></div>
          </div>
        </div>
      `
      : `
        <div class="render-copy">
          <div class="render-headline">${escapeHtml(copy.headline)}</div>
          <div class="render-subheadline">${escapeHtml(copy.subheadline)}</div>
        </div>
      `;

    return `
      <div class="render-slide ${slide.layout}" data-export-root="true" style="${style}">
        ${copyMarkup}
        <div class="render-device-wrap">${renderPreviewDevice(state, slide.routeA)}</div>
      </div>
    `;
  }

  function renderSlides(options = {}) {
    syncFilledState();
    const state = getFormState();
    renderedSlides = makeSlides(state);
    if (!options.skipPrime) {
      primePreviewCache(state, renderedSlides);
    }

    const html = renderedSlides.map((slide, index) => `
      <div class="slide-card" data-slide-index="${index + 1}" onclick="exportSlide(${index + 1}, event)">
        <div class="slide-frame-wrap">
          <div class="hover-overlay slide-hover-overlay">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M4 7l4 4 4-4M2 12h12"/></svg>
            导出 PNG
          </div>
          ${renderSlideArtwork(slide, state)}
        </div>
      </div>
    `).join('');

    document.getElementById('slide-grid').innerHTML = html;
    requestAnimationFrame(() => {
      fitCopyText(document.getElementById('slide-grid'));
      window.setTimeout(() => fitCopyText(document.getElementById('slide-grid')), 80);
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.classList.add('show');
    window.clearTimeout(toastTimer);
    toastTimer = window.setTimeout(() => toast.classList.remove('show'), 2800);
  }

  function updateSize() {
    const value = document.getElementById('size-select').value;
    document.getElementById('current-size').textContent = value.replace('x', ' × ');
  }

  function renderStylePresets(selectedId = DEFAULT_STYLE_PRESET_ID) {
    const container = document.getElementById('style-preset-grid');
    container.innerHTML = Object.values(STYLE_PRESETS).map((preset) => `
        <button
          class="style-preset ${preset.id === selectedId ? 'selected' : ''}"
          type="button"
          data-preset-id="${escapeHtml(preset.id)}"
          onclick="selectStylePreset('${escapeHtml(preset.id)}')"
        >
          <div class="style-preset-head">
            <span class="style-preset-name">${escapeHtml(preset.label)}</span>
          </div>
        <div class="style-preset-swatches">
          <span style="background:${preset.theme.bgStart}"></span>
          <span style="background:${preset.theme.accent}"></span>
          <span style="background:${preset.theme.accent2}"></span>
        </div>
        <div class="style-preset-desc">${escapeHtml(preset.description)}</div>
      </button>
    `).join('');
  }

  function selectStylePreset(presetId) {
    document.querySelectorAll('.style-preset').forEach((card) => {
      card.classList.toggle('selected', card.dataset.presetId === presetId);
    });
    renderSlides();
  }

  function renderCaptureLog(events) {
    const log = document.getElementById('capture-log');
    if (!events || !events.length) {
      log.innerHTML = '<span class="dim">○ 等待开始截图</span>';
      return;
    }

    log.innerHTML = [...events].reverse().map((event) => {
      const level = event.level === 'error' ? 'error' : event.level === 'run' ? 'run' : event.level === 'dim' ? 'dim' : 'ok';
      const marker = level === 'error' ? '✗' : level === 'run' ? '▶' : level === 'dim' ? '○' : '✓';
      return `<span class="${level}">${marker}</span> ${escapeHtml(event.message)}`;
    }).join('\n');
    log.scrollTop = 0;
  }

  function syncScreenshotsFromJob(job) {
    if (!job || !Array.isArray(job.screenshots)) {
      return;
    }

    job.screenshots.forEach((shot) => {
      if (!shot || !shot.requestUrl || !shot.imageDataUrl) {
        return;
      }

      screenshotCache.set(buildScreenshotCacheKey(shot.requestUrl, shot.requestedMode || job.requestedMode || 'auto'), {
        status: 'ready',
        title: shot.title || '',
        finalUrl: shot.finalUrl || shot.requestUrl,
        imageDataUrl: shot.imageDataUrl,
        previewImageDataUrl: shot.copyImageDataUrl || shot.imageDataUrl,
        captureMode: shot.captureMode || job.captureMode || job.requestedMode || 'auto',
        fitMode: shot.fitMode || 'cover',
        viewport: shot.viewport || null,
      });
    });

    if (job.copyPlan && job.requestSignature) {
      copyPlanCache.set(job.requestSignature, job.copyPlan);
      // Also cache style-agnostically so copy survives style switches
      const urlKey = JSON.stringify({ url: job.url, slideCount: job.slideCount });
      copyPlanUrlCache.set(urlKey, job.copyPlan);
    }

    if (job.requestSignature) {
      captureResultCache.set(job.requestSignature, {
        screenshots: Array.isArray(job.screenshots) ? job.screenshots : [],
        copyPlan: job.copyPlan || null,
      });
    }
  }

  async function pollCaptureJob(jobId) {
    try {
      const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/capture-jobs/${encodeURIComponent(jobId)}`);
      if (!response.ok) {
        throw new Error(`任务状态获取失败 ${response.status}`);
      }

      const job = await response.json();
      if (job.id !== activeCaptureJobId) {
        return;
      }

      renderCaptureLog(job.events);
      syncScreenshotsFromJob(job);

      if (job.status === 'completed') {
        window.clearInterval(capturePollTimer);
        capturePollTimer = null;
        activeCaptureJobId = null;
        pendingGenerationState = null;
        renderSlides({ skipPrime: true });
        showToast(`真实截图完成，共 ${job.completed} 张`);
        return job.status;
      }

      if (job.status === 'failed') {
        window.clearInterval(capturePollTimer);
        capturePollTimer = null;
        activeCaptureJobId = null;
        pendingGenerationState = null;
        renderSlides({ skipPrime: true });
        showToast(`截图失败：${job.error || '未知错误'}`);
        return job.status;
      }

      renderSlides({ skipPrime: true });
      return job.status;
    } catch (error) {
      window.clearInterval(capturePollTimer);
      capturePollTimer = null;
      activeCaptureJobId = null;
      pendingGenerationState = null;
      renderCaptureLog([{ level: 'error', message: `轮询任务失败：${error.message}` }]);
      showToast(`截图任务中断：${error.message}`);
      return 'failed';
    }
  }

  function clearRelevantScreenshotCache(state) {
    const previewUrl = buildPreviewUrl(state, '/');
    if (previewUrl) {
      screenshotCache.delete(buildScreenshotCacheKey(previewUrl, state.captureMode));
    }
    copyPlanCache.delete(buildCopyRequestSignature(state));
    captureResultCache.delete(buildCopyRequestSignature(state));
    copyPlanUrlCache.delete(buildCopyUrlSignature(state));
  }

  async function runCapture() {
    const state = getFormState();
    const log = document.getElementById('capture-log');

    if (!state.url.trim()) {
      renderCaptureLog([{ level: 'error', message: '请先输入可访问的 URL，再开始生成上架图预览' }]);
      showToast('请输入可访问的 URL');
      return;
    }

    window.clearInterval(capturePollTimer);
    capturePollTimer = null;
    activeCaptureJobId = null;

    clearRelevantScreenshotCache(state);
    pendingGenerationState = {
      signature: buildCopyRequestSignature(state),
      expectedCount: state.slideCount,
      status: 'running',
    };
    renderSlides();
    log.innerHTML = '<span class="run">▶</span> 正在创建截图任务 …';
    showToast('正在启动 Playwright 真实截图任务 …');

    try {
      const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/capture-jobs`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url: state.normalizedUrl || state.url,
          slideCount: state.slideCount,
          captureMode: state.captureMode,
          styleId: state.styleId,
          styleLabel: state.styleLabel,
          stylePrompt: state.stylePrompt,
          styleKeywords: state.styleKeywords,
        }),
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `截图任务创建失败 ${response.status}`);
      }

      activeCaptureJobId = payload.jobId;
      const firstStatus = await pollCaptureJob(activeCaptureJobId);
      if (firstStatus === 'running' && !capturePollTimer && activeCaptureJobId) {
        capturePollTimer = window.setInterval(() => {
          pollCaptureJob(activeCaptureJobId);
        }, 1200);
      }
    } catch (error) {
      pendingGenerationState = null;
      log.innerHTML = `<span class="error">✗</span> ${escapeHtml(error.message)}`;
      showToast(`无法启动截图任务：${error.message}`);
    }
  }

  function waitForFrame() {
    return new Promise((resolve) => requestAnimationFrame(() => resolve()));
  }

  async function buildRenderExportFile(node, width, height, filename) {
    const exportStage = document.getElementById('export-stage');
    const clone = node.cloneNode(true);
    clone.style.width = `${width}px`;
    clone.style.height = `${height}px`;
    clone.style.borderRadius = '0';

    exportStage.innerHTML = '';
    exportStage.style.width = `${width}px`;
    exportStage.style.height = `${height}px`;
    exportStage.appendChild(clone);
    await waitForFrame();
    fitCopyText(exportStage);
    await waitForFrame();
    fitCopyText(exportStage);
    await waitForFrame();

    const styles = Array.from(document.querySelectorAll('style')).map((style) => style.textContent).join('\n');
    const file = {
      filename,
      width,
      height,
      markup: clone.outerHTML,
      styles,
    };

    exportStage.innerHTML = '';
    exportStage.style.width = '1px';
    exportStage.style.height = '1px';
    return file;
  }

  async function saveFilesToLocalDisk(files, folderName) {
    const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/export-files`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files, folderName }),
    });

    const payload = await response.json();
    if (!response.ok) {
      throw new Error(payload.error || `导出失败 ${response.status}`);
    }

    return payload;
  }

  async function renderFilesToLocalDisk(files, folderName) {
    const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/render-exports`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files, folderName }),
    });

    const payload = await response.json();
    if (!response.ok) {
      throw new Error(payload.error || `导出失败 ${response.status}`);
    }

    return payload;
  }

  async function exportNodeAsPng(node, width, height, filename, folderName) {
    const file = await buildRenderExportFile(node, width, height, filename);
    return renderFilesToLocalDisk([file], folderName);
  }

  function getCurrentSize() {
    const sizeKey = document.getElementById('size-select').value;
    return { key: sizeKey, ...(EXPORT_SIZES[sizeKey] || EXPORT_SIZES['1320x2868']) };
  }

  async function exportSlide(index, event) {
    if (event) {
      event.stopPropagation();
    }

    const size = getCurrentSize();
    const slide = renderedSlides[index - 1];
    const node = document.querySelector(`.slide-card[data-slide-index="${index}"] [data-export-root]`);

    if (!slide || !node) {
      showToast('当前没有可导出的图片');
      return;
    }

    const filename = `${String(index).padStart(2, '0')}-${slugify(slide.file)}-${size.key}.png`;
    showToast(`正在导出 ${filename} …`);

    try {
      const result = await exportNodeAsPng(node, size.width, size.height, filename);
      showToast(`✓ ${filename} 已保存到 ${result.files[0].path}`);
    } catch (error) {
      console.error(error);
      showToast(`导出失败：${error.message}`);
    }
  }

  async function exportCurrent() {
    const size = getCurrentSize();
    showToast(`正在导出当前尺寸 ${size.key.replace('x', ' × ')} …`);

    try {
      const files = [];
      for (let index = 0; index < renderedSlides.length; index += 1) {
        const node = document.querySelector(`.slide-card[data-slide-index="${index + 1}"] [data-export-root]`);
        const slide = renderedSlides[index];
        const filename = `${String(index + 1).padStart(2, '0')}-${slugify(slide.file)}-${size.key}.png`;
        files.push(await buildRenderExportFile(node, size.width, size.height, filename));
      }
      const result = await renderFilesToLocalDisk(files, `current-size-${size.key}`);
      showToast(`✓ 当前尺寸 ${size.key} 的 ${result.count} 张截图已保存到 ${result.directory}`);
    } catch (error) {
      console.error(error);
      showToast(`批量导出失败：${error.message}`);
    }
  }

  async function exportAll() {
    const sizeKeys = Object.keys(EXPORT_SIZES);
    showToast(`正在导出全部尺寸，共 ${sizeKeys.length * renderedSlides.length} 张 …`);

    try {
      const files = [];
      for (const sizeKey of sizeKeys) {
        const size = EXPORT_SIZES[sizeKey];
        for (let index = 0; index < renderedSlides.length; index += 1) {
          const node = document.querySelector(`.slide-card[data-slide-index="${index + 1}"] [data-export-root]`);
          const slide = renderedSlides[index];
          const filename = `${String(index + 1).padStart(2, '0')}-${slugify(slide.file)}-${sizeKey}.png`;
          files.push(await buildRenderExportFile(node, size.width, size.height, filename));
        }
      }
      const result = await renderFilesToLocalDisk(files, `all-sizes-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}`);
      showToast(`✓ 全部 ${result.count} 张 PNG 已保存到 ${result.directory}`);
    } catch (error) {
      console.error(error);
      showToast(`全部尺寸导出失败：${error.message}`);
    }
  }

  function schedulePreviewRefresh() {
    window.clearTimeout(previewRefreshTimer);
    previewRefreshTimer = window.setTimeout(() => {
      renderSlides();
    }, 280);
  }

  function bindInputListeners() {
    document.getElementById('url-input').addEventListener('input', () => {
      schedulePreviewRefresh();
    });
    document.getElementById('capture-mode-input').addEventListener('change', schedulePreviewRefresh);
    document.getElementById('size-select').addEventListener('change', updateSize);
    window.addEventListener('resize', () => {
      fitCopyText(document.getElementById('slide-grid'));
    });
  }

  bindInputListeners();
  renderStylePresets();
  updateSize();
  renderSlides();
  window.setTimeout(runCapture, 400);
</script>
</body>
</html>
