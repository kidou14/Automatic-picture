    return previewUrl ? screenshotCache.get(buildScreenshotCacheKey(previewUrl, captureMode)) || null : null;
  }

  function isFetchablePreviewUrl(previewUrl) {
    if (!previewUrl) {
      return false;
    }

    try {
      const parsed = new URL(previewUrl);
      return parsed.protocol === 'http:' || parsed.protocol === 'https:';
    } catch (error) {
      return false;
    }
  }

  function captureModeLabel(mode) {
    if (mode === 'mobile') return '移动端';
    if (mode === 'web-fit') return 'Web 适配';
    if (mode === 'web-crop') return 'Web 裁切';
    return '自动';
  }

  async function fetchPreviewScreenshot(previewUrl, captureMode) {
    const cacheKey = buildScreenshotCacheKey(previewUrl, captureMode);
    const current = screenshotCache.get(cacheKey);
    if (current && (current.status === 'loading' || current.status === 'ready')) {
      return;
    }

    screenshotCache.set(cacheKey, { status: 'loading' });
    renderSlides({ skipPrime: true });

    try {
      const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/preview?url=${encodeURIComponent(previewUrl)}&mode=${encodeURIComponent(captureMode)}`);
      if (!response.ok) {
        throw new Error(`截图服务返回 ${response.status}`);
      }

      const payload = await response.json();
      screenshotCache.set(cacheKey, {
        status: 'ready',
        title: payload.title || '',
        finalUrl: payload.finalUrl || previewUrl,
        imageDataUrl: payload.imageDataUrl || '',
        previewImageDataUrl: payload.copyImageDataUrl || payload.imageDataUrl || '',
        captureMode: payload.captureMode || captureMode,
        fitMode: payload.fitMode || 'cover',
        viewport: payload.viewport || null,
      });
    } catch (error) {
      screenshotCache.set(cacheKey, {
        status: 'error',
        error: error.message || '截图失败',
      });
    }

    renderSlides({ skipPrime: true });
  }

  function primePreviewCache(state, slides) {
    const previewUrls = new Set();

    slides.forEach((slide) => {
      [slide.routeA, slide.routeB].forEach((route) => {
        const previewUrl = buildPreviewUrl(state, route);
        if (isFetchablePreviewUrl(previewUrl)) {
          previewUrls.add(previewUrl);
        }
      });
    });

    previewUrls.forEach((previewUrl) => {
      const cacheKey = buildScreenshotCacheKey(previewUrl, state.captureMode);
      const current = screenshotCache.get(cacheKey);
      if (!current || current.status === 'error') {
        screenshotCache.set(cacheKey, { status: 'loading' });
        fetchPreviewScreenshot(previewUrl, state.captureMode);
      }
    });
  }

  function renderPreviewDevice(state, route) {
    const mockupMarkup = `<img class="render-device-mockup" src="${escapeHtml(PHONE_MOCKUP_URL)}" alt="" draggable="false" />`;

    if (!route) {
      return `
        <div class="render-device">
          <div class="render-device-aura"></div>
          <div class="render-device-shadow"></div>
          <div class="render-device-chassis"></div>
          <div class="render-screen">
            <div class="preview-live-shell">
              <div class="preview-live-empty loading">
                <div class="preview-loading-copy">
                  <div class="preview-loading-line short"></div>
                  <div class="preview-loading-line long"></div>
                  <div class="preview-loading-line mid"></div>
                </div>
              </div>
            </div>
          </div>
          ${mockupMarkup}
        </div>
      `;
    }

    const previewUrl = buildPreviewUrl(state, route);
    const previewRecord = getPreviewRecord(previewUrl, state.captureMode);

    const previewImageDataUrl = previewRecord && (previewRecord.previewImageDataUrl || previewRecord.imageDataUrl);

    if (previewRecord && previewRecord.status === 'ready' && previewImageDataUrl) {
      return `
        <div class="render-device">
          <div class="render-device-aura"></div>
          <div class="render-device-shadow"></div>
          <div class="render-device-chassis"></div>
          <div class="render-screen">
            <div class="render-shot-showcase">
              <img class="render-shot-image" src="${escapeHtml(previewImageDataUrl)}" alt="${escapeHtml(previewRecord.title || state.urlParts.host || '页面截图')}" style="--preview-fit:${escapeHtml(previewRecord.fitMode || 'contain')}" />
            </div>
          </div>
          ${mockupMarkup}
        </div>
      `;
    }

    let liveFrame = '<div class="preview-live-shell"><div class="preview-live-empty"></div></div>';

    if (previewUrl) {
      if (previewRecord && previewRecord.status === 'loading') {
        liveFrame = '<div class="preview-live-shell"><div class="preview-live-empty"></div></div>';
      } else if (previewRecord && previewRecord.status === 'error') {
        liveFrame = '<div class="preview-live-shell"><div class="preview-live-empty"></div></div>';
      }
    }

    return `
      <div class="render-device">
        <div class="render-device-aura"></div>
        <div class="render-device-shadow"></div>
        <div class="render-device-chassis"></div>
        <div class="render-screen">
          ${liveFrame}
        </div>
        ${mockupMarkup}
      </div>
    `;
  }

  function stripEmTags(text) {
    return String(text || '').replace(/^<em>/, '').replace(/<\/em>$/, '');
  }

  function applyHighlight(text) {
    return escapeHtml(String(text || ''));
  }

  function normalizeCopyLines(slide) {
    const headlineLines = Array.isArray(slide.headline)
      ? slide.headline.filter(Boolean)
      : slide.headline
        ? [slide.headline]
        : [];

    const headline = slide.headlineText
      || slide.headline
      || slide.titleLG
      || stripEmTags(headlineLines[0] || '')
      || stripEmTags(headlineLines[1] || '');
    const subheadline = slide.subheadline
      || slide.titleSM
      || slide.subtitle
      || slide.kicker
      || '';

    return { headline, subheadline, highlight: slide.highlight || null };
  }

  function fitSingleLineText(element, maxSize, minSize) {
    if (!element) {
      return;
    }

    element.style.removeProperty('--fit-font-size');
    element.style.removeProperty('--fit-letter-spacing');
    element.style.removeProperty('white-space');
    let size = maxSize;
    element.style.setProperty('--fit-font-size', `${size}px`);
    const parent = element.parentElement;
    const minLetterSpacing = element.classList.contains('render-headline') ? -2.6 : -0.6;
    let letterSpacing = element.classList.contains('render-headline') ? -1.4 : -0.2;

    const getAvailableWidth = () => {
      const slideRoot = element.closest('[data-export-root]');
      const slideWidth = slideRoot ? slideRoot.getBoundingClientRect().width : 0;
      const parentWidth = parent ? parent.getBoundingClientRect().width : 0;
      // Use the more restrictive bound: parent (if constrained) or slide width.
      // When parent has no explicit width constraint it expands with content,
      // so cap with slide width to ensure overflow is detected.
      const w = parentWidth > 0 && parentWidth <= (slideWidth || parentWidth)
        ? parentWidth
        : (slideWidth || parentWidth);
      return Math.max(0, Math.floor(w || element.clientWidth || 0));
    };

    while (size > minSize && element.scrollWidth > getAvailableWidth() + 1) {
      size -= 1;
      element.style.setProperty('--fit-font-size', `${size}px`);
    }

    while (letterSpacing > minLetterSpacing && element.scrollWidth > getAvailableWidth() + 1) {
      letterSpacing = Number((letterSpacing - 0.2).toFixed(1));
      element.style.setProperty('--fit-letter-spacing', `${letterSpacing}px`);
    }

    // 压缩到极限仍然溢出（常见于长英文标题）：退化为多行，避免硬裁
    if (element.scrollWidth > getAvailableWidth() + 1) {
      element.style.whiteSpace = 'normal';
    }
  }

  function getSlideCanvasWidth(element, fallback = 340) {
    const slideRoot = element && element.closest('[data-export-root]');
    const width = slideRoot ? slideRoot.getBoundingClientRect().width : 0;
    return Math.max(fallback, Math.round(width || fallback));
  }

  function fitCopyText(root = document) {
    root.querySelectorAll('.render-headline').forEach((element) => {
      const slideWidth = getSlideCanvasWidth(element);
      fitSingleLineText(
        element,
        Math.round(slideWidth * 0.14),
        Math.max(16, Math.round(slideWidth * 0.045))
      );
    });
    root.querySelectorAll('.render-subheadline').forEach((element) => {
      const slideWidth = getSlideCanvasWidth(element);
      fitSingleLineText(
        element,
        Math.round(slideWidth * 0.056),
        Math.max(12, Math.round(slideWidth * 0.024))
      );
    });
  }

  function buildCopyRequestSignature(state) {
    return JSON.stringify({
      url: state.normalizedUrl || state.url,
      routes: [],
      slideCount: state.slideCount,
      styleId: state.styleId || DEFAULT_STYLE_PRESET_ID,
      styleLabel: state.styleLabel || '',
      appNameHint: '',
      descriptionHint: '',
    });
  }

  function buildCopyUrlSignature(state) {
    return JSON.stringify({
      url: state.normalizedUrl || state.url,
      slideCount: state.slideCount,
      styleId: state.styleId || DEFAULT_STYLE_PRESET_ID,
    });
  }

  function getGeneratedCopyPlan(state) {
    // Style-keyed cache takes priority so copy survives URL-only rechecks but not style switches
    const urlKey = buildCopyUrlSignature(state);
    if (copyPlanUrlCache.has(urlKey)) {
      return copyPlanUrlCache.get(urlKey);
    }
    return copyPlanCache.get(buildCopyRequestSignature(state)) || null;
  }

  function getCaptureResult(state) {
    return captureResultCache.get(buildCopyRequestSignature(state)) || null;
  }

  function getPendingGenerationState(state) {
    const signature = buildCopyRequestSignature(state);
    return pendingGenerationState && pendingGenerationState.signature === signature ? pendingGenerationState : null;
  }

  function mergeCopyPlan(slides, copyPlan) {
    if (!copyPlan || !Array.isArray(copyPlan.slides) || !copyPlan.slides.length) {
      return slides;
    }

    const byKey = new Map(copyPlan.slides.filter(Boolean).map((slide, index) => [slide.key || `index-${index}`, slide]));
    return slides.map((slide, index) => {
      const generated = byKey.get(slide.key) || copyPlan.slides[index];
      if (!generated) {
        return slide;
      }

      return {
        ...slide,
        headline: generated.headline || generated.titleLG || slide.headline || slide.headlineText || stripEmTags((Array.isArray(slide.headline) ? slide.headline[0] : slide.headline) || ''),
        subheadline: generated.subheadline || generated.titleSM || slide.subheadline || slide.subtitle || generated.subtitle || generated.kicker || slide.kicker || '',
        highlight: generated.highlight || slide.highlight || null,
        floatCards: generated.floatCards || slide.floatCards || null,
        copyLoading: false,
      };
    });
  }

  function buildDiscoveredSlides(state, captureResult) {
    const screenshots = Array.isArray(captureResult && captureResult.screenshots)
      ? captureResult.screenshots.slice(0, state.slideCount)
      : [];

    if (!screenshots.length) {
      return null;
    }

    const copyPlan = captureResult.copyPlan || null;
    const fallbackTitles = ['主卖点', '核心路径', '功能亮点', '真实体验', '更多场景'];

    return screenshots.map((shot, index) => {
      const generated = copyPlan && Array.isArray(copyPlan.slides) ? (copyPlan.slides[index] || null) : null;
      const routeValue = shot.requestUrl || shot.finalUrl || shot.route || state.normalizedUrl || state.url;
      const label = shot.label || `page-${index + 1}`;
      return {
        key: generated && generated.key ? generated.key : `captured-${index + 1}`,
        title: generated && generated.title ? generated.title : (fallbackTitles[index] || `页面 ${index + 1}`),
        file: label,
        layout: STANDARD_SLIDE_LAYOUT,
        headline: generated && (generated.headline || generated.titleLG) ? (generated.headline || generated.titleLG) : '',
        subheadline: generated && (generated.subheadline || generated.titleSM || generated.subtitle) ? (generated.subheadline || generated.titleSM || generated.subtitle) : '',
        highlight: generated && generated.highlight ? generated.highlight : null,
        floatCards: generated && Array.isArray(generated.floatCards) ? generated.floatCards : null,
        copyLoading: !generated,
        routeA: routeValue,
        routeB: screenshots[index + 1]
          ? (screenshots[index + 1].requestUrl || screenshots[index + 1].finalUrl || screenshots[index + 1].route || routeValue)
          : routeValue,
      };
    });
  }

  function buildLoadingSlides(state, count) {
    return Array.from({ length: Math.max(1, count || state.slideCount || DEFAULT_SLIDE_COUNT) }, (_, index) => {
      return {
        key: `loading-${index + 1}`,
        title: `生成中 ${index + 1}`,
        file: `loading-${index + 1}`,
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        routeA: '',
        routeB: '',
        loading: true,
      };
    });
  }

  function mergeSlidesWithLoading(slides, state, pendingState) {
    if (!pendingState || pendingState.status !== 'running') {
      return slides;
    }

    const targetCount = Math.max(slides.length, pendingState.expectedCount || state.slideCount || 0);
    if (slides.length >= targetCount) {
      return slides;
    }

    return [
      ...slides,
      ...buildLoadingSlides(state, targetCount - slides.length).map((slide, index) => ({
        ...slide,
        key: `loading-tail-${slides.length + index + 1}`,
        title: `生成中 ${slides.length + index + 1}`,
      })),
    ];
  }

  function makeSlides(state) {
    const pendingState = getPendingGenerationState(state);
    const captureResult = getCaptureResult(state);
    const discoveredSlides = buildDiscoveredSlides(state, captureResult);
    if (discoveredSlides) {
      // Once real screenshots are available, render only the actual captured count.
      return discoveredSlides;
    }

    if (pendingState && pendingState.status === 'running') {
      return buildLoadingSlides(state, pendingState.expectedCount);
    }

    const baseSlides = [
      {
        key: 'hero',
        title: 'Hero / 主卖点',
        file: 'hero',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        copyLoading: true,
        routeA: '/',
      },
      {
        key: 'core',
        title: '核心路径',
        file: 'core-flow',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        copyLoading: true,
        routeA: '/',
      },
      {
        key: 'routes',
        title: '页面编排',
        file: 'route-story',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        copyLoading: true,
        routeA: '/',
        routeB: '/',
      },
      {
        key: 'feature',
        title: '差异化亮点',
        file: 'feature',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        copyLoading: true,
        routeA: '/',
      },
      {
        key: 'trust',
        title: '信任感',
        file: 'trust',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        copyLoading: true,
        routeA: '/',
      },
      {
        key: 'more',
        title: '更多功能',
        file: 'more-features',
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        copyLoading: true,
        routeA: '/',
      },
    ];

    let slides = state.slideCount <= baseSlides.length
      ? baseSlides.slice(0, state.slideCount)
      : [...baseSlides, ...Array.from({ length: state.slideCount - baseSlides.length }, (_, index) => {
      const route = '/';
      return {
        key: `extra-${index + 1}`,
        title: `补充卖点 ${index + 1}`,
        file: `extra-${index + 1}`,
        layout: STANDARD_SLIDE_LAYOUT,
        headline: '',
        subheadline: '',
        copyLoading: true,
        routeA: route,
      };
    })];

    return mergeCopyPlan(slides, getGeneratedCopyPlan(state));
  }

  // ── FLOATING CARD SLOT POOLS (electric-neon) ──
  // Each slot: position props, rotation, border/glow colors, value/dot/label accent colors
  const _RFC_BASE_COLORS = [
    { border: 'rgba(245,208,100,0.45)', glow1: 'rgba(245,208,100,0.20)', glow2: 'rgba(245,208,100,0.08)', accent: '#f5d064', dot: '#f5d064', dotGlow: 'rgba(245,208,100,0.85)', lbl: 'rgba(245,208,100,0.75)' },
    { border: 'rgba(230,190,120,0.42)', glow1: 'rgba(230,190,120,0.18)', glow2: 'rgba(230,190,120,0.07)', accent: '#e6be78', dot: '#e6be78', dotGlow: 'rgba(230,190,120,0.82)', lbl: 'rgba(230,190,120,0.73)' },
    { border: 'rgba(245,216,160,0.38)', glow1: 'rgba(245,216,160,0.16)', glow2: 'rgba(245,216,160,0.06)', accent: '#f5d8a0', dot: '#f5d8a0', dotGlow: 'rgba(245,216,160,0.80)', lbl: 'rgba(245,216,160,0.72)' },
    { border: 'rgba(230,190,120,0.36)', glow1: 'rgba(230,190,120,0.15)', glow2: 'rgba(230,190,120,0.06)', accent: '#e6be78', dot: '#e6be78', dotGlow: 'rgba(230,190,120,0.78)', lbl: 'rgba(230,190,120,0.70)' },
    { border: 'rgba(245,208,100,0.40)', glow1: 'rgba(245,208,100,0.17)', glow2: 'rgba(245,208,100,0.07)', accent: '#f5d064', dot: '#f5d064', dotGlow: 'rgba(245,208,100,0.83)', lbl: 'rgba(245,208,100,0.73)' },
    { border: 'rgba(242,222,187,0.36)', glow1: 'rgba(242,222,187,0.15)', glow2: 'rgba(242,222,187,0.05)', accent: '#f2debe', dot: '#f2debe', dotGlow: 'rgba(242,222,187,0.78)', lbl: 'rgba(242,222,187,0.70)' },
  ];
  // Normal layout: device at bottom, safe card zone ~28%–83%
  const RFC_SLOTS_NORMAL = [
    { side: { right: '1.5%', top: '30%' }, rot:  5.0, c: _RFC_BASE_COLORS[0] },
    { side: { left:  '2%',   top: '46%' }, rot: -4.0, c: _RFC_BASE_COLORS[1] },
    { side: { right: '2.5%', top: '61%' }, rot:  2.5, c: _RFC_BASE_COLORS[2] },
    { side: { left:  '3%',   top: '34%' }, rot: -6.0, c: _RFC_BASE_COLORS[3] },
    { side: { right: '3%',   top: '53%' }, rot:  4.0, c: _RFC_BASE_COLORS[4] },
    { side: { left:  '2%',   top: '68%' }, rot: -3.0, c: _RFC_BASE_COLORS[5] },
  ];
  // Inverted layout: device at top, safe card zone ~9%–67%
  const RFC_SLOTS_INVERTED = [
    { side: { right: '1.5%', top:  '9%' }, rot:  5.0, c: _RFC_BASE_COLORS[0] },
    { side: { left:  '2%',   top: '24%' }, rot: -4.0, c: _RFC_BASE_COLORS[1] },
    { side: { right: '2.5%', top: '39%' }, rot:  2.5, c: _RFC_BASE_COLORS[2] },
    { side: { left:  '3%',   top: '13%' }, rot: -6.0, c: _RFC_BASE_COLORS[3] },
    { side: { right: '3%',   top: '31%' }, rot:  4.0, c: _RFC_BASE_COLORS[4] },
    { side: { left:  '2%',   top: '50%' }, rot: -3.0, c: _RFC_BASE_COLORS[5] },
  ];
  // Card counts per slide — no two adjacent slides share the same count
  const RFC_COUNT_SEQUENCE = [2, 1, 3, 1, 2, 3];
  // Bar height sets for chart cards — vary per slide for visual variety
  const RFC_BAR_SETS = [
    [32, 52, 44, 78, 62, 90, 70],
    [60, 45, 72, 55, 82, 40, 76],
    [30, 42, 58, 66, 74, 82, 90],
    [88, 72, 62, 74, 66, 82, 76],
  ];
  function renderFloatCards(slide, slideIndex, isInverted) {
    if (slide.loading || slide.copyLoading) return '';
    const rawCards = Array.isArray(slide.floatCards) ? slide.floatCards.filter(Boolean) : [];
    if (!rawCards.length) return '';
    const targetCount = Math.min(rawCards.length, RFC_COUNT_SEQUENCE[slideIndex % RFC_COUNT_SEQUENCE.length]);
    const cards = rawCards.slice(0, targetCount);
    const slots = isInverted ? RFC_SLOTS_INVERTED : RFC_SLOTS_NORMAL;
    const offset = (slideIndex * 2) % slots.length;
    const barSet = RFC_BAR_SETS[slideIndex % RFC_BAR_SETS.length];

    // Break CJK text into lines of ~2 chars; English/mixed text wraps at word boundaries via CSS
    function wrapCJKText(text) {
      if (!text) return '';
      // Contains space or Latin letters → let CSS word-wrap handle it, don't insert breaks
      if (/[ a-zA-Z]/.test(text)) return escapeHtml(text);
      if (text.length <= 2) return escapeHtml(text);
      const chunks = [];
      let i = 0;
      while (i < text.length) {
        if (i + 3 >= text.length) { chunks.push(escapeHtml(text.slice(i))); break; }
        chunks.push(escapeHtml(text.slice(i, i + 2)));
        i += 2;
      }
      return chunks.join('<br>');
    }

    const html = cards.map((card, i) => {
      const slot = slots[(offset + i) % slots.length];
      const posCSS = Object.entries(slot.side).map(([k, v]) => `${k}:${v}`).join(';');
      const boxShadow = `0 0 22px ${slot.c.glow1},0 0 44px ${slot.c.glow2},0 6px 20px rgba(0,0,0,0.45)`;
      const baseStyle = `${posCSS};transform:rotate(${slot.rot}deg);border:0.16cqw solid ${slot.c.border};box-shadow:${boxShadow};`;

      if (card.type === 'stat') {
        return `<div class="rfc rfc--stat" style="${baseStyle}">
          <div class="rfc-value" style="color:${slot.c.accent}">${escapeHtml(card.value || '')}</div>
          ${card.label ? `<div class="rfc-label">${escapeHtml(card.label)}</div>` : ''}
        </div>`;
      }
      if (card.type === 'badge') {
        return `<div class="rfc rfc--badge" style="${baseStyle}">
          <span class="rfc-badge-text">${wrapCJKText(card.text || '')}</span>
        </div>`;
      }
      if (card.type === 'chart') {
        const bars = barSet.map(h => `<div class="rfc-bar" style="--h:${h}%"></div>`).join('');
        return `<div class="rfc rfc--chart" style="${baseStyle}">
          <div class="rfc-bars">${bars}</div>
          ${card.label ? `<div class="rfc-label" style="color:${slot.c.lbl}">${escapeHtml(card.label)}</div>` : ''}
        </div>`;
      }
      return '';
    }).join('');

    return `<div class="render-float-cards">${html}</div>`;
  }

  function renderMonoLuxeCircle(slideIndex) {
    // Concentric gold rings: inner rings thick, outer rings thin + fading
    const variants = [
      { cy: 62 },
      { cy: 60 },
      { cy: 64 },
      { cy: 58 },
      { cy: 63 },
      { cy: 61 },
    ];
    const v = variants[slideIndex % variants.length];
    const spacing = 24;   // px between rings
    const maxR    = 430;  // outermost ring radius
    const rings   = [];
    for (let r = spacing; r <= maxR; r += spacing) {
      const t           = r / maxR;                                   // 0→1 from center to edge
      const strokeWidth = Math.max(0.8, 2.5 - 1.7 * t).toFixed(2);  // 2.5px → 0.8px
      const opacity     = (0.82 * Math.pow(0.88, (r / spacing) - 1)).toFixed(3); // gentle exponential decay
      rings.push(
        `<circle cx="50%" cy="${v.cy}%" r="${r}" fill="none" ` +
        `stroke="rgba(182,146,94,1)" stroke-width="${strokeWidth}" opacity="${opacity}"/>`
      );
    }
    return `<svg class="render-luxe-circle" xmlns="http://www.w3.org/2000/svg" overflow="visible">${rings.join('')}</svg>`;
  }

  function renderStreetDropPattern(slideIndex) {
    // Each slide gets a different horizontal center so S curves shift left/right
    const centerOffsets = [-75, 75, 0, -50, 90, -25];
    const cx = 195 + centerOffsets[slideIndex % centerOffsets.length];
    const a = 88; // S amplitude — how far each half bows out

    // 6 parallel S curves, spaced 35px apart, fading outward
    const lines = [
      { dx:   0, op: 0.16, w: 1.0 },
      { dx:  30, op: 0.09, w: 0.7 },
      { dx: -30, op: 0.08, w: 0.7 },
      { dx:  58, op: 0.05, w: 0.5 },
      { dx: -58, op: 0.04, w: 0.5 },
      { dx:  85, op: 0.03, w: 0.4 },
    ];

    const paths = lines.map(({ dx, op, w }) => {
      const x = cx + dx;
      // C: two explicit control points for lower-half curve (bow right)
      // S: smooth continuation for upper-half (bow left via reflection)
      const d = [
        'M', (x - a * 0.45).toFixed(1), '844',
        'C', (x + a * 1.1).toFixed(1), '640',
            (x - a * 1.1).toFixed(1), '430',
            x.toFixed(1), '422',
        'S', (x + a * 1.1).toFixed(1), '190',
            (x + a * 0.45).toFixed(1), '0',
      ].join(' ');
      return `<path d="${d}" stroke="rgba(255,179,0,${op})" stroke-width="${w}"/>`;
    }).join('');

    // Bullish icons: up-chevrons (↑) and plus signs (+) — per-slide, low opacity, corner/edge positions
    // Coordinates in viewBox space (390×844). Phone occupies roughly center x:80-310, y:260-844.
    // Safe zones: top strip (y<200), left edge (x<55), right edge (x>335), bottom corners (y>750, x<60 or x>330).
    const BULLISH_ICON_SETS = [
      // slide 0 — 4 icons
      [
        { t: 'arrow', cx: 44,  cy: 82,  s: 25, op: 0.22, c: '255,179,0'   },
        { t: 'plus',  cx: 362, cy: 155, s: 18, op: 0.19, c: '255,215,80'  },
        { t: 'arrow', cx: 350, cy: 410, s: 20, op: 0.18, c: '255,179,0'   },
        { t: 'plus',  cx: 36,  cy: 760, s: 15, op: 0.16, c: '255,215,80'  },
      ],
      // slide 1 — 3 icons
      [
        { t: 'plus',  cx: 335, cy: 68,  s: 21, op: 0.21, c: '255,215,80'  },
        { t: 'arrow', cx: 26,  cy: 375, s: 29, op: 0.23, c: '255,179,0'   },
        { t: 'arrow', cx: 358, cy: 310, s: 18, op: 0.18, c: '255,179,0'   },
      ],
      // slide 2 — 4 icons
      [
        { t: 'arrow', cx: 356, cy: 58,  s: 22, op: 0.20, c: '255,179,0'   },
        { t: 'plus',  cx: 38,  cy: 105, s: 16, op: 0.18, c: '255,215,80'  },
        { t: 'arrow', cx: 22,  cy: 460, s: 20, op: 0.19, c: '255,179,0'   },
        { t: 'plus',  cx: 340, cy: 760, s: 16, op: 0.17, c: '255,215,80'  },
      ],
      // slide 3 — 3 icons
      [
        { t: 'arrow', cx: 32,  cy: 60,  s: 18, op: 0.18, c: '255,179,0'   },
        { t: 'plus',  cx: 360, cy: 78,  s: 23, op: 0.22, c: '255,215,80'  },
        { t: 'arrow', cx: 24,  cy: 500, s: 22, op: 0.19, c: '255,179,0'   },
      ],
      // slide 4 — 4 icons
      [
        { t: 'arrow', cx: 48,  cy: 90,  s: 27, op: 0.21, c: '255,179,0'   },
        { t: 'plus',  cx: 370, cy: 255, s: 19, op: 0.20, c: '255,215,80'  },
        { t: 'arrow', cx: 28,  cy: 755, s: 16, op: 0.17, c: '255,179,0'   },
        { t: 'plus',  cx: 352, cy: 480, s: 17, op: 0.18, c: '255,215,80'  },
      ],
      // slide 5 — 3 icons
      [
        { t: 'plus',  cx: 115, cy: 62,  s: 17, op: 0.19, c: '255,215,80'  },
        { t: 'arrow', cx: 366, cy: 345, s: 24, op: 0.22, c: '255,179,0'   },
        { t: 'arrow', cx: 30,  cy: 148, s: 20, op: 0.18, c: '255,179,0'   },
      ],
    ];

    const iconSvgPaths = BULLISH_ICON_SETS[slideIndex % BULLISH_ICON_SETS.length].map(({ t, cx: icx, cy: icy, s, op, c }) => {
      if (t === 'arrow') {
        // Chevron pointing up: two angled lines meeting at the tip
        const tipX = icx, tipY = icy - s * 0.38;
        const lx = (icx - s * 0.42).toFixed(1), ly = (icy + s * 0.28).toFixed(1);
        const rx = (icx + s * 0.42).toFixed(1), ry = ly;
        const tx = tipX.toFixed(1), ty = tipY.toFixed(1);
        return `<path d="M ${lx},${ly} L ${tx},${ty} L ${rx},${ry}" stroke="rgba(${c},${op})" stroke-width="2.8" fill="none"/>`;
      } else {
        // Plus sign: two perpendicular lines
        const r = (s * 0.44).toFixed(1);
        const x = icx.toFixed(1), y = icy.toFixed(1);
        return `<path d="M ${(icx - +r).toFixed(1)},${y} L ${(icx + +r).toFixed(1)},${y} M ${x},${(icy - +r).toFixed(1)} L ${x},${(icy + +r).toFixed(1)}" stroke="rgba(${c},${op})" stroke-width="2.8" fill="none"/>`;
      }
    }).join('');

    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><g fill="none" stroke-linecap="round" stroke-linejoin="round">${paths}${iconSvgPaths}</g></svg>`;
  }

  function renderSlideArtwork(slide, state, slideIndex) {
    const preset = STYLE_PRESETS[state.styleId];
    const deviceMode = preset?.deviceMode ?? 'tilt';

    let layoutClass, tiltTransform;
    if (deviceMode === 'upright') {
      const isEven = typeof slideIndex === 'number' && (slideIndex % 2 === 1);
      const shouldInvert = preset?.invertEven && isEven;
      layoutClass = shouldInvert ? `${slide.layout} layout-inverted glow-flip` : slide.layout;
      tiltTransform = 'translateX(-50%)';
    } else if (deviceMode === 'tilt-reversed') {
      const isEven = typeof slideIndex === 'number' && (slideIndex % 2 === 1);
      layoutClass = isEven ? `${slide.layout} layout-inverted glow-flip` : slide.layout;
      tiltTransform = TILT_TRANSFORMS_ALT_REVERSED[typeof slideIndex === 'number' ? slideIndex % TILT_TRANSFORMS_ALT_REVERSED.length : 0];
    } else {
      const isEven = typeof slideIndex === 'number' && (slideIndex % 2 === 1);
      layoutClass = isEven ? `${slide.layout} layout-inverted glow-flip` : slide.layout;
      tiltTransform = TILT_TRANSFORMS_ALT[typeof slideIndex === 'number' ? slideIndex % TILT_TRANSFORMS_ALT.length : 0];
    }

    const style = themeVars(state.theme, slideIndex);
    const copy = normalizeCopyLines(slide);
    const copyMarkup = (slide.loading || slide.copyLoading)
      ? `
        <div class="render-copy">
          <div class="render-copy-skeleton">
            <div class="render-copy-skeleton-headline"></div>
            <div class="render-copy-skeleton-subheadline"></div>
          </div>
        </div>
      `
      : `
        <div class="render-copy">
          <div class="render-headline">${applyHighlight(copy.headline)}</div>
          <div class="render-subheadline">${escapeHtml(copy.subheadline)}</div>
        </div>
      `;

    const ghostFrames = state.styleId === 'electric-neon'
      ? '<div class="render-ghost-left"></div><div class="render-ghost-right"></div>'
      : state.styleId === 'mono-luxe'
      ? renderMonoLuxeCircle(slideIndex)
      : '';

    const isInverted = layoutClass.includes('layout-inverted');
    const floatCards = state.styleId === 'electric-neon'
      ? renderFloatCards(slide, slideIndex, isInverted)
      : '';

    const patternInner = state.styleId === 'street-drop'
      ? renderStreetDropPattern(slideIndex)
      : '';

    const deviceHtml = renderPreviewDevice(state, slide.routeA);
    const reflectionMarkup = state.styleId === 'clean-light' && !isInverted
      ? `<div class="render-device-reflection"><div class="render-device-reflection-clone">${deviceHtml}</div></div>`
      : '';

    return `
      <div class="render-slide ${layoutClass}" data-style="${escapeHtml(state.styleId || '')}" data-export-root="true" style="${style}">
        <div class="render-pattern">${patternInner}</div>
        ${ghostFrames}
        ${floatCards}
        ${copyMarkup}
        <div class="render-device-wrap" style="transform:${tiltTransform}">${deviceHtml}${reflectionMarkup}</div>
      </div>
    `;
  }

  function renderSlides(options = {}) {
    syncFilledState();
    const state = getFormState();
    renderedSlides = makeSlides(state);
    if (!options.skipPrime) {
      primePreviewCache(state, renderedSlides);
    }

    const html = renderedSlides.map((slide, index) => `
      <div class="slide-card" data-slide-index="${index + 1}" onclick="exportSlide(${index + 1}, event)">
        <div class="slide-frame-wrap">
          <div class="hover-overlay slide-hover-overlay">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M4 7l4 4 4-4M2 12h12"/></svg>
            导出 PNG
          </div>
          ${renderSlideArtwork(slide, state, index)}
        </div>
      </div>
    `).join('');

    document.getElementById('slide-grid').innerHTML = html;
    requestAnimationFrame(() => {
      fitCopyText(document.getElementById('slide-grid'));
      window.setTimeout(() => fitCopyText(document.getElementById('slide-grid')), 80);
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.classList.add('show');
    window.clearTimeout(toastTimer);
    toastTimer = window.setTimeout(() => toast.classList.remove('show'), 2800);
  }

  function updateSize() {
    const value = document.getElementById('size-select').value;
    document.getElementById('current-size').textContent = value.replace('x', ' × ');
  }

  function renderStylePresets(selectedId = DEFAULT_STYLE_PRESET_ID) {
    const container = document.getElementById('style-preset-grid');
    container.innerHTML = Object.values(STYLE_PRESETS).map((preset) => `
        <button
          class="style-preset ${preset.id === selectedId ? 'selected' : ''}"
          type="button"
          data-preset-id="${escapeHtml(preset.id)}"
          onclick="selectStylePreset('${escapeHtml(preset.id)}')"
        >
          <div class="style-preset-head">
            <span class="style-preset-name">${escapeHtml(preset.label)}</span>
          </div>
        <div class="style-preset-swatches">
          <span style="background:${preset.theme.bgStart}"></span>
          <span style="background:${preset.theme.accent}"></span>
          <span style="background:${preset.theme.accent2}"></span>
        </div>
        <div class="style-preset-desc">${escapeHtml(preset.description)}</div>
      </button>
    `).join('');
  }

  function selectStylePreset(presetId) {
    document.querySelectorAll('.style-preset').forEach((card) => {
      card.classList.toggle('selected', card.dataset.presetId === presetId);
    });
    renderSlides();
  }

  function renderCaptureLog(events) {
    const log = document.getElementById('capture-log');
    if (!events || !events.length) {
      log.innerHTML = '<span class="dim">○ 等待开始截图</span>';
      return;
    }

    log.innerHTML = [...events].reverse().map((event) => {
      const level = event.level === 'error' ? 'error' : event.level === 'run' ? 'run' : event.level === 'dim' ? 'dim' : 'ok';
      const marker = level === 'error' ? '✗' : level === 'run' ? '▶' : level === 'dim' ? '○' : '✓';
      return `<span class="${level}">${marker}</span> ${escapeHtml(event.message)}`;
    }).join('\n');
    log.scrollTop = 0;
  }

  function syncScreenshotsFromJob(job) {
    if (!job || !Array.isArray(job.screenshots)) {
      return;
    }

    job.screenshots.forEach((shot) => {
      if (!shot || !shot.requestUrl || !shot.imageDataUrl) {
        return;
      }

      screenshotCache.set(buildScreenshotCacheKey(shot.requestUrl, shot.requestedMode || job.requestedMode || 'auto'), {
        status: 'ready',
        title: shot.title || '',
        finalUrl: shot.finalUrl || shot.requestUrl,
        imageDataUrl: shot.imageDataUrl,
        previewImageDataUrl: shot.copyImageDataUrl || shot.imageDataUrl,
        captureMode: shot.captureMode || job.captureMode || job.requestedMode || 'auto',
        fitMode: shot.fitMode || 'cover',
        viewport: shot.viewport || null,
      });
    });

    if (job.copyPlan && job.requestSignature) {
      copyPlanCache.set(job.requestSignature, job.copyPlan);
      // Cache keyed by url+slideCount+styleId so style switches don't bleed across each other
      const urlKey = JSON.stringify({ url: job.url, slideCount: job.slideCount, styleId: job.styleId || '' });
      copyPlanUrlCache.set(urlKey, job.copyPlan);
    }

    if (job.requestSignature) {
      captureResultCache.set(job.requestSignature, {
        screenshots: Array.isArray(job.screenshots) ? job.screenshots : [],
        copyPlan: job.copyPlan || null,
      });
    }
  }

  async function pollCaptureJob(jobId) {
    try {
      const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/capture-jobs/${encodeURIComponent(jobId)}`);
      if (!response.ok) {
        throw new Error(`任务状态获取失败 ${response.status}`);
      }

      const job = await response.json();
      if (job.id !== activeCaptureJobId) {
        return;
      }

      renderCaptureLog(job.events);
      syncScreenshotsFromJob(job);

      if (job.status === 'completed') {
        window.clearInterval(capturePollTimer);
        capturePollTimer = null;
        activeCaptureJobId = null;
        pendingGenerationState = null;
        renderSlides({ skipPrime: true });
        showToast(`真实截图完成，共 ${job.completed} 张`);
        return job.status;
      }

      if (job.status === 'failed') {
        window.clearInterval(capturePollTimer);
        capturePollTimer = null;
        activeCaptureJobId = null;
        pendingGenerationState = null;
        renderSlides({ skipPrime: true });
        showToast(`截图失败：${job.error || '未知错误'}`);
        return job.status;
      }

      renderSlides({ skipPrime: true });
      return job.status;
    } catch (error) {
      window.clearInterval(capturePollTimer);
      capturePollTimer = null;
      activeCaptureJobId = null;
      pendingGenerationState = null;
      renderCaptureLog([{ level: 'error', message: `轮询任务失败：${error.message}` }]);
      showToast(`截图任务中断：${error.message}`);
      return 'failed';
    }
  }

  function clearRelevantScreenshotCache(state) {
    const previewUrl = buildPreviewUrl(state, '/');
    if (previewUrl) {
      screenshotCache.delete(buildScreenshotCacheKey(previewUrl, state.captureMode));
    }
    copyPlanCache.delete(buildCopyRequestSignature(state));
    captureResultCache.delete(buildCopyRequestSignature(state));
    copyPlanUrlCache.delete(buildCopyUrlSignature(state));
  }

  async function runCapture() {
    const state = getFormState();
    const log = document.getElementById('capture-log');

    if (!state.url.trim()) {
      renderCaptureLog([{ level: 'error', message: '请先输入可访问的 URL，再开始生成上架图预览' }]);
      showToast('请输入可访问的 URL');
      return;
    }

    window.clearInterval(capturePollTimer);
    capturePollTimer = null;
    activeCaptureJobId = null;

    clearRelevantScreenshotCache(state);
    pendingGenerationState = {
      signature: buildCopyRequestSignature(state),
      expectedCount: state.slideCount,
      status: 'running',
    };
    renderSlides();
    log.innerHTML = '<span class="run">▶</span> 正在创建截图任务 …';
    showToast('正在启动 Playwright 真实截图任务 …');

    try {
      const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/capture-jobs`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url: state.normalizedUrl || state.url,
          slideCount: state.slideCount,
          captureMode: state.captureMode,
          styleId: state.styleId,
          styleLabel: state.styleLabel,
          stylePrompt: state.stylePrompt,
          styleKeywords: state.styleKeywords,
        }),
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `截图任务创建失败 ${response.status}`);
      }

      activeCaptureJobId = payload.jobId;
      const firstStatus = await pollCaptureJob(activeCaptureJobId);
      if (firstStatus === 'running' && !capturePollTimer && activeCaptureJobId) {
        capturePollTimer = window.setInterval(() => {
          pollCaptureJob(activeCaptureJobId);
        }, 1200);
      }
    } catch (error) {
      pendingGenerationState = null;
      log.innerHTML = `<span class="error">✗</span> ${escapeHtml(error.message)}`;
      showToast(`无法启动截图任务：${error.message}`);
    }
  }

  function waitForFrame() {
    return new Promise((resolve) => requestAnimationFrame(() => resolve()));
  }

  async function buildRenderExportFile(node, width, height, filename) {
    const exportStage = document.getElementById('export-stage');
    const clone = node.cloneNode(true);
    clone.style.width = `${width}px`;
    clone.style.height = `${height}px`;
    clone.style.borderRadius = '0';

    exportStage.innerHTML = '';
    exportStage.style.width = `${width}px`;
    exportStage.style.height = `${height}px`;
    exportStage.appendChild(clone);
    await waitForFrame();
    fitCopyText(exportStage);
    await waitForFrame();
    fitCopyText(exportStage);
    await waitForFrame();

    const styles = Array.from(document.querySelectorAll('style')).map((style) => style.textContent).join('\n');
    const file = {
      filename,
      width,
      height,
      markup: clone.outerHTML,
      styles,
    };

    exportStage.innerHTML = '';
    exportStage.style.width = '1px';
    exportStage.style.height = '1px';
    return file;
  }

  async function saveFilesToLocalDisk(files, folderName) {
    const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/export-files`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files, folderName }),
    });

    const payload = await response.json();
    if (!response.ok) {
      throw new Error(payload.error || `导出失败 ${response.status}`);
    }

    return payload;
  }

  async function renderFilesToLocalDisk(files, folderName) {
    const response = await fetch(`${SCREENSHOT_SERVICE_ORIGIN}/api/render-exports`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files, folderName }),
    });

    const payload = await response.json();
    if (!response.ok) {
      throw new Error(payload.error || `导出失败 ${response.status}`);
    }

    return payload;
  }

  async function exportNodeAsPng(node, width, height, filename, folderName) {
    const file = await buildRenderExportFile(node, width, height, filename);
    return renderFilesToLocalDisk([file], folderName);
  }

  function getCurrentSize() {
    const sizeKey = document.getElementById('size-select').value;
    return { key: sizeKey, ...(EXPORT_SIZES[sizeKey] || EXPORT_SIZES['1320x2868']) };
  }

  async function exportSlide(index, event) {
    if (event) {
      event.stopPropagation();
    }

    const size = getCurrentSize();
    const slide = renderedSlides[index - 1];
    const node = document.querySelector(`.slide-card[data-slide-index="${index}"] [data-export-root]`);

    if (!slide || !node) {
      showToast('当前没有可导出的图片');
      return;
    }

    const filename = `${String(index).padStart(2, '0')}-${slugify(slide.file)}-${size.key}.png`;
    showToast(`正在导出 ${filename} …`);

    try {
      const result = await exportNodeAsPng(node, size.width, size.height, filename);
      showToast(`✓ ${filename} 已保存到 ${result.files[0].path}`);
    } catch (error) {
      console.error(error);
      showToast(`导出失败：${error.message}`);
    }
  }

  async function exportCurrent() {
    const size = getCurrentSize();
    showToast(`正在导出当前尺寸 ${size.key.replace('x', ' × ')} …`);

    try {
      const files = [];
      for (let index = 0; index < renderedSlides.length; index += 1) {
        const node = document.querySelector(`.slide-card[data-slide-index="${index + 1}"] [data-export-root]`);
        const slide = renderedSlides[index];
        const filename = `${String(index + 1).padStart(2, '0')}-${slugify(slide.file)}-${size.key}.png`;
        files.push(await buildRenderExportFile(node, size.width, size.height, filename));
      }
      const result = await renderFilesToLocalDisk(files, `current-size-${size.key}`);
      showToast(`✓ 当前尺寸 ${size.key} 的 ${result.count} 张截图已保存到 ${result.directory}`);
    } catch (error) {
      console.error(error);
      showToast(`批量导出失败：${error.message}`);
    }
  }

  async function exportAll() {
    const sizeKeys = Object.keys(EXPORT_SIZES);
    showToast(`正在导出全部尺寸，共 ${sizeKeys.length * renderedSlides.length} 张 …`);

    try {
      const files = [];
      for (const sizeKey of sizeKeys) {
        const size = EXPORT_SIZES[sizeKey];
        for (let index = 0; index < renderedSlides.length; index += 1) {
          const node = document.querySelector(`.slide-card[data-slide-index="${index + 1}"] [data-export-root]`);
          const slide = renderedSlides[index];
          const filename = `${String(index + 1).padStart(2, '0')}-${slugify(slide.file)}-${sizeKey}.png`;
          files.push(await buildRenderExportFile(node, size.width, size.height, filename));
        }
      }
      const result = await renderFilesToLocalDisk(files, `all-sizes-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}`);
      showToast(`✓ 全部 ${result.count} 张 PNG 已保存到 ${result.directory}`);
    } catch (error) {
      console.error(error);
      showToast(`全部尺寸导出失败：${error.message}`);
    }
  }

  function schedulePreviewRefresh() {
    window.clearTimeout(previewRefreshTimer);
    previewRefreshTimer = window.setTimeout(() => {
      renderSlides();
    }, 280);
  }

  function bindInputListeners() {
    document.getElementById('url-input').addEventListener('input', () => {
      schedulePreviewRefresh();
    });
    document.getElementById('capture-mode-input').addEventListener('change', schedulePreviewRefresh);
    document.getElementById('size-select').addEventListener('change', updateSize);
    window.addEventListener('resize', () => {
      fitCopyText(document.getElementById('slide-grid'));
    });
  }

  bindInputListeners();
  renderStylePresets();
  updateSize();
  renderSlides();
  window.setTimeout(runCapture, 400);
</script>
</body>
</html>
